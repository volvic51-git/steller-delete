<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Delete</title>
<link rel="icon" href="assets/images/etc/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep-space:  #030818;
    --glow-blue:   #1a6fff;
    --bright-blue: #4a9eff;
    --ice-white:   #e8f4ff;
    --dim-blue:    #0d1f3c;
    --accent:      #00c8ff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep-space);
    color: var(--ice-white);
    user-select: none;
    -webkit-user-select: none;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── 背景画像レイヤー ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover;
    background-position: center;
    background-image: url('assets/images/img_title.jpg');
  }
  @media (max-aspect-ratio: 1/1) {
    #bg { background-image: url('assets/images/img_title.jpg'); }
  }
  #bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 68% 55%, rgba(26,111,255,.18) 0%, transparent 70%),
      linear-gradient(to bottom, rgba(3,8,24,.35) 0%, rgba(3,8,24,.55) 100%);
  }

  /* ── パーティクルキャンバス ── */
  #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ══════════════════════════════════════
     PC レイアウト（デフォルト）
     中央揃え
  ══════════════════════════════════════ */
  #stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* ══════════════════════════════════════
     スマホ レイアウト（縦長画面）
     タイトルブロック全体を 1文字分（1em ≒ h1のfont-size）上へ
     横軸センタリングは維持
  ══════════════════════════════════════ */
  @media (max-aspect-ratio: 1/1) {
    #stage {
      /* h1のfont-sizeはclamp(42px, 9vw, 110px)。
         スマホでは9vwが効くので 1em ≈ 9vw 上方向に移動 */
      margin-top: calc(-1 * clamp(42px, 9vw, 110px));
    }
  }

  /* ── タイトルブロック ── */
  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: transparent;
    opacity: 0;
    transform: translateY(16px);
    animation:
      fadeUp    1.6s 2.75s cubic-bezier(.22,1,.36,1) forwards,
      titleRise 5s   3.55s cubic-bezier(.4,0,.2,1)   none;
  }

    /* ── タイトルロゴ ── */
  .title-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: transparent;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(42px, 9vw, 110px);
    letter-spacing: .12em;
    line-height: 1;
    color: var(--ice-white);
    background: transparent;
    text-shadow:
      0 0 8px rgba(74,158,255,.7),
      0 0 20px rgba(26,111,255,.4);
    position: relative;
    white-space: nowrap;
    overflow: hidden;
  }

  /* グリッチ装飾 */
  h1::before, h1::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    font-family: inherit; font-weight: inherit;
    font-size: inherit; letter-spacing: inherit;
    color: var(--ice-white);
    text-align: center;
    opacity: 0;
  }
  h1::before {
    color: #00f0ff;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    animation: glitch-a 5s 5.5s infinite;
  }
  h1::after {
    color: #ff2d78;
    clip-path: polygon(0 60%, 100% 60%, 100% 78%, 0 78%);
    animation: glitch-b 5s 5.5s infinite;
  }

  /* ══════════════════════════════════════
     メニューボタン群
  ══════════════════════════════════════ */
  .menu-wrap {
    margin-top: clamp(28px, 4.5vh, 50px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 1.8vh, 18px);
    opacity: 0;
    pointer-events: none;
    animation: fadeUp 1.2s 3.35s forwards, enableMenuClicks 0s 4.55s forwards;
  }

  /* 共通ボタンスタイル */
  .menu-btn {
    position: relative;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(13px, 1.7vw, 17px);
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--ice-white);
    background: transparent;
    border: none;
    width: clamp(180px, 26vw, 280px);
    padding: clamp(11px, 1.7vh, 16px) 0;
    cursor: pointer;
    outline: none;
    text-align: center;
    text-shadow: 0 0 12px rgba(74,158,255,.8);
    transition: color .2s, transform .1s;
  }
  .menu-btn::before {
    content: '';
    position: absolute; inset: 0;
    border: 1.5px solid var(--accent);
    box-shadow:
      0 0 8px rgba(0,200,255,.35) inset,
      0 0 14px rgba(0,200,255,.2);
    transition: box-shadow .25s, border-color .25s;
  }
  .menu-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    background:
      linear-gradient(var(--accent), var(--accent)) top left / 10px 1.5px no-repeat,
      linear-gradient(var(--accent), var(--accent)) top left / 1.5px 10px no-repeat,
      linear-gradient(var(--accent), var(--accent)) top right / 10px 1.5px no-repeat,
      linear-gradient(var(--accent), var(--accent)) top right / 1.5px 10px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom left / 10px 1.5px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom left / 1.5px 10px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom right / 10px 1.5px no-repeat,
      linear-gradient(var(--accent), var(--accent)) bottom right / 1.5px 10px no-repeat;
    opacity: .6;
    transition: opacity .25s;
  }
  .menu-btn:hover::before {
    box-shadow:
      0 0 20px rgba(0,200,255,.65) inset,
      0 0 36px rgba(0,200,255,.45);
    border-color: #7df0ff;
  }
  .menu-btn:hover::after { opacity: 1; }
  .menu-btn:hover { color: #7df0ff; }
  .menu-btn:active { transform: scale(.97); }

  /* STARTだけ pulse ring */
  .pulse-ring {
    position: absolute; inset: -12px;
    border: 1px solid var(--accent);
    opacity: 0;
    animation: pulseRing 3s 4.7s infinite;
    pointer-events: none;
  }

  /* STORY アコーディオン */
  .story-accordion-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: clamp(180px, 26vw, 280px);
    gap: 0;
  }
  .story-accordion-wrap #story-btn {
    width: 100%;
    transition: color .2s, transform .1s, letter-spacing .2s;
  }
  .story-accordion-wrap #story-btn.open {
    color: #7df0ff;
    letter-spacing: .25em;
  }
  .story-accordion-wrap #story-btn.open::before {
    box-shadow: 0 0 20px rgba(0,200,255,.65) inset, 0 0 36px rgba(0,200,255,.45);
    border-color: #7df0ff;
  }
  .episode-list {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    transition: max-height .45s cubic-bezier(.4,0,.2,1), opacity .3s ease;
    opacity: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .episode-list.open {
    max-height: 800px;
    opacity: 1;
  }
  .ep-btn {
    position: relative;
    width: 100%;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px,1.4vw,13px);
    letter-spacing: .2em;
    color: rgba(180,230,255,.85);
    background: rgba(0,10,25,.6);
    border: none;
    border-top: 1px solid rgba(0,200,255,.12);
    padding: clamp(8px,1.2vh,11px) 1.5em;
    cursor: pointer;
    text-align: right;
    transition: background .2s, color .2s;
  }
  .ep-btn:last-child { border-bottom: 1px solid rgba(0,200,255,.12); }
  .ep-btn:hover { background: rgba(0,50,100,.7); color: #7df0ff; }
  .ep-btn.locked {
    color: rgba(180,200,230,.25);
    pointer-events: none;
    cursor: default;
  }
  .ep-btn .ep-label { font-family:'Orbitron',sans-serif; font-size:.9em; display:inline-block; width:3.5em; }
  .ep-divider {
    height: 1px;
    background: rgba(0,200,255,.2);
    margin: 4px 0;
  }

  /* AUCTION — 構想中モード：グレーアウト、操作不可 */
  #auction-btn {
    color: rgba(232,244,255,.28);
    cursor: default;
    pointer-events: none;
  }
  #auction-btn::before {
    border-color: rgba(0,200,255,.18);
    box-shadow: none;
  }
  #auction-btn::after { opacity: .18; }

  /* EXIT は少し控えめな色 */
  #exit-btn { color: rgba(232,244,255,.6); }
  #exit-btn::before {
    border-color: rgba(0,200,255,.45);
    box-shadow: none;
  }
  #exit-btn:hover { color: #ff6e8a; }
  #exit-btn:hover::before {
    border-color: #ff6e8a;
    box-shadow:
      0 0 14px rgba(255,60,100,.35) inset,
      0 0 22px rgba(255,60,100,.25);
  }
  #exit-btn::after {
    background:
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) top left / 10px 1.5px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) top left / 1.5px 10px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) top right / 10px 1.5px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) top right / 1.5px 10px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) bottom left / 10px 1.5px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) bottom left / 1.5px 10px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) bottom right / 10px 1.5px no-repeat,
      linear-gradient(rgba(255,110,138,.6), rgba(255,110,138,.6)) bottom right / 1.5px 10px no-repeat;
    opacity: .5;
  }

  /* ── フッター ── */
  .footer-info {
    position: fixed;
    bottom: clamp(14px, 3vh, 28px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 2.5em;
    font-size: clamp(9px, 1.1vw, 11px);
    letter-spacing: .25em;
    color: rgba(232,244,255,.3);
    white-space: nowrap;
    opacity: 0;
    animation: fadeUp 1.0s 3.8s forwards;
  }

  /* ── EXIT確認モーダル ── */
  #exit-modal {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    align-items: center; justify-content: center;
    background: rgba(3,8,24,.75);
    backdrop-filter: blur(4px);
  }
  #exit-modal.show { display: flex; }
  .modal-box {
    border: 1.5px solid rgba(0,200,255,.5);
    background: rgba(5,15,40,.92);
    padding: clamp(28px,5vh,48px) clamp(32px,6vw,64px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(18px,3vh,28px);
    box-shadow: 0 0 40px rgba(0,200,255,.2), 0 0 80px rgba(26,111,255,.1);
    animation: fadeUp .25s forwards;
  }
  .modal-msg {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(14px,2vw,18px);
    letter-spacing: .22em;
    color: rgba(232,244,255,.85);
    text-transform: uppercase;
  }
  .modal-btns { display: flex; gap: clamp(14px,3vw,28px); }
  .modal-btn {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(12px,1.4vw,14px);
    letter-spacing: .3em;
    text-transform: uppercase;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--ice-white);
    padding: clamp(9px,1.4vh,13px) clamp(22px,4vw,40px);
    min-width: clamp(120px, 14vw, 160px);
    text-align: center;
    cursor: pointer;
    outline: none;
    transition: background .2s, color .2s, border-color .2s;
  }
  .modal-btn:hover { background: rgba(0,200,255,.15); color: #7df0ff; border-color: #7df0ff; }
  .modal-btn.danger { border-color: rgba(255,110,138,.6); color: rgba(232,244,255,.6); }
  .modal-btn.danger:hover { background: rgba(255,60,100,.15); color: #ff6e8a; border-color: #ff6e8a; }

  /* ── アニメーション ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes enableMenuClicks {
    from { pointer-events: none; }
    to   { pointer-events: auto; }
  }
  @keyframes glitch-a {
    0%,95%,100% { opacity:0; transform:none; }
    96% { opacity:.75; transform:translateX(-3px) skewX(-2deg); }
    97% { opacity:.6;  transform:translateX(3px); }
    98% { opacity:0; }
  }
  @keyframes glitch-b {
    0%,96%,100% { opacity:0; transform:none; }
    97%  { opacity:.65; transform:translateX(3px) skewX(2deg); }
    98.5%{ opacity:.5;  transform:translateX(-2px); }
    99%  { opacity:0; }
  }
  @keyframes titleRise {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-80px); }
    100% { transform: translateY(0); }
  }
  @keyframes pulseRing {
    0%   { opacity:.55; transform:scale(1); }
    100% { opacity:0;   transform:scale(1.35); }
  }

  /* スマホ細調整 */
  @media (max-width: 520px) {
    .footer-info { gap: 1.4em; flex-wrap: wrap; justify-content: center; }
    h1 { white-space: normal; text-align: center; }
  }

  /* ══════════════════════════════════════
     CREDITモーダル（スターウォーズ風クロール）
  ══════════════════════════════════════ */
  #credit-modal {
    display: none;
    position: fixed; inset: 0; z-index: 300;
    background: rgba(3,8,24,.55);
    overflow: hidden;
  }
  #credit-modal.show { display: block; opacity: 1; transition: opacity 1.5s ease; }
  #credit-modal.fade-out { opacity: 0; pointer-events: none; }

  /* パース空間：消失点を画面中央やや上に */
  #credit-stage {
    position: absolute;
    inset: 0;
    perspective: 240px;
    perspective-origin: 50% 21%;
    overflow: hidden;
  }

  /* クロールラッパー：画面下端を基点にrotateX・scrollTopで駆動 */
  #credit-crawl-wrap {
    position: absolute;
    width: 100%;
    left: 50%;
    top: 0; bottom: 0;
    transform-origin: 50% 21%;
    transform: translateX(-50%) rotateX(52deg);
    overflow: hidden;
  }

  /* コンテンツ：padding-topをJSで画面高さに設定して下端スタート */
  #credit-crawl {
    width: 100%;
    text-align: center;
    padding-bottom: 8vh;
  }

  /* スマホ縦画面：幅を90%に */
  @media (max-width: 600px) and (orientation: portrait) {
    #credit-crawl-wrap { width: 90%; }
  }

  /* 横並びの1行 */
  .credit-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(4px, 1vh, 10px);
    margin-bottom: clamp(32px, 7vh, 64px);
  }

  .credit-role {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(11px, 1.8vw, 18px);
    font-weight: 700;
    letter-spacing: .3em;
    color: #ff8c00;
    -webkit-text-stroke: 0;
    text-stroke: 0;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .credit-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(20px, 4.5vw, 48px);
    letter-spacing: .15em;
    color: #ff8c00;
    -webkit-text-stroke: 0;
    text-stroke: 0;
    text-transform: uppercase;
    white-space: normal;
    word-break: break-word;
    max-width: 80%;
    line-height: 1.3;
  }

  /* 上フェードマスク */
  #credit-stage::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to bottom,
      rgba(3,8,24,1.0)  0%,
      rgba(3,8,24,0.85) 45%,
      transparent       100%);
    z-index: 2;
    pointer-events: none;
  }

  /* 下フェードマスク */
  #credit-stage::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 12%;
    background: linear-gradient(to top, rgba(3,8,24,0.9) 0%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* CLOSEボタン */
  #credit-close {
    position: absolute;
    bottom: clamp(18px, 4vh, 36px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(11px, 1.4vw, 13px);
    letter-spacing: .35em;
    text-transform: uppercase;
    color: rgba(255,140,0,.6);
    background: transparent;
    border: 1px solid rgba(255,140,0,.4);
    padding: clamp(8px,1.2vh,12px) clamp(24px,4vw,40px);
    cursor: pointer;
    outline: none;
    transition: color .2s, border-color .2s;
  }
  #credit-close:hover {
    color: #ff8c00;
    border-color: #ff8c00;
  }


  /* ══════════════════════════════════════
     ステージ選択モーダル
  ══════════════════════════════════════ */
  #stage-modal {
    display: none;
    position: fixed; inset: 0; z-index: 300;
    background: rgba(3,8,24,.82);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #stage-modal.show { display: flex; }

  /* タイトル */
  .stage-modal-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 2.2vw, 22px);
    font-weight: 700;
    letter-spacing: .4em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: clamp(16px, 3vh, 28px);
    text-shadow: 0 0 12px rgba(0,200,255,.5);
  }

  /* カルーセル外枠 */
  .stage-carousel {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* 左右ナビボタン */
  .stage-nav {
    flex-shrink: 0;
    width: clamp(36px, 5vw, 52px);
    height: clamp(36px, 5vw, 52px);
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: rgba(0,200,255,.08);
    color: var(--accent);
    font-size: clamp(16px, 2vw, 22px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, box-shadow .2s;
    z-index: 2;
    margin: 0 clamp(12px, 2.5vw, 28px);
  }
  .stage-nav:hover {
    background: rgba(0,200,255,.22);
    box-shadow: 0 0 16px rgba(0,200,255,.4);
  }

  /* カードビューポート */
  .stage-cards-viewport {
    position: relative;
    width: clamp(300px, 82vw, 920px);
    height: clamp(240px, 44vw, 480px);
    overflow: hidden;
  }

  /* 個別カード：絶対配置 */
  .stage-card {
    position: absolute;
    top: 50%;
    left: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    will-change: transform, opacity;
    transition: transform .45s cubic-bezier(.4,0,.2,1), opacity .45s cubic-bezier(.4,0,.2,1);
    -webkit-tap-highlight-color: transparent;
  }

  .stage-card.pos-center {
    width: clamp(160px, 28vw, 280px);
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    z-index: 3;
    pointer-events: auto;
  }
  .stage-card.pos-prev {
    width: clamp(100px, 16vw, 180px);
    transform: translate(calc(-50% - clamp(140px, 24vw, 260px)), -50%) scale(0.65);
    opacity: .4;
    z-index: 2;
    pointer-events: auto;
  }
  .stage-card.pos-next {
    width: clamp(100px, 16vw, 180px);
    transform: translate(calc(-50% + clamp(140px, 24vw, 260px)), -50%) scale(0.65);
    opacity: .4;
    z-index: 2;
    pointer-events: auto;
  }
  .stage-card.pos-far-prev {
    width: clamp(100px, 16vw, 180px);
    transform: translate(calc(-50% - clamp(280px, 48vw, 520px)), -50%) scale(0.4);
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }
  .stage-card.pos-far-next {
    width: clamp(100px, 16vw, 180px);
    transform: translate(calc(-50% + clamp(280px, 48vw, 520px)), -50%) scale(0.4);
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }
  .stage-card.pos-prev:hover,
  .stage-card.pos-next:hover { opacity: .6; }

  /* 中央カードの説明文のみ表示、他は非表示 */

  /* 天体画像ラッパー */

<body>

    <div class="modal-btns">

<script>
/* ── パーティクル ── */
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function Star(){ this.reset(); }
  Star.prototype.reset = function(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.1 + .2;
    this.alpha = Math.random() * .6 + .15;
    this.speed = Math.random() * .3 + .05;
    this.twinkle = Math.random() * Math.PI * 2;
    this.twinkleSpeed = (Math.random() * .02 + .005) * (Math.random()<.5?1:-1);
  };
  Star.prototype.draw = function(dt){
    this.twinkle += this.twinkleSpeed;
    const a = this.alpha + Math.sin(this.twinkle) * .25;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${Math.random()<.15?'100,220,255':'200,225,255'},${Math.max(0,a)})`;
    ctx.fill();
    this.y -= this.speed * dt * .016;
    if(this.y < -2){ this.reset(); this.y = H; }
  };

  let shooting = null;
  function spawnShoot(){
    shooting = {
      x: Math.random() * W * .7 + W * .15,
      y: Math.random() * H * .3,
      vx: (Math.random() * 3 + 2) * (Math.random()<.5?1:-1),
      vy: Math.random() * 2 + 1,
      life: 1, maxLife: 60 + Math.random()*40,
      len: 90 + Math.random()*60
    };
  }
  setInterval(spawnShoot, 5000 + Math.random()*3000);
  setTimeout(spawnShoot, 1800);

  const STAR_COUNT = Math.min(220, Math.floor(W * H / 6000));
  for(let i=0; i<STAR_COUNT; i++) pts.push(new Star());

  let last = performance.now();
  function loop(now){
    const dt = now - last; last = now;
    ctx.clearRect(0,0,W,H);
    for(const s of pts) s.draw(dt);

    if(shooting){
      const t = 1 - shooting.life / shooting.maxLife;
      const x0 = shooting.x - shooting.vx * shooting.len * t;
      const y0 = shooting.y - shooting.vy * shooting.len * t;
      const g = ctx.createLinearGradient(x0,y0, shooting.x,shooting.y);
      g.addColorStop(0,'rgba(0,200,255,0)');
      g.addColorStop(1,`rgba(180,230,255,${.85*(1-t)})`);
      ctx.beginPath();
      ctx.moveTo(x0,y0);
      ctx.lineTo(shooting.x,shooting.y);
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      shooting.x += shooting.vx * dt * .016;
      shooting.y += shooting.vy * dt * .016;
      shooting.life--;
      if(shooting.life <= 0 ||
         shooting.x < -50 || shooting.x > W+50 ||
         shooting.y > H+50) shooting = null;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

/* ============================================================
   セーブデータ（localStorage）
   unlockedStage   : 解放済みの最大ステージID（0=全未解放）
   unlockedEpisode : 解放済みの最大エピソード番号（0=全未解放）
   novel01読了→ステージ1解放 / ステージ1クリア→エピソード1(novel02)解放
============================================================ */
const SAVE_KEY = 'stellarDeleteSave';
const defaultSaveData = { unlockedStage: 0, unlockedEpisode: 0 };

function loadSaveData() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? Object.assign({}, defaultSaveData, JSON.parse(raw)) : Object.assign({}, defaultSaveData);
  } catch(e) { return Object.assign({}, defaultSaveData); }
}
function saveGame(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}
function unlockStage(stageId, saveData) {
  if (stageId > saveData.unlockedStage) {
    saveData.unlockedStage = stageId;
    saveGame(saveData);
  }
}
function unlockEpisode(ep, saveData) {
  if (ep > saveData.unlockedEpisode) {
    saveData.unlockedEpisode = ep;
    saveGame(saveData);
  }
}

const saveData = loadSaveData();

/* ── サウンド制御 ── */
const sndTitle  = document.getElementById('snd-title');
const sndStage  = document.getElementById('snd-stage');
const efeSelect = document.getElementById('efe-select');

function playTitle() {
  sndStage.pause(); sndStage.currentTime = 0;
  sndTitle.volume = 0.7;
  sndTitle.play().catch(() => {});
}
function playStage() {
  sndTitle.pause(); sndTitle.currentTime = 0;
  sndStage.volume = 0.7;
  sndStage.play().catch(() => {});
}
function playSelect() {
  efeSelect.currentTime = 0;
  efeSelect.volume = 1.0;
  efeSelect.play().catch(() => {});
}

// 最初のタップ/クリックでタイトルBGM開始（ブラウザ自動再生制限対策）
function startTitleBGMOnFirstClick() {
  playTitle();
  document.removeEventListener('click', startTitleBGMOnFirstClick);
}
document.addEventListener('click', startTitleBGMOnFirstClick, { once: true });

/* ── メニュー操作 ── */

// ── ステージ選択 ──
const stageModal    = document.getElementById('stage-modal');
const stageViewport = document.getElementById('stage-cards-viewport');
const stageDots     = document.getElementById('stage-dots');
let stageData  = [];
let currentIdx = 0;
let isStoryFixedSelect = false;

let isAnimating = false;

function cardHtml(idx, pos) {
  const s = stageData[idx];
  const isLocked = s.id > (saveData.unlockedStage || 0);
  const posClass = pos ? ' ' + pos : '';
  const total = (s.grid_col && s.grid_row) ? s.grid_col * s.grid_row : null;
  const gridStr  = (s.grid_col && s.grid_row)
    ? isLocked
      ? `<span class="stage-unknown">???</span>×<span class="stage-unknown">???</span>`
      : `${s.grid_col}×${s.grid_row}<span class="grid-total">(${total ? total.toLocaleString() : ''})</span>`
    : '';
  const minesStr = s.mines != null
    ? isLocked ? `星傷数 <span class="stage-unknown">??</span>` : `星傷数 ${s.mines.toLocaleString()}`
    : '';
  const descStr = isLocked
    ? `EP.${s.id - 1} を読み終わると解放されます`
    : (s.description || '');
  return `<div class="stage-card${isLocked ? ' locked' : ''}${posClass}" data-idx="${idx}" data-id="${s.id}" data-locked="${isLocked}">
    <div class="stage-img-wrap">
      <img src="${s.image || ''}" data-src="${s.image || ''}" alt="" draggable="false"
           onerror="if(!this.dataset.r){this.dataset.r=1;this.src=this.dataset.src;}else{this.onerror=null;this.style.background='rgba(13,31,60,.9)';}">
      <div class="stage-overlay">
        ${s.difficulty ? `<div class="stage-overlay-diff">${isLocked ? '???' : s.difficulty}</div>` : ''}
        ${gridStr      ? `<div class="stage-overlay-grid">${gridStr}</div>`      : ''}
        ${minesStr     ? `<div class="stage-overlay-mines">${minesStr}</div>`    : ''}
      </div>
    </div>
    <div class="stage-num">STAGE ${String(s.id).padStart(2,'0')}</div>
    <div class="stage-name">${isLocked ? '???' : (s.name || '')}</div>
    <div class="stage-desc">${descStr}</div>
  </div>`;
}

function mod(n, m) { return ((n % m) + m) % m; }

// ── STORYモード：ステージ選択を1件に固定 ──
function applyStoryFixedFilter(stageId) {
  const target = stageData.find(s => String(s.id) === String(stageId));
  if (target) stageData = [target];
  currentIdx = 0;
  isStoryFixedSelect = true;
  document.getElementById('stage-prev').style.display = 'none';
  document.getElementById('stage-next').style.display = 'none';
  stageDots.style.display = 'none';
}

function resetStoryFixedFilter() {
  isStoryFixedSelect = false;
  document.getElementById('stage-prev').style.display = '';
  document.getElementById('stage-next').style.display = '';
  stageDots.style.display = '';
}

function buildStageCards() {
  if (isStoryFixedSelect) {
    // 固定ステージのみを中央表示。前後カードは出さない
    stageViewport.innerHTML = cardHtml(0, 'pos-center');
    updateStartBtn();
    return;
  }

  const total = stageData.length;
  const idxs = {
    'pos-far-prev': mod(currentIdx - 2, total),
    'pos-prev':     mod(currentIdx - 1, total),
    'pos-center':   currentIdx,
    'pos-next':     mod(currentIdx + 1, total),
    'pos-far-next': mod(currentIdx + 2, total),
  };

  stageViewport.innerHTML = Object.entries(idxs)
    .map(([pos, idx]) => cardHtml(idx, pos))
    .join('');

  updateDots();
  bindCardClicks();
  updateStartBtn();
  updateStageBestTime();
}

function updateStageBestTime() {
  const el = document.getElementById('stage-best-time');
  if (!el) return;
  const s = stageData[currentIdx];
  if (!s) { el.textContent = ''; return; }
  try {
    const key = 'stellarDeleteRanking_stage_' + s.id;
    const records = JSON.parse(localStorage.getItem(key) || '[]');
    if (records.length > 0) {
      const best = records[0].time;
      const ms = Math.round(best * 1000);
      const intPart = Math.floor(ms / 1000);
      const fracPart = String(ms % 1000).padStart(3, '0');
      el.textContent = 'BEST  ' + intPart + '.' + fracPart + ' SEC';
    } else {
      el.textContent = '';
    }
  } catch(e) { el.textContent = ''; }
}

function updateDots() {
  stageDots.innerHTML = stageData.map((_, i) =>
    `<span class="stage-dot ${i === currentIdx ? 'active' : ''}" data-i="${i}"></span>`
  ).join('');
  stageDots.querySelectorAll('.stage-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      if (isAnimating) return;
      const target = parseInt(dot.dataset.i);
      if (target === currentIdx) return;
      currentIdx = target;
      buildStageCards();
    });
  });
}

function bindCardClicks() {
  stageViewport.querySelector('.stage-card.pos-prev')?.addEventListener('click', () => slide(-1));
  stageViewport.querySelector('.stage-card.pos-next')?.addEventListener('click', () => slide(1));
}

function slide(dir) {
  if (isAnimating || stageData.length === 0 || isStoryFixedSelect) return;
  isAnimating = true;

  const total = stageData.length;
  const cards = stageViewport.querySelectorAll('.stage-card');

  // 方向に応じてクラスをシフト
  const order = dir === 1
    ? ['pos-far-prev', 'pos-prev', 'pos-center', 'pos-next', 'pos-far-next']
    : ['pos-far-next', 'pos-next', 'pos-center', 'pos-prev', 'pos-far-prev'];

  // 新しく端に入るカードを追加
  const newIdx = dir === 1
    ? mod(currentIdx + 3, total)
    : mod(currentIdx - 3, total);
  const newPos = dir === 1 ? 'pos-far-next' : 'pos-far-prev';
  const tmp = document.createElement('div');
  tmp.innerHTML = cardHtml(newIdx, newPos);
  const newCard = tmp.firstElementChild;
  // 即座に端外に配置してからアニメ開始
  newCard.style.transition = 'none';
  stageViewport.appendChild(newCard);
  void newCard.offsetWidth; // reflow
  newCard.style.transition = '';

  // インデックスを更新
  currentIdx = mod(currentIdx + dir, total);
  updateStartBtn();

  // 各カードのクラスを移行先に変更
  const shiftMap = dir === 1
    ? { 'pos-far-prev': null, 'pos-prev': 'pos-far-prev', 'pos-center': 'pos-prev',
        'pos-next': 'pos-center', 'pos-far-next': 'pos-next' }
    : { 'pos-far-next': null, 'pos-next': 'pos-far-next', 'pos-center': 'pos-next',
        'pos-prev': 'pos-center', 'pos-far-prev': 'pos-prev' };

  const positions = ['pos-far-prev','pos-prev','pos-center','pos-next','pos-far-next'];
  cards.forEach(card => {
    const cur = positions.find(p => card.classList.contains(p));
    if (!cur) return;
    const next = shiftMap[cur];
    card.classList.remove(cur);
    if (next) {
      card.classList.add(next);
    } else {
      // 端を過ぎたカードはフェードアウト後削除
      card.style.opacity = '0';
      card.style.pointerEvents = 'none';
    }
  });

  // 新カードを正しい位置へ
  newCard.classList.remove(newPos);
  newCard.classList.add(dir === 1 ? 'pos-far-next' : 'pos-far-prev');

  // トランジション完了後の後処理
  setTimeout(() => {
    buildStageCards();
    isAnimating = false;
  }, 460);

  updateDots();
}

let touchStartX = 0, touchStartY = 0;
stageViewport.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
stageViewport.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    slide(dx < 0 ? 1 : -1);
  }
}, { passive: true });

  { label:'EP.0', sub:'FLAT',        novel:'novel/novel01.html', always:true  },
  { label:'EP.1', sub:'RUGE',        novel:'novel/novel02.html', minEp:1 },

  { label:'EP.6', sub:'ABIS',        novel:'novel/novel07.html', minEp:6 },
  { label:'EP.7', sub:'XENO',        novel:'novel/novel08.html', minEp:7 },

function buildEpisodeList() {
  const list = document.getElementById('episode-list');
  list.innerHTML = EPISODES.map(ep => {
    if (!ep) return '<div class="ep-divider"></div>';
    const unlocked = ep.always
      ? true  // EP0は常時表示可（初回または再読どちらでも押せる）
      : (saveData.unlockedEpisode || 0) >= ep.minEp;
    // 全エピソードとも通常進行URL（?reread=1なし）。
    // 解放済みのステージを再解放しないよう unlock処理側でガード済みなので問題なし。
    // 再読後はnextUrl通りにステージ選択へ進む（タイトルへ戻るより自然なUXのため）。
    const href = ep.novel;
    const sub = ep.sub ? ` <span>${ep.sub}</span>` : '';
    return `<button class="ep-btn${unlocked ? '' : ' locked'}" data-href="${href}">
      <span class="ep-label">${ep.label}</span>${sub}
    </button>`;
  }).join('');
  list.querySelectorAll('.ep-btn:not(.locked)').forEach(btn => {
    btn.addEventListener('click', () => {
      if (_titleNavLocked) return;
      _titleNavLocked = true;
      window.location.href = btn.dataset.href;
    });
  });
}

// CREDIT
const creditModal    = document.getElementById('credit-modal');
const creditCrawl    = document.getElementById('credit-crawl');
const creditWrap     = document.getElementById('credit-crawl-wrap');
const CREDIT_SPEED   = 60; // px/秒

let creditScrollY  = 0;
let creditLastTime = null;
let creditRAF      = null;
let creditRunning  = false;

function buildCredits(data) {
  creditCrawl.innerHTML = data.map(item => `
    <div class="credit-block">
      <span class="credit-role">${item.role}</span>
      <span class="credit-name">${item.name.replace(/▲/g, '<br>')}</span>
    </div>
  `).join('');
}

function startCrawl() {
  creditCrawl.style.paddingTop    = (window.innerHeight * 0.6) + 'px';
  creditCrawl.style.paddingBottom = window.innerHeight + 'px';
  creditScrollY  = 0;
  creditWrap.scrollTop = 0;
  creditLastTime = null;
  creditRunning  = true;
  if (creditRAF) cancelAnimationFrame(creditRAF);
  creditRAF = requestAnimationFrame(tickCrawl);
}

function tickCrawl(now) {
  if (!creditRunning) return;
  if (creditLastTime !== null) {
    const dt = (now - creditLastTime) / 1000;
    creditScrollY += CREDIT_SPEED * dt;
    creditWrap.scrollTop = creditScrollY;
    const maxScroll = creditWrap.scrollHeight - creditWrap.offsetHeight;
    if (creditScrollY >= maxScroll) {
      creditRunning = false;
      // フェードアウトして自動クローズ
      setTimeout(() => {
        creditModal.classList.add('fade-out');
        setTimeout(() => {
          creditModal.classList.remove('show', 'fade-out');
        }, 2000);
      }, 3000);
      return;
    }
  }
  creditLastTime = now;
  creditRAF = requestAnimationFrame(tickCrawl);
}

// リサイズ：scrollTop を比率で再マッピング
window.addEventListener('resize', () => {
  if (!creditModal.classList.contains('show')) return;
  const maxBefore = creditWrap.scrollHeight - creditWrap.offsetHeight;
  const ratio = maxBefore > 0 ? creditScrollY / maxBefore : 0;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      creditCrawl.style.paddingTop = (window.innerHeight * 0.6) + 'px';
      const maxAfter = creditWrap.scrollHeight - creditWrap.offsetHeight;
      creditScrollY = ratio * maxAfter;
      creditWrap.scrollTop = creditScrollY;
    });
  });
});

document.getElementById('credit-btn').addEventListener('click', function(){
  fetch('data/credits.json')
    .then(r => r.json())
    .then(data => {
      buildCredits(data);
      creditModal.classList.add('show');
      startCrawl();
    })
    .catch(() => {
      creditCrawl.innerHTML = '<div class="credit-block"><span class="credit-name">credits.json not found</span></div>';
      creditModal.classList.add('show');
      startCrawl();
    });
});

  creditModal.classList.remove('show');
});
