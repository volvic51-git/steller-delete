<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Stellar Delete — 操作マニュアル</title>
<style>
  *,*::before,*::after{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#05060c; font-family:'Share Tech Mono',monospace; color:#e7f4ff;
    -webkit-user-select:none; user-select:none; }
  #manual-root{ position:fixed; inset:0; overflow:hidden; background:#05060c; touch-action:none; }
  #screenshot-wrap{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:#05060c; transform-origin:50% 50%;
    transition:transform 0.55s cubic-bezier(.4,0,.2,1); will-change:transform;
  }
  #manualScreenshot{ display:block; pointer-events:none; max-width:100%; max-height:100%; width:auto; height:auto; }
  #spotlight{
    position:absolute; top:0; left:0; width:0; height:0; border-radius:16px;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.75);
    border:2px solid rgba(0,200,255,0.9); outline:2px solid rgba(0,200,255,0.25); outline-offset:6px;
    pointer-events:none;
    transition:top .45s cubic-bezier(.4,0,.2,1), left .45s cubic-bezier(.4,0,.2,1),
               width .45s cubic-bezier(.4,0,.2,1), height .45s cubic-bezier(.4,0,.2,1), border-radius .45s;
    animation:spotPulse 1.8s ease-in-out infinite;
  }
  @keyframes spotPulse{
    0%,100%{ box-shadow:0 0 0 9999px rgba(0,0,0,.75),0 0 0 0 rgba(0,200,255,.3); }
    50%{     box-shadow:0 0 0 9999px rgba(0,0,0,.75),0 0 20px 4px rgba(0,200,255,.5); }
  }
  #panel{
    position:absolute; left:0; right:0; bottom:0; z-index:30;
    background:linear-gradient(180deg, rgba(5,8,20,0) 0%, rgba(5,8,22,.93) 18%, rgba(5,8,22,.98) 100%);
    padding:20px 20px calc(18px + env(safe-area-inset-bottom,0px));
    border-top:1px solid rgba(0,200,255,.2);
  }
  #step-indicator{ font-size:11px; letter-spacing:.15em; color:#5fa8d6; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  #step-dots{ display:flex; gap:4px; }
  #step-dots span{ width:5px; height:5px; border-radius:50%; background:rgba(95,168,214,.3); transition:background .2s,transform .2s; }
  #step-dots span.active{ background:#00ccff; transform:scale(1.5); }
  #panel-title{ font-family:'Orbitron',sans-serif; font-size:clamp(15px,4.5vw,20px); font-weight:700; color:#00ccff; letter-spacing:.06em; margin:0 0 8px; text-shadow:0 0 10px rgba(0,200,255,.5); }
  #panel-desc{ font-size:clamp(12px,3.5vw,14px); line-height:1.85; color:#cfe8ff; margin:0 0 16px; white-space:pre-line; min-height:3.5em; }
  #panel-nav{ display:flex; gap:10px; }
  #panel-nav button{ flex:1; font-family:'Share Tech Mono',monospace; font-size:13px; padding:11px 0; border-radius:4px; cursor:pointer; transition:all .2s; }
  #btn-prev{ background:rgba(0,20,40,.7); border:1px solid rgba(0,200,255,.3); color:#7fc8e8; }
  #btn-prev:disabled{ opacity:.3; pointer-events:none; }
  #btn-next{ background:rgba(0,90,160,.5); border:1px solid rgba(0,200,255,.8); color:#eaffff; box-shadow:0 0 12px rgba(0,180,255,.2); }
  #btn-close{ position:fixed; top:14px; right:14px; z-index:40; width:34px; height:34px; border-radius:50%; background:rgba(0,10,25,.8); border:1px solid rgba(0,200,255,.4); color:#9fd8f5; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #complete-screen{ position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; text-align:center; padding:24px; background:radial-gradient(ellipse at center,rgba(10,20,50,.97) 0%,rgba(2,4,10,.99) 75%); }
  #complete-screen h1{ font-family:'Orbitron',sans-serif; font-size:clamp(20px,7vw,30px); color:#00e0ff; letter-spacing:.12em; margin:0; text-shadow:0 0 18px rgba(0,200,255,.6); }
  #complete-screen p{ font-size:clamp(13px,4vw,15px); line-height:2; color:#cfe8ff; margin:0; white-space:pre-line; }
  #btn-start-game{ margin-top:10px; padding:14px 48px; font-family:'Share Tech Mono',monospace; font-size:14px; letter-spacing:.15em; color:#eaffff; background:rgba(0,90,160,.55); border:1px solid rgba(0,200,255,.9); border-radius:4px; cursor:pointer; box-shadow:0 0 20px rgba(0,180,255,.35); transition:transform .2s; }
  #empty-msg{ position:fixed; inset:0; z-index:99; display:flex; align-items:center; justify-content:center; background:#05060c; color:#5fa8d6; font-size:13px; text-align:center; line-height:2; padding:24px; }
  [hidden]{ display:none !important; }
  @media (orientation:landscape){ #panel{ padding:12px 24px calc(10px + env(safe-area-inset-bottom,0px)); } #panel-desc{ min-height:0; } }
</style>
</head>

<div id="manual-root">
  <div id="screenshot-wrap">
    <img id="manualScreenshot" alt="プレイ画面">
  </div>
  <div id="spotlight"></div>
  <button id="btn-close" type="button">✕</button>
  <div id="panel">
    <div id="step-indicator">
      <span>STEP <span id="step-num">1</span> / <span id="step-total">0</span></span>
      <div id="step-dots"></div>
    </div>
    <h2 id="panel-title"></h2>
    <p id="panel-desc"></p>
    <div id="panel-nav">
      <button id="btn-prev" type="button">← 前へ</button>
      <button id="btn-next" type="button">次へ →</button>
    </div>
  </div>
</div>
<div id="complete-screen" hidden>
  <h1>チュートリアル完了</h1>
  <p>それでは、星々の救出へ向かいましょう。</p>
  <button id="btn-start-game" type="button">TITLE</button>
</div>
<div id="empty-msg" hidden>
  manual-editor.html から「manual.html 書き出し」ボタンで<br>書き出したファイルを開いてください。
</div>

<script>
(function(){
'use strict';

/* データ読み込み（type=application/jsonなので自動実行されない・404も出ない） */
var _data = {};
try{ _data = JSON.parse(document.getElementById('manual-data').textContent); }
catch(e){}
var STEPS   = Array.isArray(_data.steps) ? _data.steps : [];
var IMG_SRC = _data.imgSrc || '';

/* ステップが無い場合（テンプレートを直接開いた） */
if(!STEPS.length){
  document.getElementById('empty-msg').hidden = false;
  document.getElementById('manual-root').hidden = true;
  return;
}

var img         = document.getElementById('manualScreenshot');
var wrap        = document.getElementById('screenshot-wrap');
var spotlight   = document.getElementById('spotlight');
var panelTitle  = document.getElementById('panel-title');
var panelDesc   = document.getElementById('panel-desc');
var stepNumEl   = document.getElementById('step-num');
var stepTotalEl = document.getElementById('step-total');
var stepDotsEl  = document.getElementById('step-dots');
var btnPrev     = document.getElementById('btn-prev');
var btnNext     = document.getElementById('btn-next');
var completeSc  = document.getElementById('complete-screen');

if(IMG_SRC) img.src = IMG_SRC;

/* BGM（ブラウザの自動再生制限のため、最初のタップで開始） */
var _bgm = new Audio('../sounds/SND_02_play.mp3');
_bgm.loop = true; _bgm.volume = 0.55;
document.addEventListener('click', function _startBgm(){
  _bgm.play().catch(function(){});
  document.removeEventListener('click', _startBgm);
}, { once: true });

stepTotalEl.textContent = STEPS.length;
STEPS.forEach(function(_,i){
  var d = document.createElement('span');
  stepDotsEl.appendChild(d);
});

function getImgRect(){
  var cw=wrap.clientWidth, ch=wrap.clientHeight;
  var iw=img.naturalWidth, ih=img.naturalHeight;
  if(!iw||!ih) return {x:0,y:0,w:cw,h:ch};
  var sc=Math.min(cw/iw,ch/ih);
  var dw=iw*sc, dh=ih*sc;
  return {x:(cw-dw)/2, y:(ch-dh)/2, w:dw, h:dh};
}

var currentScale = 1;
function applyZoom(step, cx, cy){
  var oxPct=(cx/wrap.clientWidth*100).toFixed(3);
  var oyPct=(cy/wrap.clientHeight*100).toFixed(3);
  var r=getImgRect();
  var sw=(step.w/100)*r.w, sh=(step.h/100)*r.h;
  var sc=Math.min((wrap.clientWidth*.6)/sw,(wrap.clientHeight*.6)/sh,2.8);
  sc=Math.max(sc,1); currentScale=sc;
  wrap.style.transformOrigin=oxPct+'% '+oyPct+'%';
  wrap.style.transform='scale('+sc.toFixed(4)+')';
}

var idx=0;
function render(){
  var step=STEPS[idx];
  var r=getImgRect();
  var sx=r.x+(step.x/100)*r.w, sy=r.y+(step.y/100)*r.h;
  var sw=(step.w/100)*r.w,      sh=(step.h/100)*r.h;
  var cx=sx+sw/2, cy=sy+sh/2;
  applyZoom(step,cx,cy);
  var sc=currentScale;
  var sw_v=sw*sc, sh_v=sh*sc;
  spotlight.style.left  =(cx-sw_v/2)+'px'; spotlight.style.top   =(cy-sh_v/2)+'px';
  spotlight.style.width =sw_v+'px';        spotlight.style.height=sh_v+'px';
  spotlight.style.borderRadius=(step.shape==='circle')?'50%':'14px';
  panelTitle.textContent=step.title||''; panelDesc.textContent=step.desc||'';
  stepNumEl.textContent=idx+1;
  Array.prototype.forEach.call(stepDotsEl.children,function(d,i){ d.classList.toggle('active',i===idx); });
  btnPrev.disabled=(idx===0);
  btnNext.textContent=(idx===STEPS.length-1)?'完了 →':'次へ →';
}

function next(){ if(idx<STEPS.length-1){idx++;render();}else{wrap.style.transform='scale(1)';completeSc.hidden=false;} }
function prev(){ if(idx>0){idx--;render();} }
function closeManual(){ _bgm.pause(); _bgm.currentTime=0; window.location.href='index.html'; }

btnPrev.addEventListener('click',prev);
btnNext.addEventListener('click',next);
document.getElementById('btn-close').addEventListener('click',closeManual);
document.getElementById('btn-start-game').addEventListener('click',closeManual);

var tx=0,ty=0,ta=false;
document.getElementById('manual-root').addEventListener('touchstart',function(e){
  if(e.touches.length!==1)return; tx=e.touches[0].clientX; ty=e.touches[0].clientY; ta=true;
},{passive:true});
document.getElementById('manual-root').addEventListener('touchend',function(e){
  if(!ta)return; ta=false;
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy))return;
  if(dx<0) next(); else prev();
},{passive:true});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev(); if(e.key==='Escape')closeManual();
});
var rt=null;
window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(render,80); });

if(img.complete&&img.naturalWidth){ render(); }
else{ img.addEventListener('load',render); img.addEventListener('error',function(){ render(); }); }
})();
</script>
</body>
</html>
