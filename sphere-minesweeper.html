// NORMALモード：ミス時にヒントゲージを消費。0未満になったらゲームオーバー（trueを返す）
function consumeNormalGauge(amount){
  hintCount += amount;
  updateHintGauge();
  const statHints = document.getElementById('stat-hints');
  if(statHints) statHints.textContent = hintCount;
  SND.damage.currentTime=0; SND.damage.play().catch(()=>{});
  if(hintCount > maxHints){
    return true; // ゲージ切れ→ゲームオーバー
  }
  return false;
}

// ヒントゲージを1秒間赤く点滅させる（ペナルティ発生の視覚フィードバック）
function flashHintGaugePenalty(){
  const fillRing = document.getElementById('hint-fill-ring');
  const bgRing   = document.getElementById('hint-bg-ring');
  if(!fillRing) return;
  let blinkCount = 0;
  const maxBlinks = 4; // 0.25秒×4=1秒
  const originalFill = fillRing.getAttribute('stroke');
  const blinkInterval = setInterval(()=>{
    blinkCount++;
    const isRed = blinkCount % 2 === 1;
    fillRing.setAttribute('stroke', isRed ? '#ff2200' : (originalFill||'#00ffcc'));
    if(bgRing) bgRing.setAttribute('stroke', isRed ? 'rgba(255,30,0,0.5)' : 'rgba(0,60,80,0.3)');
    if(blinkCount >= maxBlinks){
      clearInterval(blinkInterval);
      fillRing.setAttribute('stroke', originalFill||'#00ffcc');
      if(bgRing) bgRing.setAttribute('stroke', 'rgba(0,60,80,0.3)');
    }
  }, 250);
}

function updateHintGauge(){
  const bgRing   = document.getElementById('hint-bg-ring');
  const fillRing = document.getElementById('hint-fill-ring');
  if(!bgRing || !fillRing) return;

  const r    = 24;
  const circ = 2 * Math.PI * r;   // 150.796
  const gap  = 4;
  const n    = maxHints;
  const segLen = n > 0 ? (circ - gap * n) / n : circ;
  const remaining = Math.max(0, n - hintCount);

  // dasharray: セグメント+ギャップ を n回繰り返す
  const da = Array.from({length: n}, () => `${segLen.toFixed(3)} ${gap}`).join(' ');
  bgRing.setAttribute('stroke-dasharray', da);
  fillRing.setAttribute('stroke-dasharray', da);

  // fill側: 残量分だけ表示（dashoffset で隠す）
  // remaining=n → 全表示: offset=0
  // remaining=0 → 全非表示: offset=circ（全部スキップ）
  // remaining=k → セグメントk個分の長さ = segLen*k + gap*(k-1)
  const filledLen = remaining > 0 ? segLen * remaining + gap * (remaining - 1) : 0;
  // dashoffsetで前方からfilledLen分だけ表示し残りを隠す
  // offset=0 → 最初のセグメントから表示開始
  // 反時計回りに減らすには、末尾セグメントから消す
  // → dashoffsetを負方向（= circ - filledLen）にして末尾から表示する
  // → つまり 12時から反時計回りにfilledLen分を表示
  // SVGはrotate(-90deg)で12時スタート、sweep方向は時計回り
  // 反時計回りに減らす = 末尾（時計回り最後）から消す = 先頭からfilledLen分だけ表示
  fillRing.setAttribute('stroke-dashoffset', '0');
  // fill ringのdaを先頭filledLen分だけ表示するようにdaを再設定
  if(remaining === n){
    // 全表示
    fillRing.setAttribute('stroke-dasharray', da);
  } else if(remaining === 0){
    // 全非表示
    fillRing.setAttribute('stroke-dasharray', `0 ${circ}`);
  } else {
    // 先頭remaining個のセグメントのみ表示
    const visibleDa = Array.from({length: n}, (_, i) => {
      if(i < remaining) return `${segLen.toFixed(3)} ${gap}`;
      // このセグメントを非表示にする（セグメント長を0にしてgapで埋める）
      return `0 ${(segLen + gap).toFixed(3)}`;
    }).join(' ');
    fillRing.setAttribute('stroke-dasharray', visibleDa);
  }
  fillRing.setAttribute('stroke-dashoffset', '0');

  // ヒント0のときアイコンをグレーアウト
  const overlay = document.getElementById('hint-btn-overlay');
  if(overlay) overlay.style.opacity = remaining > 0 ? '0' : '1';
}

function debugClear(){

    placeMines(0,0);
    startTimer();
    calcTotalNonMineCells();

  if(gameState!=='playing') return;
  // 全地雷を除去済みにする
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=board[r][c];
    if(cell.isMine&&!cell.isRemoved){
      cell.isMine=false; cell.isRemoved=true; removedMines++;
      if(cell.mesh){ boardGroup.remove(cell.mesh); cell.mesh=null; }
    }
  }
  // 全非地雷セルを開放・即消滅
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=board[r][c];
    if(!cell.isRemoved&&!cell.isMine){
      cell.isOpen=true; cell.isRemoved=true;
      vanishedNonMine++;
      if(cell.mesh){ boardGroup.remove(cell.mesh); cell.mesh=null; }
    }
  }
  calcNeighbors();
  updateCharacterReveal();
  updateStats();

  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  if(!_backCullCamDir){
    _backCullCamDir = new THREE.Vector3();
    _backCullNormal = new THREE.Vector3();
    _backCullInvQ   = new THREE.Quaternion();
  }

  // Inertia when not dragging
  if(!isDragging){
    boardGroup.rotation.y+=velX*0.003;
    boardGroup.rotation.x+=velY*0.003;
    velX*=0.90; velY*=0.90;
  }

  // Auto rotate (hint camera)
  if(autoRotating){
    autoRotateProgress=Math.min(1,autoRotateProgress+dt*2.2);
    const t=easeInOut(autoRotateProgress);
    boardGroup.rotation.x=autoRotateFrom.x+(autoRotateTo.x-autoRotateFrom.x)*t;
    boardGroup.rotation.y=autoRotateFrom.y+(autoRotateTo.y-autoRotateFrom.y)*t;
    if(autoRotateProgress>=1) autoRotating=false;
  }

  boardGroup.rotation.x=Math.max(-Math.PI*0.45, Math.min(Math.PI*0.45, boardGroup.rotation.x));

  // Zoom
  camera.position.z+=(zoomDist-camera.position.z)*0.1;
  syncCharaLayerSize();

  // 後ろ半球のパネルを非表示（カメラ側を向いているパネルのみ表示）
  _backCullCamDir.set(0,0,1).applyQuaternion(_backCullInvQ.copy(boardGroup.quaternion).invert());
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!board[r]) continue; // initBoard途中のタイミング保護
    const cell=board[r][c];
    if(!cell||!cell.mesh||cell.isRemoved||cell.animating) continue;
    cell.mesh.visible = (_backCullNormal.copy(cell.mesh.position).normalize().dot(_backCullCamDir) > 0);
  }
  updateCageWire(dt);
  updateAutoSearch(dt);

  // Hint pulse
  if(hintTarget){
    if(!hintTarget.mesh || hintTarget.isRemoved || hintTarget.isOpen){
      clearHintHighlight(hintTarget);
      hintTarget=null;
    } else {
      hintAnimTime+=dt*3;
      const pulse=0.5+0.5*Math.sin(hintAnimTime*2*Math.PI);
    hintTarget.mesh.material.emissive.setHex(hintTarget.isMine?0x441100:0x004422);
      hintTarget.mesh.material.emissiveIntensity=0.5+pulse*1.5;
      const brd=hintTarget.mesh.children.find(c=>c.isLine);
      if(brd) brd.material.color.setHex(hintTarget.isMine?0xff6600:0x00ff88);
      // ハイライトはセルが開かれるまで維持（時間による自動消灯なし）
    }
  }

  // ゲームオーバー：ミスしたセルのハイライト（CHECKモード中も含めリスタートまで維持）
  if(gameOverMistakeCell && gameOverMistakeCell.mesh){
    gameOverMistakeAnimTime+=dt*3;
    const mpulse=0.5+0.5*Math.sin(gameOverMistakeAnimTime*2*Math.PI);
    gameOverMistakeCell.mesh.material.emissive.setHex(0xff0044);
    gameOverMistakeCell.mesh.material.emissiveIntensity=0.6+mpulse*1.8;
    const mbrd=gameOverMistakeCell.mesh.children.find(c=>c.isLine);
    if(mbrd) mbrd.material.color.setHex(0xffffff);
  }

  // Cell removal animations
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!board[r]) continue;
    const cell=board[r][c];
    if(cell.mesh && cell.mesh.userData._appearAnimating){
      cell.mesh.userData._appearProgress += dt * 2.2;
      const p = Math.min(1, cell.mesh.userData._appearProgress);
      const ease = easeInOut(p);
      cell.mesh.scale.setScalar(Math.max(0.001, ease));
      if(p >= 1){ cell.mesh.userData._appearAnimating = false; }
    }
    if(cell.animating&&cell.mesh){
      const speed = cell._animSpeed||2.5;
      cell.animProgress+=dt*speed;
      const p=Math.min(1,cell.animProgress), ease=easeInOut(p);
      if(cell._animType==='zero'){
        // 0セル: ゆっくり縮小しながらフェード（内側に吸い込まれる）
        const scale=1-ease*0.9;
        cell.mesh.scale.setScalar(Math.max(scale,0.001));
        cell.mesh.material.transparent=true;
        cell.mesh.material.opacity=1-ease;
      } else {
        // 地雷セル: 弾け飛ぶ
        cell.mesh.position.copy(cell.animPos).addScaledVector(cell.animPos.clone().normalize(),ease*0.3);
        cell.mesh.rotation.x=ease*Math.PI*2; cell.mesh.rotation.z=ease*Math.PI;
        cell.mesh.material.transparent=true;
        cell.mesh.material.opacity=1-ease;
      }
      if(p>=1){ scene.remove(cell.mesh); cell.mesh=null; cell.animating=false; }
    }
  }

  // Particles
  for(let i=particleGroup.children.length-1;i>=0;i--){
    const p=particleGroup.children[i];
    p.position.add(p._vel); p._vel.multiplyScalar(0.95);
    p._life-=dt*1.5; p.material.opacity=Math.max(0,p._life);
    if(p._life<=0) particleGroup.remove(p);
  }

  sphereWire.rotation.y+=dt*0.04;

  // 制限時間ゲージ：毎フレーム滑らかに更新
  if(timeLimitMode && gameState==='playing' && totalTime > 0){
    const _elapsedSec = window._timerStartMs ? (performance.now() - window._timerStartMs) / 1000 : elapsed;
    remainingTime = Math.max(0, totalTime - _elapsedSec);
    updateTimeLimitGauge();
    if(remainingTime <= 0 && totalTime - elapsed <= 0){
      clearInterval(timerInterval);
      triggerGameOverSequence('__timeup__');
    }
  }

  renderer.render(scene,camera);
}

function easeInOut(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }

// 球体の投影ピクセルサイズに合わせて #chara-layer のサイズを動的更新
function syncCharaLayerSize(){
  const {w, h} = getViewSize();
  const fovRad  = camera.fov * Math.PI / 180;
  const dist    = Math.max(camera.position.z, 0.1);
  const halfFov = dist * Math.tan(fovRad / 2);
  const spherePxH = 1.5 / halfFov * (h / 2);
  const spherePxW = 1.5 / (halfFov * w / h) * (w / 2);
  const spherePx  = Math.min(spherePxH, spherePxW);
  const diameter  = Math.round(spherePx * 2 * 1.0);
  const layer = document.getElementById('chara-layer');
  if(layer){
    layer.style.width  = diameter + 'px';
    layer.style.height = diameter + 'px';
  }

  // 制限時間ゲージサイズも同期
  if(timeLimitMode) syncTimeLimitGaugeSize();
}

// スマホブラウザのアドレスバーを除いた実際の表示サイズを取得
function getViewSize(){
  const vv = window.visualViewport;
  return {
    w: vv ? vv.width  : window.innerWidth,
    h: vv ? vv.height : window.innerHeight,
  };
}

function onResize(){
  const {w, h} = getViewSize();
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  syncCharaLayerSize();
  const rcv=document.getElementById('radar-canvas');
  if(rcv){ rcv.width=w; rcv.height=h; }
}

window.addEventListener('resize', onResize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', onResize);
}

// ===================== STAGE MODE INIT =====================
(function applyStageParam(){
  const urlParams = new URLSearchParams(window.location.search);
  const stageId = urlParams.get('stage');
  if(!stageId) return; // 通常起動

  // stage-params.json のみ読み込む（ゲーム設定専用ファイル）
  fetch('data/stage-params.json')
    .then(r => r.json())
    .then(params => {
      const stage = params.find(s => String(s.id) === String(stageId));
      if(!stage){
        console.warn(`stage-params.json: id=${stageId} not found, using defaults.`);
        return;
      }

      // diff 適用（setDiff は内部で restartGame するので直接設定）
      if(stage.diff && DIFF_PRESETS[stage.diff]){
        currentDiff = stage.diff;
        const sel = document.getElementById('diff-select');
        if(sel) sel.value = stage.diff;
        const preset = DIFF_PRESETS[stage.diff];
        COLS = preset.cols; ROWS = preset.rows;
        updateMineCountLabel();
      }

      // mines 直接指定（density より優先）
      if(stage.mines != null){
        window._stageMines = stage.mines;
      } else {
        window._stageMines = null;
        if(stage.density != null){
          const densityEl = document.getElementById('mine-density');
          if(densityEl){
            densityEl.value = stage.density;
            updateMineCountLabel();
          }
        }
      }

      // boardColor 適用
      window._boardTheme = stage.boardColor || null;
      const dbgColorSel = document.getElementById('debug-color-select');
      if(dbgColorSel) dbgColorSel.value = stage.boardColor || '';

      // maxHints 適用
      if(stage.maxHints != null){
        maxHints = stage.maxHints;
        window._stageMaxHints = stage.maxHints;
      } else {
        maxHints = 3;
        window._stageMaxHints = null;
      }

      // 制限時間モード 適用（ステージ側からの自動連携）
      if(stage.timeLimitMode === true && stage.timeLimit != null){
        timeLimitMode = true;
        window._customTimeLimit = stage.timeLimit;
        const tlBtn = document.getElementById('time-limit-btn');
        if(tlBtn){
          tlBtn.textContent = '制限時間 ON';
          tlBtn.style.background  = 'rgba(80,20,0,0.9)';
          tlBtn.style.borderColor = 'rgba(255,100,0,0.8)';
          tlBtn.style.color       = '#ffaa00';
        }
        const tlInput = document.getElementById('time-limit-input');
        if(tlInput) tlInput.value = stage.timeLimit;
        const remEl = document.getElementById('stat-remaining');
        if(remEl) remEl.style.display = '';
        const gaugeEl = document.getElementById('time-limit-gauge');
        if(gaugeEl) gaugeEl.style.display = '';
      }

      // charId 保存
      window._stageCharId = stage.charId || null;

      // novelAfterClear 保存（クリア後「つづきを見る」ボタンの遷移先）
      window._novelAfterClear = stage.novelAfterClear || null;

      // BGM 適用（指定が無ければ既定のSND_02_play.mp3のまま）
      if(stage.bgm){
        // 既に既定BGMが再生開始済み（最初の操作がstage-params.json取得より早かった場合）なら、
        // src切替で一旦止まってしまうため、差し替え後に再生を続行する
        const wasPlaying = !SND.bgm.paused;
        SND.bgm.src = 'assets/audio/' + stage.bgm;
        if(wasPlaying){
          SND.bgm.currentTime = 0;
          SND.bgm.play().catch(()=>{});
        }
      }
      window._stageHasCustomBgm = !!stage.bgm;

      // 背景画像 適用（canvas-containerはalpha:trueで透過しているのでCSS背景がそのまま見える）
      const canvasContainer = document.getElementById('canvas-container');
      if(canvasContainer){
        if(stage.background){
          canvasContainer.style.backgroundImage  = `url('assets/images/${stage.background}')`;
          canvasContainer.style.backgroundSize     = 'cover';
          canvasContainer.style.backgroundPosition = 'center';
        } else {
          canvasContainer.style.backgroundImage = 'none';
        }
      }

      // logicGuarantee 適用
      if(typeof stage.logicGuarantee === 'boolean'){
        logicGuarantee = stage.logicGuarantee;
        const btn = document.getElementById('logic-guarantee-btn');
        if(btn){
          btn.classList.toggle('active', logicGuarantee);
          btn.textContent = logicGuarantee ? '🔒 論理保証ON' : '🔓 論理保証OFF';
        }
      }

      // exMode 適用（stage-params.json連携）
      if(typeof stage.exMode === 'boolean'){
        exMode = stage.exMode;
        const exBtn = document.getElementById('ex-mode-btn');
        if(exBtn){
          exBtn.textContent = exMode ? 'EX ON' : 'EX OFF';
          exBtn.style.background  = exMode ? 'rgba(60,0,0,0.8)'    : 'rgba(0,40,20,0.8)';
          exBtn.style.borderColor = exMode ? 'rgba(255,50,50,0.5)' : 'rgba(0,200,100,0.5)';
          exBtn.style.color       = exMode ? '#ff5555'             : '#00cc66';
        }
      }

      // loopMode / loopCount 適用（stage-params.json連携）
      if(stage.loopMode === true){
        loopMode = true;
        window._loopMode = true;
        if(stage.loopCount != null){
          const n = parseInt(stage.loopCount, 10);
          if(!isNaN(n) && n >= 2) loopCount = n;
        }
        // 周ごとの制限時間（任意）。配列が足りない周は最後の値を使い回す
        if(Array.isArray(stage.loopTimeLimits) && stage.loopTimeLimits.length > 0){
          window._loopTimeLimits = stage.loopTimeLimits.map(v => parseInt(v, 10)).filter(v => !isNaN(v) && v > 0);
          if(window._loopTimeLimits.length === 0) window._loopTimeLimits = null;
        } else {
          window._loopTimeLimits = null;
        }
        const loopBtn = document.getElementById('loop-mode-btn');
        if(loopBtn){
          loopBtn.textContent = '周回モード ON';
          loopBtn.style.background  = 'rgba(80,0,120,0.9)';
          loopBtn.style.borderColor = 'rgba(180,0,255,0.8)';
          loopBtn.style.color       = '#dd99ff';
        }
        const loopCountInput = document.getElementById('loop-count-input');
        if(loopCountInput) loopCountInput.value = loopCount;
        // 1周目の盤面色・進行度バーをloopColorsで初期化（toggleLoopMode()と同じ処理）
        currentLoop = 1;
        window._boardTheme = loopColors[0] || window._boardTheme;
        const backEl  = document.getElementById('expose-bar-back');
        const innerEl = document.getElementById('expose-bar-inner');
        if(backEl)  backEl.style.background  = 'rgba(50,0,80,0.7)';
        if(innerEl) innerEl.style.background = loopColors[0] || 'linear-gradient(90deg,#8800ff,#cc44ff)';
      }

      // ステージモード：UI無効化
      const diffSel = document.getElementById('diff-select');
      if(diffSel) diffSel.disabled = true;
      const dens = document.getElementById('mine-density');
      if(dens) dens.disabled = true;
      const lgBtn = document.getElementById('logic-guarantee-btn');
      if(lgBtn) lgBtn.disabled = true;

      // 設定を反映してリスタート
      restartGame();
    })
    .catch(() => {
      console.warn('stage-params.json not found, using defaults.');
      restartGame();
    });
})();

// ===================== INIT =====================
setMode('dig');
updateMineCountLabel();
initRadarCanvas();
// UIバー描画後にmode-indicator・expose-bar-wrapのtopを同期
requestAnimationFrame(()=>requestAnimationFrame(()=>{ syncCharaLayerSize(); updateHintGauge(); }));
// ステージモード時はapplyStageParam内のrestartGameに任せる
if(!new URLSearchParams(window.location.search).get('stage')){
  restartGame();
}
// 最初のマスを開く前でも、ページへの最初の操作（クリック/タップ）でBGMを開始する
// （ブラウザの自動再生制限対策。startTimer()内のstartBGM()は1手目専用で別途呼ばれる）
document.addEventListener('pointerdown', function(){ startBGM(); }, { once: true });

animate();

history.pushState({ backGuard: true }, '');
history.pushState({ backGuard: true }, '');
window.addEventListener('popstate', function(){
  window.location.replace('index.html');
});
