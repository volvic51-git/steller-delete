<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="js/tab-guard.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLAR DELETE — ENDING</title>
<link rel="icon" href="assets/images/etc/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Exo+2:wght@300;400;600&family=Black+Ops+One&family=Russo+One&family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&family=Oswald:wght@400;600&family=Kaisei+Decol:wght@400;700&family=Shippori+Mincho:wght@400;600&family=Zen+Old+Mincho:wght@400;700&family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;700&family=Zen+Maru+Gothic:wght@400;700;900&family=Dela+Gothic+One&family=BIZ+UDPGothic:wght@400;700&family=M+PLUS+1p:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #030818;
    font-family: 'Rajdhani', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ══════════════════════════════════════
     構造：

     #ed-stage
       perspective + perspective-origin: 50% 100%
       → 消失点が画面下端中央

     #crawl-outer
       rotateX(65deg) で傾く
       transform-origin: 50% 100%（画面下端を軸）
       overflow: hidden + scrollTop で歌詞を動かす

     #crawl
       全歌詞ブロック
  ══════════════════════════════════════ */

  #ed-stage {
    position: fixed; inset: 0; z-index: 10;
    perspective: 240px;
    perspective-origin: 50% 21%;
    overflow: hidden;
    background: rgba(3,8,24,0.55);
  }

  /* rotateX がかかるスクロールコンテナ */
  #crawl-outer {
    position: absolute;
    width: 100%;
    left: 50%;
    top: 0; bottom: 0;
    transform: translateX(-50%) rotateX(52deg);
    transform-origin: 50% 21%;
    overflow: hidden;
    z-index: 10;
  }

  /* 全歌詞を縦に並べる */
  #crawl {
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(24px, 4vh, 56px);
    padding-bottom: 50vh;
  }

  .lyric-block {
    width: 100%;
    text-align: center;
    flex-shrink: 0;
    /* フェードイン演出 */
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .lyric-block.visible {
    opacity: 1;
    transform: translateY(0);
  }

  :root {
    --font-ja: 'Noto Sans JP', sans-serif;
    --font-en: 'Oswald', sans-serif;
  }

  .lyric-line {
    font-family: var(--font-ja);
    font-size: clamp(28px, 4vw, 54px);
    font-weight: 400;
    letter-spacing: 0.08em;
    line-height: 1.8;
    color: #ffffff;
  }
  .lyric-line.en {
    font-family: var(--font-en);
    letter-spacing: 0.12em;
  }

  .lyric-star {
    display: block;
    font-family: var(--font-ja);
    font-size: clamp(56px, 8vw, 108px);
    line-height: 1.4;
    color: rgba(255,255,255,0.5);
  }

  /* 上端フェードマスク */
  #ed-stage::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to bottom,
      rgba(3,8,24,1.0)  0%,
      rgba(3,8,24,0.85) 45%,
      transparent       100%);
    z-index: 30; pointer-events: none;
  }

  /* 下端フェードマスク */
  #ed-stage::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 12%;
    background: linear-gradient(to top,
      rgba(3,8,24,0.9) 0%,
      transparent      100%);
    z-index: 30; pointer-events: none;
  }

  /* ══════════════════════════════════════ OUTRO */
  #outro {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(12px, 2.5vh, 28px);
    text-align: center;
    background: rgba(3,8,24,0);
    opacity: 1;
    pointer-events: none;
  }
  #outro.show { display: flex; }

  /* THANK YOU FOR PLAYING */
  .outro-sub {
    font-family: 'Orbitron', sans-serif;
    font-weight: 400;
    font-size: clamp(11px, 1.6vw, 20px);
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .outro-sub.visible { opacity: 1; }

  /* STELLAR DELETE ロゴ */
  .outro-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 80px);
    letter-spacing: 0.14em;
    color: #ffffff;
    text-shadow:
      0 0 10px rgba(74,158,255,0.9),
      0 0 30px rgba(26,111,255,0.6),
      0 0 60px rgba(26,111,255,0.3);
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .outro-title.visible { opacity: 1; }

  /* 彼女たちの迷子は終わらない */
  .outro-novel {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    font-size: clamp(14px, 2vw, 26px);
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.75);
    margin-top: clamp(8px, 2vh, 20px);
    min-height: 1.6em;
    text-align: center;
  }
  /* タイプライター用：各文字を span で包んでフェードイン */
  .outro-novel .char {
    opacity: 0;
    transition: opacity 0.08s ease;
  }
  .outro-novel .char.show { opacity: 1; }

  /* ══════════════════════════════════════ ローディング */
  #loading {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: #030818;
    transition: opacity 1s ease;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  .loading-text {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(11px, 1.4vw, 14px);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.4);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 1.0; }
  }

  @media (max-aspect-ratio: 1/1) {
    #crawl-outer { width: 90%; }
    .lyric-line  { letter-spacing: 0.03em; }
  }

  /* ══════════════════════════════════════
     背景画像
  ══════════════════════════════════════ */
  #bg-main {
    position: fixed; inset: 0; z-index: 1;
    background: url('assets/images/back16.jpg') center center / cover no-repeat;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
  }
  #bg-main.visible { opacity: 0.85; }

  /* 曲後画像：最前面・レターボックス */
  #bg-end {
    position: fixed; inset: 0; z-index: 200;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1.5s ease;
    pointer-events: none;
  }
  #bg-end.visible { opacity: 1; }
  #bg-end img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  /* ══════════════════════════════════════
     スキップボタン
  ══════════════════════════════════════ */
  #skip-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 200;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(9px, 1.2vw, 12px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(0,200,255,0.85);
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(0,200,255,0.5);
    padding: 8px 16px;
    cursor: pointer;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
    text-shadow: 0 0 8px rgba(0,200,255,0.6);
  }
  #skip-btn:hover {
    color: #00e8ff;
    border-color: rgba(0,230,255,0.8);
    background: rgba(0,0,0,0.55);
    text-shadow: 0 0 14px rgba(0,230,255,0.9);
  }
  #skip-btn.hidden { display: none; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- 背景画像（曲中） -->
<div id="bg-main"></div>
<!-- 背景画像（曲後） -->
<div id="bg-end"><img src="assets/images/back14.jpg" alt=""></div>

<div id="ed-stage">
  <div id="crawl-outer">
    <div id="crawl"></div>
  </div>
</div>

<div id="outro">
  <div class="outro-sub" id="outro-sub">Thank you for playing</div>
  <div class="outro-title" id="outro-title">STELLAR DELETE</div>
  <div class="outro-novel" id="outro-novel"></div>
</div>

<div id="loading">
  <div class="loading-text" style="visibility:hidden;">LOADING...</div>
</div>

<!-- スキップボタン -->
<button id="skip-btn">SKIP ▶▶</button>

<audio id="ed-audio" src="assets/audio/insideTSD.mp3" preload="auto"></audio>

<script>
/* ══════════════════════════════════════ パーティクル */
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  function Star(){ this.reset(); }
  Star.prototype.reset = function(){
    this.x=Math.random()*W; this.y=Math.random()*H;
    this.r=Math.random()*1.1+0.2; this.alpha=Math.random()*0.6+0.15;
    this.speed=Math.random()*0.3+0.05;
    this.tw=Math.random()*Math.PI*2;
    this.tws=(Math.random()*0.02+0.005)*(Math.random()<0.5?1:-1);
  };
  Star.prototype.draw = function(dt){
    this.tw+=this.tws;
    const a=this.alpha+Math.sin(this.tw)*0.25;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${Math.random()<0.15?'100,220,255':'200,225,255'},${Math.max(0,a)})`; ctx.fill();
    this.y-=this.speed*dt*0.016;
    if(this.y<-2){this.reset();this.y=H;}
  };
  let shoot=null;
  function spawnShoot(){
    shoot={x:Math.random()*W*0.7+W*0.15,y:Math.random()*H*0.3,
      vx:(Math.random()*3+2)*(Math.random()<0.5?1:-1),vy:Math.random()*2+1,
      life:1,maxLife:60+Math.random()*40,len:90+Math.random()*60};
  }
  setInterval(spawnShoot,5000+Math.random()*3000); setTimeout(spawnShoot,2000);
  const N=Math.min(220,Math.floor(W*H/6000));
  for(let i=0;i<N;i++) pts.push(new Star());
  let last=performance.now();
  (function loop(now){
    const dt=now-last; last=now;
    ctx.clearRect(0,0,W,H);
    for(const s of pts) s.draw(dt);
    if(shoot){
      const t=1-shoot.life/shoot.maxLife;
      const x0=shoot.x-shoot.vx*shoot.len*t, y0=shoot.y-shoot.vy*shoot.len*t;
      const g=ctx.createLinearGradient(x0,y0,shoot.x,shoot.y);
      g.addColorStop(0,'rgba(0,200,255,0)'); g.addColorStop(1,`rgba(180,230,255,${0.85*(1-t)})`);
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(shoot.x,shoot.y);
      ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
      shoot.x+=shoot.vx*dt*0.016; shoot.y+=shoot.vy*dt*0.016; shoot.life--;
      if(shoot.life<=0||shoot.x<-50||shoot.x>W+50||shoot.y>H+50) shoot=null;
    }
    requestAnimationFrame(loop);
  })(performance.now());
})();

/* ══════════════════════════════════════ 歌詞エンドロール */
(function(){
  const BLOCK_GAP  = 0.8;
  const BASE_SPEED = 80;   // px/秒
  const BOOST_MAX  = 5.0;
  const BOOST_K    = 3.0;
  const OUTRO_WAIT = 0;

  const outerEl   = document.getElementById('crawl-outer'); // scrollTop を動かす
  const crawlEl   = document.getElementById('crawl');
  const outroEl   = document.getElementById('outro');
  const loadingEl = document.getElementById('loading');
  const audio     = document.getElementById('ed-audio');

  let blocks   = [];
  let scrollY  = 0;   // outerEl.scrollTop と同期
  let finished = false;
  let lastNow  = null;
  let screenH  = window.innerHeight;
  let paused   = false;
  let currentStartPos = 44;

  /* リサイズ：measureOffsetsを再計算してscrollYを補正 */
  window.addEventListener('resize', () => {
    screenH = window.innerHeight;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // padding-top / padding-bottom も screenH 依存なので再構築
        if(!blocks.length) return;
        const pt = screenH * (currentStartPos / 100);
        crawlEl.style.paddingTop = pt + 'px';
        crawlEl.lastElementChild.style.height = screenH * 0.5 + 'px';
        measureOffsets();
        // 音楽位置から scrollY を再マッピング（飛び防止）
        scrollY = Math.max(0, timeToScroll(audio.currentTime));
        outerEl.scrollTop = scrollY;
      });
    });
  });

  /* ブロック化 */
  function buildBlocks(data){
    blocks = [];
    let cur = null;
    for(const item of data){
      if(!cur || (item.time - cur.endTime) >= BLOCK_GAP){
        cur = { time: item.time, endTime: item.time, lines: [item.text] };
        blocks.push(cur);
      } else {
        cur.lines.push(item.text);
        cur.endTime = item.time;
      }
    }
  }

  /* DOM構築 */
  function buildDOM(startPosPct){
    currentStartPos = (startPosPct !== undefined ? startPosPct : 100);
    crawlEl.innerHTML = '';
    const pt = screenH * (currentStartPos / 100);
    crawlEl.style.paddingTop = pt + 'px';

    for(const b of blocks){
      const div = document.createElement('div');
      div.className = 'lyric-block'; // visible は後から付与（フェードイン）
      for(const line of b.lines){
        if(line === '★'){
          const s = document.createElement('span');
          s.className = 'lyric-star'; s.textContent = '★';
          div.appendChild(s);
        } else {
          const p = document.createElement('div');
          p.className = 'lyric-line';
          const asciiRatio = (line.match(/[\x20-\x7E]/g)||[]).length / line.length;
          if(asciiRatio >= 0.7) p.classList.add('en');
          p.textContent = line;
          div.appendChild(p);
        }
      }
      crawlEl.appendChild(div);
      b.el = div;
      b.visible = false; // フェードイン管理フラグ
    }
    const pad = document.createElement('div');
    pad.style.height = screenH * 0.5 + 'px';
    crawlEl.appendChild(pad);
  }

  /* 一時停止トグル（デバッグパネルから呼ばれる） */
  window._lyricsPause = function(){
    paused = !paused;
    if(paused){
      audio.pause();
    } else {
      audio.play().catch(()=>{});
    }
    return paused;
  };

  /* START POS 変更時の再構築（デバッグパネルから呼ばれる） */
  window._lyricsRebuild = function(startPosPct){
    // tickを止める
    finished = true;

    // DOM再構築
    buildDOM(startPosPct);

    // レイアウト確定後に再測定・再起動
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        measureOffsets();

        // 現在の再生位置に対応するscrollYを再計算
        scrollY = Math.max(0, timeToScroll(audio.currentTime));
        outerEl.scrollTop = scrollY;

        // 通過済みブロックは即visible、未到達はリセット
        for(const b of blocks){
          if(b.targetScroll <= scrollY + screenH * 0.95){
            b.el.classList.add('visible');
            b.visible = true;
          } else {
            b.el.classList.remove('visible');
            b.visible = false;
          }
        }

        // tickを再起動
        finished = false;
        lastNow = null;
        requestAnimationFrame(tick);
      });
    });
  };

  /* オフセット測定
     scrollTop = ブロックの offsetTop - screenH/2
     のとき、そのブロックが画面中央に来る */
  function measureOffsets(){
    const mid = screenH / 2;
    for(const b of blocks){
      b.targetScroll = b.el.offsetTop + b.el.offsetHeight / 2 - mid;
    }
  }

  /* time → targetScroll を線形補間 */
  function timeToScroll(t){
    if(!blocks.length) return 0;
    if(t <= blocks[0].time) return Math.max(0, blocks[0].targetScroll);
    const last = blocks[blocks.length - 1];
    if(t >= last.time) return last.targetScroll;
    for(let i = 0; i < blocks.length - 1; i++){
      const a = blocks[i], b = blocks[i+1];
      if(t >= a.time && t <= b.time){
        const r = (t - a.time) / (b.time - a.time);
        return a.targetScroll + (b.targetScroll - a.targetScroll) * r;
      }
    }
    return 0;
  }

  /* メインループ */
  function tick(now){
    if(finished) return;
    if(paused){
      lastNow = null;
      requestAnimationFrame(tick);
      return;
    }
    const dt = lastNow ? Math.min((now - lastNow) / 1000, 0.05) : 0;
    lastNow = now;

    const idealScroll = timeToScroll(audio.currentTime);
    const lag   = idealScroll - scrollY;
    const boost = lag > 0
      ? Math.min(BOOST_MAX, 1.0 + (lag / 50) * BOOST_K)
      : 1.0;
    const speed = BASE_SPEED * boost;

    if(lag > 0){
      scrollY = Math.min(scrollY + speed * dt, idealScroll);
    } else {
      scrollY = Math.max(scrollY + BASE_SPEED * dt * 0.3, idealScroll);
    }
    scrollY = Math.max(0, scrollY);

    // フェードイン：画面に入ってきたブロックを visible に
    for(const b of blocks){
      if(!b.visible && b.targetScroll <= scrollY + screenH * 0.95){
        b.el.classList.add('visible');
        b.visible = true;
      }
    }

    const maxScroll = outerEl.scrollHeight - outerEl.clientHeight;
    if(scrollY >= maxScroll){
      scrollY = maxScroll;
      finished = true;
      outerEl.scrollTop = scrollY;
      setTimeout(showOutro, OUTRO_WAIT);
      return;
    }

    outerEl.scrollTop = scrollY;
    requestAnimationFrame(tick);
  }

  /* OUTRO：新フロー
     1. 1秒暗転
     2. THANK YOU + STELLAR DELETE + 彼女たち（5秒以上、入力待ち）
     3. 何か押す → back14.jpg フェードイン（5秒以上、入力待ち）
     4. 何か押す → index.html
  */
  function showOutro(){
    const outroSub   = document.getElementById('outro-sub');
    const outroTitle = document.getElementById('outro-title');
    const outroNovel = document.getElementById('outro-novel');
    const bgMain     = document.getElementById('bg-main');
    const bgEnd      = document.getElementById('bg-end');
    const skipBtn    = document.getElementById('skip-btn');

    skipBtn.classList.add('hidden');

    // フェーズ1：1秒かけて暗転（bgMainをフェードアウト、outroを黒背景に）
    bgMain.style.transition = 'opacity 1s ease';
    bgMain.style.opacity    = '0';
    outroEl.classList.add('show');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        outroEl.style.background = 'rgba(3,8,24,0)';
        outroEl.style.transition = 'background 1s ease';
        outroEl.style.background = 'rgba(3,8,24,1)';
        outroEl.style.opacity    = '1';
      });
    });

    // フェーズ2：1秒後にテキスト段階表示
    setTimeout(() => {
      outroSub.classList.add('visible');
    }, 1000);
    setTimeout(() => {
      outroTitle.classList.add('visible');
    }, 2000);
    setTimeout(() => {
      // タイプライター演出：1文字ずつ80msごとに表示
      const text = '彼女たちの迷子は終わらない・・・。';
      outroNovel.innerHTML = text.split('').map(c =>
        `<span class="char">${c}</span>`
      ).join('');
      outroNovel.querySelectorAll('.char').forEach((ch, i) => {
        setTimeout(() => { ch.classList.add('show'); }, i * 80);
      });
    }, 3500);

    // フェーズ3：タイプライター終了(3500+1360ms) + 2秒後に自動でback14へ
    const TEXT_LEN    = 17; // 「彼女たちの迷子は終わらない・・・。」の文字数
    const AUTO_DELAY  = 3500 + TEXT_LEN * 80 + 2000; // ~6860ms

    setTimeout(() => {
      // テキストをフェードアウト
      outroSub.style.transition   = 'opacity 0.8s ease';
      outroTitle.style.transition = 'opacity 0.8s ease';
      outroNovel.style.transition = 'opacity 0.8s ease';
      outroSub.style.opacity      = '0';
      outroTitle.style.opacity    = '0';
      outroNovel.style.opacity    = '0';

      // back14.jpg フェードイン
      setTimeout(() => {
        document.getElementById('ed-stage').style.display = 'none';
        outroEl.style.display = 'none';
        bgEnd.classList.add('visible');
        // 5秒後にindex.htmlへ自動遷移
        setTimeout(() => {
          audio.pause();
          window.location.href = 'index.html';
        }, 5000);
      }, 800);
    }, AUTO_DELAY);

  }

  /* 起動 */
  function start(data){
    buildBlocks(data);
    buildDOM(44);

    loadingEl.classList.add('fade-out');
    setTimeout(() => { loadingEl.style.display = 'none'; }, 800);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        measureOffsets();
        scrollY = 0;
        outerEl.scrollTop = 0;

        // 背景画像フェードイン
        requestAnimationFrame(() => {
          document.getElementById('bg-main').classList.add('visible');
        });

        audio.play().catch(() => {
          document.addEventListener('click', () => audio.play(), { once: true });
        });

        // スキップボタン
        document.getElementById('skip-btn').addEventListener('click', () => {
          skipToOutro();
        });

        requestAnimationFrame(tick);
      });
    });
  }

  /* スキップ処理 */
  function skipToOutro(){
    document.getElementById('skip-btn').classList.add('hidden');
    finished = true;
    audio.pause();
    setTimeout(showOutro, 300);
  }

  fetch('data/lyrics_timing.json')
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(start)
    .catch(() => {
      loadingEl.style.display = 'none';
      crawlEl.innerHTML = '<div class="lyric-block"><div class="lyric-line" style="color:rgba(255,255,255,0.4);">lyrics_timing.json not found</div></div>';
      audio.play().catch(()=>{});
      setTimeout(showOutro, 4000);
    });
})();
</script>
</body>
</html>
