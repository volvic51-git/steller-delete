<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stellar Delete — Stage 1 クリア後</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=M+PLUS+1p:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="game-container">
    <div id="fade-overlay"></div>
    <div id="background-layer">
      <div id="background-img"></div>
    </div>
    <div id="character-layer"></div>
    <div id="ui-layer">
      <div id="dialog-window" class="hidden">
        <div id="name-plate">
          <div id="name-plate-bar"></div>
          <span id="speaker-name"></span>
        </div>
        <div id="dialog-text"></div>
        <div id="next-indicator">
          <span class="arrow-icon">&#x25BC;</span>
        </div>
      </div>
      <div id="start-screen">
        <div id="start-content">
          <h1 id="game-title">Stellar<span>Delete</span></h1>
          <p id="game-subtitle">EP.1 RUGE</p>
          <div id="start-pulse"></div>
        </div>
      </div>
      <div id="end-screen" class="hidden">
        <div id="end-content">
          <p id="end-text">— END —</p>
          <button id="restart-btn">&#x3082;&#x3046;&#x4E00;&#x5EA6;&#x898B;&#x308B;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var ts = "1.0";
      function loadScript(src, cb) {
        var s = document.createElement('script');
        s.src = src + '?v=' + ts;
        s.onload = cb || function(){};
        document.head.appendChild(s);
      }
      loadScript('js/novel.js', function() {
        loadScript('js/script02.js');
      });
    })();
  </script>

<div id="back-guard-dialog" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;"><div style="background:rgba(0,5,20,0.95);border:2px solid rgba(0,200,255,0.5);border-radius:6px;padding:28px 32px;text-align:center;font-family:'Noto Serif JP',serif;color:#fff;max-width:280px;"><p style="margin-bottom:20px;line-height:1.7;font-size:14px;">ノベルを中断して<br>タイトルに戻りますか？</p><div style="display:flex;gap:12px;justify-content:center;"><button id="back-guard-yes" style="background:rgba(0,50,100,0.9);border:1px solid rgba(0,200,255,0.6);color:#00ccff;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:3px;">はい</button><button id="back-guard-no" style="background:rgba(30,10,0,0.9);border:1px solid rgba(255,150,0,0.5);color:#ffaa00;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:3px;">いいえ</button></div></div></div>
<script>
// ===================== BACK BUTTON GUARD =====================
history.pushState({ backGuard: true }, '');
window.addEventListener('popstate', function(){
  history.pushState({ backGuard: true }, '');
  document.getElementById('back-guard-dialog').style.display = 'flex';
});
document.getElementById('back-guard-yes').addEventListener('click', function(){
  window.location.replace('../index.html');
});
document.getElementById('back-guard-no').addEventListener('click', function(){
  document.getElementById('back-guard-dialog').style.display = 'none';
});
</script>
</body>
</html>
