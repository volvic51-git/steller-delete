<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Gen Check — Stage1 検証</title>
<style>
  :root{ --bg:#0d1117; --fg:#c9d1d9; --acc:#8844ff; --ok:#28d17c; --ng:#ff5555; --bd:#30363d; --mine:#ff6a4d; --start:#00ffcc; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#0d1117; color:var(--fg); font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; padding:16px; }
  h1{ font-size:17px; margin:0 0 2px; }
  .sub{ color:#8b949e; font-size:12px; margin-bottom:14px; }
  fieldset{ border:1px solid var(--bd); border-radius:8px; padding:12px 14px; margin-bottom:14px; }
  legend{ color:var(--acc); font-weight:600; padding:0 6px; }
  .grid-in{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  label{ display:block; font-size:11px; color:#8b949e; margin-bottom:3px; }
  input,select{ width:100%; background:#161b22; color:var(--fg); border:1px solid var(--bd); border-radius:6px; padding:6px 8px; }
  .row{ display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }
  button{ background:var(--acc); color:#fff; border:none; border-radius:6px; padding:8px 14px; font-weight:600; cursor:pointer; }
  button.sec{ background:#21262d; border:1px solid var(--bd); }
  .pill{ display:inline-block; background:#161b22; border:1px solid var(--bd); border-radius:20px; padding:2px 10px; font-size:11px; }
  .ok{ color:var(--ok); } .ng{ color:var(--ng); }
  .checks div{ margin:4px 0; }
  code{ background:#161b22; padding:1px 5px; border-radius:4px; font-size:12px; }
  #ident{ font-family:'Share Tech Mono',monospace; font-size:12px; white-space:pre-wrap; background:#161b22; border:1px solid var(--bd); border-radius:6px; padding:8px; }
  .board-wrap{ overflow:auto; max-height:60vh; border:1px solid var(--bd); border-radius:6px; margin-top:10px; }
  table.board{ border-collapse:collapse; }
  table.board td{ width:16px; height:16px; text-align:center; font-size:9px; border:1px solid #1a1f2e; color:#6e7681; padding:0; }
  td.mine{ background:var(--mine); color:#000; font-weight:700; }
  td.start{ outline:2px solid var(--start); outline-offset:-2px; }
  td.n1{color:#5b9bff} td.n2{color:#28d17c} td.n3{color:#ff6a4d} td.n4{color:#c08cff}
  td.n5{color:#ffb020} td.n6{color:#00c8c8} td.n7{color:#ff5eae} td.n8{color:#aaa}
</style>
</head>
<body>
<h1>Board Gen Check <span style="color:#6e7681;font-size:13px;">— Stage1 決定論生成の検証</span></h1>
<div class="sub"><code>js/board-gen.js</code> が seed から盤面を再現できること・初手安全・保証判定を確認する。</div>

<fieldset>
  <legend>条件</legend>
  <div class="grid-in">
    <div><label>行数 rows</label><input id="rows" type="number" min="1" max="144" value="16"></div>
    <div><label>列数 cols</label><input id="cols" type="number" min="1" max="144" value="30"></div>
    <div><label>地雷密度(%)</label><input id="density" type="number" min="0" max="90" step="0.5" value="18"></div>
    <div><label>地雷数(直接・優先)</label><input id="mineCount" type="number" placeholder="空欄=密度から"></div>
    <div><label>開始セル r,c（空欄=中央）</label><input id="start" type="text" placeholder="例 8,15"></div>
    <div><label>Seed（空欄=ランダム）</label><input id="seed" type="number" placeholder="固定したい時に入力"></div>
  </div>
  <div class="row">
    <button id="gen">▶ 生成して表示</button>
    <button id="repro" class="sec">同じseedで再生成（再現性チェック）</button>
    <button id="solve" class="sec">保証判定（solver）</button>
  </div>
</fieldset>

<fieldset>
  <legend>結果</legend>
  <div class="checks" id="checks"><span style="color:#6e7681">未生成</span></div>
  <div style="margin-top:10px"><label>盤面の身元（window._boardGen 相当）</label><div id="ident">—</div></div>
  <div class="board-wrap" id="boardWrap"></div>
</fieldset>

<script src="../../js/board-gen.js"></script>
<script src="../../js/solver.js"></script>
<script>
const $ = id => document.getElementById(id);
let cur = null; // { rows,cols,mineCount,start,seed,mineSet,numMap }

function readCfg(){
  const rows=Math.min(144,Math.max(1,+$('rows').value||1));
  const cols=Math.min(144,Math.max(1,+$('cols').value||1));
  const dens=Math.max(0,+$('density').value||0)/100;
  const mcRaw=$('mineCount').value.trim();
  const mineCount = mcRaw!=='' ? Math.max(0,Math.floor(+mcRaw)) : Math.round(rows*cols*dens);
  let sr=Math.floor(rows/2), sc=Math.floor(cols/2);
  const st=$('start').value.trim();
  if(st){ const m=st.split(',').map(x=>parseInt(x.trim(),10)); if(m.length===2&&!isNaN(m[0])&&!isNaN(m[1])){ sr=m[0]; sc=m[1]; } }
  const seed = $('seed').value.trim()!=='' ? (Math.floor(+$('seed').value)>>>0) : StellerBoardGen.randomSeed();
  return { rows, cols, mineCount, start:{r:sr,c:sc}, seed };
}

function generate(cfg){
  const mineSet = StellerBoardGen.generateMineSet({
    rows:cfg.rows, cols:cfg.cols, mineCount:cfg.mineCount, start:cfg.start, seed:cfg.seed, wrapCols:true, wrapRows:false
  });
  const numMap = StellerSolver.computeNeighborMines(cfg.rows,cfg.cols,(r,c)=>mineSet.has(r*cfg.cols+c),true,false);
  return { ...cfg, mineSet, numMap };
}

function startSafe(g){
  const {rows,cols,start,mineSet}=g;
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const nr=start.r+dr, nc=((start.c+dc)+cols)%cols;
    if(nr>=0&&nr<rows && mineSet.has(nr*cols+nc)) return false;
  }
  return true;
}

function renderBoard(g){
  const {rows,cols,start,mineSet,numMap}=g;
  let html='<table class="board">';
  for(let r=0;r<rows;r++){
    html+='<tr>';
    for(let c=0;c<cols;c++){
      const k=r*cols+c;
      const isStart = r===start.r&&c===start.c;
      if(mineSet.has(k)){
        html+=`<td class="mine${isStart?' start':''}">●</td>`;
      }else{
        const n=numMap.get(k);
        html+=`<td class="${n>0?'n'+n:''}${isStart?' start':''}">${n>0?n:''}</td>`;
      }
    }
    html+='</tr>';
  }
  html+='</table>';
  $('boardWrap').innerHTML=html;
}

function showIdent(g){
  $('ident').textContent = JSON.stringify({
    seed:g.seed, genVersion:StellerBoardGen.GEN_VERSION,
    start:g.start, rows:g.rows, cols:g.cols, mineCount:g.mineCount, wrap:'cyl',
    placed:g.mineSet.size
  }, null, 2);
}

function setChecks(lines){ $('checks').innerHTML = lines.join(''); }

function doGen(){
  const cfg = readCfg();
  $('seed').value = cfg.seed; // 使ったseedを見えるように固定表示
  cur = generate(cfg);
  showIdent(cur);
  renderBoard(cur);
  const safe = startSafe(cur);
  setChecks([
    `<div>地雷配置: <span class="pill">${cur.mineSet.size} 個</span>（指定 ${cur.mineCount}）</div>`,
    `<div>初手3x3安全: <span class="${safe?'ok':'ng'}">${safe?'OK ✅':'NG ❌'}</span></div>`,
    `<div>使用Seed: <code>${cur.seed}</code>（この値を入れれば同じ盤面が再現します）</div>`
  ]);
}

function doRepro(){
  if(!cur){ doGen(); }
  const a = cur.mineSet;
  const b = StellerBoardGen.generateMineSet({rows:cur.rows,cols:cur.cols,mineCount:cur.mineCount,start:cur.start,seed:cur.seed,wrapCols:true,wrapRows:false});
  const same = a.size===b.size && [...a].every(x=>b.has(x));
  const line = `<div>再現性（同seed再生成）: <span class="${same?'ok':'ng'}">${same?'完全一致 ✅':'不一致 ❌'}</span> <span class="pill">seed=${cur.seed}</span></div>`;
  $('checks').insertAdjacentHTML('beforeend', line);
}

function doSolve(){
  if(!cur){ doGen(); }
  const g=cur;
  const cellAt=(r,c)=>({ isMine:g.mineSet.has(r*g.cols+c), neighborMines:g.numMap.get(r*g.cols+c) });
  const t0=performance.now();
  const solvable = StellerSolver.isSolvable({rows:g.rows,cols:g.cols,mineCount:g.mineCount,wrapCols:true,wrapRows:false,start:g.start,cellAt});
  const ms=(performance.now()-t0).toFixed(1);
  const line = `<div>保証判定（推測なしで解ける）: <span class="${solvable?'ok':'ng'}">${solvable?'保証あり ✅':'保証なし ❌'}</span> <span class="pill">solver ${ms}ms</span></div>`;
  $('checks').insertAdjacentHTML('beforeend', line);
}

if(typeof StellerBoardGen==='undefined' || typeof StellerSolver==='undefined'){
  setChecks(['<span class="ng">js/board-gen.js または js/solver.js が読み込めません（../js/ を確認）。</span>']);
}else{
  $('gen').onclick=doGen;
  $('repro').onclick=doRepro;
  $('solve').onclick=doSolve;
  doGen();
}
</script>
</body>
</html>
