<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Delete — Board Hunter</title>
<style>
  :root{ --bg:#0b0d17; --fg:#e6e9ff; --acc:#8844ff; --acc2:#aa66ff; --ok:#28d17c; --bd:#262a40; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:radial-gradient(circle at 50% -10%,#1a1f3a,#0b0d17 60%); color:var(--fg);
        font-family:'Segoe UI',system-ui,sans-serif; display:flex; justify-content:center; align-items:center;
        padding:10px; overflow:hidden; }
  .wrap{ width:100%; max-width:600px; max-height:460px; display:flex; flex-direction:column; gap:8px; }
  .head{ display:flex; align-items:baseline; gap:8px; }
  h1{ font-size:18px; margin:0; letter-spacing:.5px; }
  .tag{ color:#9aa0c8; font-size:11px; }
  .card{ background:rgba(20,24,44,.7); border:1px solid var(--bd); border-radius:12px; padding:12px 14px;
         box-shadow:0 6px 20px rgba(0,0,0,.3); }
  .campaign{ font-size:12px; color:#9aa0c8; }
  .campaign b{ color:#fff; }
  .row1{ display:flex; gap:10px; align-items:center; }
  .row1 select{ flex:1; }
  #campaignInfo{ font-size:12px; white-space:nowrap; }
  .stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:10px 0; text-align:center; }
  .stat{ background:#11152a; border:1px solid var(--bd); border-radius:8px; padding:8px 4px; }
  .stat b{ display:block; font-size:22px; font-weight:700; color:#fff; line-height:1.1; }
  .stat.found b{ color:var(--ok); }
  .stat span{ font-size:10px; color:#9aa0c8; }
  button{ width:100%; border:none; border-radius:10px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; color:#fff; }
  #toggle{ background:linear-gradient(90deg,var(--acc),var(--acc2)); }
  #toggle.running{ background:linear-gradient(90deg,#d1452f,#ff6a4d); }
  .sub{ display:flex; gap:8px; margin-top:8px; }
  .sub button{ background:#1b2038; border:1px solid var(--bd); font-size:12px; padding:9px; font-weight:600; }
  .sub button:disabled{ opacity:.4; cursor:not-allowed; }
  select{ background:#11152a; color:var(--fg); border:1px solid var(--bd); border-radius:8px; padding:8px; font-size:13px; }
  #msg{ font-size:11px; min-height:14px; margin-top:6px; }
  .how{ font-size:11px; color:#9aa0c8; line-height:1.5; }
  .how b{ color:#fff; }
  .pill{ display:inline-block; background:#1b2038; border:1px solid var(--bd); border-radius:20px; padding:1px 8px; font-size:10px; color:#9aa0c8; }
  a{ color:var(--acc2); }
  .err{ color:#ff6a4d; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>🛰️ Board Hunter</h1>
    <span class="tag">Stellar Delete — 保証盤面さがし</span>
  </div>

  <div class="card">
    <div class="row1">
      <select id="campaign"></select>
      <div id="campaignInfo" class="campaign"></div>
    </div>

    <div class="stats">
      <div class="stat found"><b id="found">0</b><span>みつけた</span></div>
      <div class="stat"><b id="attempts">0</b><span>試行</span></div>
      <div class="stat"><b id="rate">–</b><span>成功率</span></div>
      <div class="stat"><b id="elapsed">0:00</b><span>経過</span></div>
    </div>

    <button id="toggle">▶ 探索スタート</button>
    <div class="sub">
      <button id="email" disabled>📧 メールで送る</button>
      <button id="save" disabled>JSONを保存</button>
      <button id="copy" disabled>コピー</button>
    </div>
    <div id="msg" class="campaign"></div>
  </div>

  <div class="card">
    <div class="how">
      <b>あそびかた</b>　① <b>スタート</b>を押して放置　② 見つかった <span class="pill">seed</span> が自動でたまる　③ ときどき <b>結果を保存</b>して開発者に送る<br>
      送るのは <b>seedの数字だけ</b>（盤面は含まない）。開発者が同じseedから再生成して検証します。<span class="campaign">※タブを開いている間だけ探索が進みます。</span>
    </div>
  </div>
</div>

<script src="solver.js"></script>
<script>
const TOOL_VERSION = "1.0.0";
const $ = id => document.getElementById(id);

// ============================================================
//  キャンペーン定義（開発者が編集する箇所）
//  全ユーザー共通の固定パラメータ。これが同じだから seed だけで再現できる。
//  genVersion は地雷生成アルゴリズムのバージョン。ロジックを変えたら必ず上げる。
// ============================================================
const GEN_VERSION = "1";
const CAMPAIGNS = [
  // ── 特大（72×144）──
  { id:"C1-72x144-18", label:"特大 72×144 / 18%（円柱）", rows:72, cols:144, density:0.18, wrap:"cyl", start:"center" },
  { id:"C1-72x144-30", label:"特大 72×144 / 30%（円柱）", rows:72, cols:144, density:0.30, wrap:"cyl", start:"center" },
  { id:"C1-72x144-40", label:"特大 72×144 / 40%（円柱）", rows:72, cols:144, density:0.40, wrap:"cyl", start:"center" },
  { id:"C1-72x144-50", label:"特大 72×144 / 50%（円柱）", rows:72, cols:144, density:0.50, wrap:"cyl", start:"center" },
  // ── ST8 冥府星 34×72 ──
  { id:"ST8-34x72-30", label:"ST8 冥府星 34×72 / 30%（円柱）", rows:34, cols:72, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST8-34x72-40", label:"ST8 冥府星 34×72 / 40%（円柱）", rows:34, cols:72, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST8-34x72-50", label:"ST8 冥府星 34×72 / 50%（円柱）", rows:34, cols:72, density:0.50, wrap:"cyl", start:"center" },
  // ── ST7 白銀星 30×64 ──
  { id:"ST7-30x64-30", label:"ST7 白銀星 30×64 / 30%（円柱）", rows:30, cols:64, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST7-30x64-40", label:"ST7 白銀星 30×64 / 40%（円柱）", rows:30, cols:64, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST7-30x64-50", label:"ST7 白銀星 30×64 / 50%（円柱）", rows:30, cols:64, density:0.50, wrap:"cyl", start:"center" },
  // ── ST6 魔海星 26×56 ──
  { id:"ST6-26x56-30", label:"ST6 魔海星 26×56 / 30%（円柱）", rows:26, cols:56, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST6-26x56-40", label:"ST6 魔海星 26×56 / 40%（円柱）", rows:26, cols:56, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST6-26x56-50", label:"ST6 魔海星 26×56 / 50%（円柱）", rows:26, cols:56, density:0.50, wrap:"cyl", start:"center" },
  // ── ST5 暗闇星 22×48 ──
  { id:"ST5-22x48-30", label:"ST5 暗闇星 22×48 / 30%（円柱）", rows:22, cols:48, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST5-22x48-40", label:"ST5 暗闇星 22×48 / 40%（円柱）", rows:22, cols:48, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST5-22x48-50", label:"ST5 暗闇星 22×48 / 50%（円柱）", rows:22, cols:48, density:0.50, wrap:"cyl", start:"center" },
  // ── ST4 砂神星 18×40 ──
  { id:"ST4-18x40-30", label:"ST4 砂神星 18×40 / 30%（円柱）", rows:18, cols:40, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST4-18x40-40", label:"ST4 砂神星 18×40 / 40%（円柱）", rows:18, cols:40, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST4-18x40-50", label:"ST4 砂神星 18×40 / 50%（円柱）", rows:18, cols:40, density:0.50, wrap:"cyl", start:"center" },
  // ── ST3 幻夢星 14×32 ──
  { id:"ST3-14x32-30", label:"ST3 幻夢星 14×32 / 30%（円柱）", rows:14, cols:32, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST3-14x32-40", label:"ST3 幻夢星 14×32 / 40%（円柱）", rows:14, cols:32, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST3-14x32-50", label:"ST3 幻夢星 14×32 / 50%（円柱）", rows:14, cols:32, density:0.50, wrap:"cyl", start:"center" },
  // ── ST2 密林星 12×24 ──
  { id:"ST2-12x24-30", label:"ST2 密林星 12×24 / 30%（円柱）", rows:12, cols:24, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST2-12x24-40", label:"ST2 密林星 12×24 / 40%（円柱）", rows:12, cols:24, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST2-12x24-50", label:"ST2 密林星 12×24 / 50%（円柱）", rows:12, cols:24, density:0.50, wrap:"cyl", start:"center" },
  // ── ST1 鬼骨星  8×16 ──
  { id:"ST1-8x16-30",  label:"ST1 鬼骨星  8×16 / 30%（円柱）",  rows:8,  cols:16, density:0.30, wrap:"cyl", start:"center" },
  { id:"ST1-8x16-40",  label:"ST1 鬼骨星  8×16 / 40%（円柱）",  rows:8,  cols:16, density:0.40, wrap:"cyl", start:"center" },
  { id:"ST1-8x16-50",  label:"ST1 鬼骨星  8×16 / 50%（円柱）",  rows:8,  cols:16, density:0.50, wrap:"cyl", start:"center" },
];

// ---- 決定論PRNG（開発者の再検証と完全一致させるための実装） ----
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function wrapFlags(w){ return { wrapCols:w==='cyl'||w==='torus', wrapRows:w==='torus' }; }

function generateMines(rows, cols, mineCount, sr, sc, rng, wrapCols, wrapRows){
  const exclude = new Set();
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    let nr=sr+dr, nc=sc+dc;
    if(wrapRows) nr=((nr%rows)+rows)%rows; else if(nr<0||nr>=rows) continue;
    if(wrapCols) nc=((nc%cols)+cols)%cols; else if(nc<0||nc>=cols) continue;
    exclude.add(nr*cols+nc);
  }
  const actual = Math.min(mineCount, rows*cols - exclude.size);
  const mineSet = new Set();
  let placed=0, guard=0;
  while(placed<actual && guard < actual*1000+100000){
    guard++;
    const r=Math.floor(rng()*rows), c=Math.floor(rng()*cols), k=r*cols+c;
    if(!mineSet.has(k) && !exclude.has(k)){ mineSet.add(k); placed++; }
  }
  return mineSet;
}

// ---- 状態 ----
let running=false, attempts=0, found=[], startMs=0, lastTick=0;
let cur=null; // 現在キャンペーンの展開済みパラメータ

function buildCampaignParams(c){
  const sr = c.start==='center' ? Math.floor(c.rows/2) : c.start.r;
  const sc = c.start==='center' ? Math.floor(c.cols/2) : c.start.c;
  const mineCount = Math.round(c.rows*c.cols*c.density);
  const { wrapCols, wrapRows } = wrapFlags(c.wrap);
  return { ...c, sr, sc, mineCount, wrapCols, wrapRows };
}

function selectCampaign(){
  const c = CAMPAIGNS.find(x=>x.id===$('campaign').value);
  cur = buildCampaignParams(c);
  $('campaignInfo').innerHTML =
    `<b>${cur.rows}×${cur.cols}</b> ・ 地雷 <b>${cur.mineCount}</b>（${(cur.density*100).toFixed(0)}%）`+
    ` ・ <span class="pill">${cur.id}</span>`;
  resetStats();
}
function resetStats(){ attempts=0; found=[]; render(); $('save').disabled=true; $('copy').disabled=true; $('msg').textContent=''; }

function oneAttempt(){
  const seed = (Math.random()*4294967296) >>> 0;
  const rng = mulberry32(seed);
  const mineSet = generateMines(cur.rows, cur.cols, cur.mineCount, cur.sr, cur.sc, rng, cur.wrapCols, cur.wrapRows);
  const numMap = StellerSolver.computeNeighborMines(cur.rows, cur.cols, (r,c)=>mineSet.has(r*cur.cols+c), cur.wrapCols, cur.wrapRows);
  const cellAt = (r,c)=>({ isMine:mineSet.has(r*cur.cols+c), neighborMines:numMap.get(r*cur.cols+c) });
  const solvable = StellerSolver.isSolvable({
    rows:cur.rows, cols:cur.cols, mineCount:cur.mineCount,
    wrapCols:cur.wrapCols, wrapRows:cur.wrapRows, start:{r:cur.sr,c:cur.sc}, cellAt
  });
  attempts++;
  if(solvable) found.push(seed);
}

async function loop(){
  startMs = startMs || performance.now();
  let yieldAt = performance.now();
  while(running){
    oneAttempt();
    const now = performance.now();
    if(now - yieldAt > 40){ // 40msごとにUIへ譲る（放置でもタブが固まらない）
      yieldAt = now; render();
      await new Promise(r=>setTimeout(r,0));
    }
  }
  render();
}

function render(){
  $('found').textContent = found.length;
  $('attempts').textContent = attempts.toLocaleString();
  $('rate').textContent = attempts ? (found.length/attempts*100).toFixed(2)+'%' : '–';
  const sec = Math.floor((performance.now()-(startMs||performance.now()))/1000);
  $('elapsed').textContent = Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');
  const has = found.length>0;
  $('email').disabled = !has; $('save').disabled = !has; $('copy').disabled = !has;
}

function toggle(){
  running = !running;
  $('toggle').textContent = running ? '■ 停止' : '▶ 探索スタート';
  $('toggle').classList.toggle('running', running);
  $('campaign').disabled = running;
  if(running){ if(!startMs) startMs=performance.now(); loop(); }
}

// ---- 出力（seedのみ） ----
function buildResult(){
  return {
    tool:"board-hunter", toolVersion:TOOL_VERSION,
    campaignId:cur.id, genVersion:GEN_VERSION,
    params:{ rows:cur.rows, cols:cur.cols, density:cur.density, mineCount:cur.mineCount,
             wrap:cur.wrap, start:{r:cur.sr,c:cur.sc} },
    startedAt:new Date(Date.now()-(performance.now()-startMs)).toISOString(),
    reportedAt:new Date().toISOString(),
    attempts, foundCount:found.length, seeds:found,
    client:{ userAgent:navigator.userAgent }
  };
}
function download(name, text, type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type})); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function save(){
  const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  download(`boardhunter_${cur.id}_${stamp}.json`, JSON.stringify(buildResult(),null,2), 'application/json');
  $('msg').innerHTML = '保存しました 💾';
}
const MAIL_TO = 'stellard26@gmail.com';
const MAIL_SEED_LIMIT = 100;
function sendByEmail(){
  const r = buildResult();
  const truncated = r.seeds.length > MAIL_SEED_LIMIT;
  const seedsToSend = truncated ? r.seeds.slice(0, MAIL_SEED_LIMIT) : r.seeds;
  const subject = `[Board Hunter] ${r.campaignId}  ${r.foundCount}件`;
  const body = [
    'Stellar Delete Board Hunter 結果',
    '─'.repeat(36),
    `キャンペーン : ${r.campaignId}`,
    `盤面         : ${r.params.rows}×${r.params.cols}  密度${(r.params.density*100).toFixed(0)}%  地雷${r.params.mineCount}`,
    `隣接ルール   : ${r.params.wrap}`,
    `開始セル     : r${r.params.start.r} c${r.params.start.c}`,
    `genVersion   : ${r.genVersion}  toolVersion: ${r.toolVersion}`,
    `試行回数     : ${r.attempts.toLocaleString()}`,
    `発見件数     : ${r.foundCount}  (成功率 ${r.attempts ? (r.foundCount/r.attempts*100).toFixed(2) : 0}%)`,
    `報告日時     : ${r.reportedAt}`,
    '─'.repeat(36),
    truncated
      ? `seeds（先頭${MAIL_SEED_LIMIT}件 / 全${r.foundCount}件 — 残りは添付JSONに含まれます）:`
      : 'seeds:',
    ...seedsToSend,
    '',
    truncated ? '※ 全件はJSONを保存して添付してください。' : '',
  ].join('\n');
  window.location.href = `mailto:${MAIL_TO}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  $('msg').innerHTML = truncated
    ? `メーラーが開きます。全件は「JSONを保存」して添付してください 📎`
    : `メーラーが開きます 📨`;
}
async function copySeeds(){
  const txt = found.join('\n');
  try{ await navigator.clipboard.writeText(txt); $('msg').textContent = `seed ${found.length}件をコピーしました。`; }
  catch(e){ $('msg').innerHTML = '<span class="err">コピーに失敗。「結果を保存」を使ってください。</span>'; }
}

// ---- 初期化 ----
if(typeof StellerSolver==='undefined'){
  $('campaignInfo').innerHTML = '<span class="err">solver.js が読み込めません。ファイル一式を同じフォルダに置いてください。</span>';
  $('toggle').disabled = true;
}else{
  CAMPAIGNS.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.label; $('campaign').appendChild(o); });
  $('campaign').onchange = selectCampaign;
  selectCampaign();
  $('toggle').onclick = toggle;
  $('email').onclick = sendByEmail;
  $('save').onclick = save;
  $('copy').onclick = copySeeds;
  setInterval(()=>{ if(running) render(); }, 1000); // 経過時間の表示更新
}
</script>
</body>
</html>
