<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLAR DELETE — エンドロール録画ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a18;
  color: #ccd6f0;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#app { display: flex; flex-direction: column; height: 100vh; min-width: 900px; }

/* ── トップバー ── */
#top-bar {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: 10px; padding: 8px 14px;
  background: #12122a; border-bottom: 2px solid #1e1e3a;
  flex-shrink: 0;
}
.ctrl-group {
  display: flex; align-items: center; gap: 6px;
  padding-right: 12px; border-right: 1px solid #1e1e3a;
}
.ctrl-group:last-child { border-right: none; }

.btn {
  display: inline-block; padding: 5px 12px;
  background: #1a2a5a; color: #a0c0ff;
  border: 1px solid #2a4a90; border-radius: 4px;
  cursor: pointer; font-size: 12px; white-space: nowrap;
  user-select: none; transition: background .15s;
}
.btn:hover:not(:disabled) { background: #223570; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-record { background: #5a1010; border-color: #a02020; color: #ffaaaa; }
.btn-record:hover:not(:disabled) { background: #7a1818; }
.btn-play   { background: #1a4a2a; border-color: #2a8040; color: #aaffcc; }
.btn-play:hover:not(:disabled) { background: #246030; }

.file-label { font-size: 11px; color: #556688; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#record-status { font-size: 12px; font-weight: bold; color: #ff5050; min-width: 180px; }

/* ── メインレイアウト ── */
#main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── 左パネル ── */
#left-panel {
  width: 220px; min-width: 180px; flex-shrink: 0;
  background: #12122a; border-right: 2px solid #1e1e3a;
  display: flex; flex-direction: column; overflow-y: auto;
  gap: 0;
}
.section {
  padding: 10px 12px;
  border-bottom: 1px solid #1e1e3a;
}
.section h3 {
  font-size: 11px; font-weight: bold;
  color: #4a8aff; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 6px;
}
.section label.btn { font-size: 11px; padding: 4px 8px; display: inline-block; }

.param-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
}
.param-label {
  font-size: 10px; color: #667799;
  width: 80px; flex-shrink: 0;
}
.param-row input[type=range] {
  flex: 1; accent-color: #4a8aff;
}
.param-val {
  font-size: 10px; color: #4af0d0;
  width: 40px; text-align: right;
}

/* ── 中央：Canvas ── */
#center-panel {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #060610; padding: 8px; gap: 6px;
  overflow: hidden;
}
#canvas-wrap {
  flex: 1; width: 100%; min-height: 0;
  display: flex; align-items: center; justify-content: center;
}
#preview-canvas {
  max-width: 100%; max-height: 100%;
  border: 1px solid #1e1e3a; background: #000;
  display: block;
}
#info-bar {
  display: flex; align-items: center; gap: 16px;
  padding: 5px 14px; background: #12122a;
  border-radius: 4px; width: 100%; max-width: 700px;
  flex-shrink: 0;
}
#time-display {
  font-family: 'Courier New', monospace;
  font-size: 15px; color: #3dd8a0; font-weight: bold;
  min-width: 90px;
}
#current-lyric-display {
  font-size: 12px; color: #8899bb;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
progress {
  flex: 1; height: 4px; accent-color: #4a8aff;
  cursor: pointer;
}

/* ── 右パネル：ブロック一覧 ── */
#right-panel {
  width: 240px; min-width: 180px; flex-shrink: 0;
  background: #12122a; border-left: 2px solid #1e1e3a;
  display: flex; flex-direction: column;
}
#block-list-header {
  padding: 8px 10px; border-bottom: 1px solid #1e1e3a;
  font-size: 11px; color: #4a8aff; font-weight: bold;
  letter-spacing: 0.1em;
}
#block-list {
  flex: 1; overflow-y: auto; padding: 4px;
}
#block-list::-webkit-scrollbar { width: 4px; }
#block-list::-webkit-scrollbar-thumb { background: #1e1e3a; border-radius: 2px; }

.block-item {
  padding: 5px 8px; margin-bottom: 2px;
  background: #0e0e26; border: 1px solid #1a1a36;
  border-radius: 3px; font-size: 10px;
  transition: background .1s;
}
.block-item.active { background: #1a2a5a; border-color: #2a4a90; }
.block-time { color: #3dd8a0; font-family: monospace; }
.block-text { color: #c0cce8; margin-top: 2px; white-space: pre-wrap; line-height: 1.4; }
</style>
</head>
<body>
<div id="app">

<!-- トップバー -->
<div id="top-bar">

  <div class="ctrl-group">
    <label for="mp3-input" class="btn">🎵 MP3選択</label>
    <input type="file" id="mp3-input" accept="audio/*" hidden>
    <span id="mp3-name" class="file-label">未選択</span>
  </div>

  <div class="ctrl-group">
    <label for="json-input" class="btn">📄 JSON選択</label>
    <input type="file" id="json-input" accept=".json" hidden>
    <span id="json-name" class="file-label">未選択</span>
  </div>

  <div class="ctrl-group">
    <label for="bg-input" class="btn">🖼 背景選択</label>
    <input type="file" id="bg-input" accept="image/*" hidden>
    <span id="bg-name" class="file-label">未選択</span>
  </div>

  <div class="ctrl-group">
    <button id="btn-play" class="btn btn-play">▶ 再生</button>
    <button id="btn-stop" class="btn">■ 停止</button>
  </div>

  <div class="ctrl-group">
    <button id="btn-record" class="btn btn-record">🎬 録画開始</button>
    <span id="record-status"></span>
  </div>

</div>

<!-- メインレイアウト -->
<div id="main-layout">

  <!-- 左：パラメータ -->
  <div id="left-panel">

    <div class="section">
      <h3>パース設定</h3>
      <div class="param-row">
        <span class="param-label">PERSPECTIVE</span>
        <input type="range" id="p-perspective" min="100" max="1200" step="10" value="240">
        <span class="param-val" id="v-perspective">240</span>
      </div>
      <div class="param-row">
        <span class="param-label">ROTATE X</span>
        <input type="range" id="p-rotatex" min="0" max="80" step="1" value="52">
        <span class="param-val" id="v-rotatex">52</span>
      </div>
      <div class="param-row">
        <span class="param-label">ORIGIN Y</span>
        <input type="range" id="p-originy" min="0" max="100" step="1" value="21">
        <span class="param-val" id="v-originy">21</span>
      </div>
      <div class="param-row">
        <span class="param-label">WIDTH %</span>
        <input type="range" id="p-width" min="20" max="100" step="1" value="100">
        <span class="param-val" id="v-width">100</span>
      </div>
    </div>

    <div class="section">
      <h3>テキスト設定</h3>
      <div class="param-row">
        <span class="param-label">FONT SIZE</span>
        <input type="range" id="p-fontsize" min="20" max="120" step="1" value="54">
        <span class="param-val" id="v-fontsize">54</span>
      </div>
      <div class="param-row">
        <span class="param-label">LINE GAP</span>
        <input type="range" id="p-linegap" min="10" max="120" step="2" value="48">
        <span class="param-val" id="v-linegap">48</span>
      </div>
      <div class="param-row">
        <span class="param-label">FADE TOP %</span>
        <input type="range" id="p-fade" min="0" max="90" step="1" value="50">
        <span class="param-val" id="v-fade">50</span>
      </div>
      <div class="param-row">
        <span class="param-label">START POS %</span>
        <input type="range" id="p-startpos" min="0" max="150" step="1" value="48">
        <span class="param-val" id="v-startpos">48</span>
      </div>
    </div>

    <div class="section">
      <h3>スクロール設定</h3>
      <div class="param-row">
        <span class="param-label">BASE SPEED</span>
        <input type="range" id="p-speed" min="10" max="200" step="5" value="80">
        <span class="param-val" id="v-speed">80</span>
      </div>
      <div class="param-row">
        <span class="param-label">BLOCK GAP秒</span>
        <input type="range" id="p-blockgap" min="0.2" max="2.0" step="0.1" value="0.8">
        <span class="param-val" id="v-blockgap">0.8</span>
      </div>
    </div>

    <div class="section">
      <h3>出力設定</h3>
      <div class="param-row">
        <span class="param-label">解像度</span>
        <select id="p-resolution" style="flex:1;background:#0e0e26;color:#a0c0ff;border:1px solid #2a4a90;border-radius:3px;padding:3px;font-size:11px;">
          <option value="1920x1080">1920×1080</option>
          <option value="1280x720" selected>1280×720</option>
          <option value="960x540">960×540</option>
        </select>
      </div>
      <div class="param-row">
        <span class="param-label">FPS</span>
        <select id="p-fps" style="flex:1;background:#0e0e26;color:#a0c0ff;border:1px solid #2a4a90;border-radius:3px;padding:3px;font-size:11px;">
          <option value="60">60fps</option>
          <option value="30" selected>30fps</option>
        </select>
      </div>
    </div>

  </div>

  <!-- 中央：Canvas -->
  <div id="center-panel">
    <div id="canvas-wrap">
      <canvas id="preview-canvas" width="1280" height="720"></canvas>
    </div>
    <div id="info-bar">
      <span id="time-display">00:00.000</span>
      <progress id="progress-bar" value="0" max="1"></progress>
      <span id="current-lyric-display">—</span>
    </div>
  </div>

  <!-- 右：ブロック一覧 -->
  <div id="right-panel">
    <div id="block-list-header">LYRIC BLOCKS</div>
    <div id="block-list"></div>
  </div>

</div>
</div>

<audio id="audio-player"></audio>

<script>
'use strict';

/* ── DOM参照 ── */
const el = {
  mp3Input:    document.getElementById('mp3-input'),
  mp3Name:     document.getElementById('mp3-name'),
  jsonInput:   document.getElementById('json-input'),
  jsonName:    document.getElementById('json-name'),
  bgInput:     document.getElementById('bg-input'),
  bgName:      document.getElementById('bg-name'),
  btnPlay:     document.getElementById('btn-play'),
  btnStop:     document.getElementById('btn-stop'),
  btnRecord:   document.getElementById('btn-record'),
  recStatus:   document.getElementById('record-status'),
  canvas:      document.getElementById('preview-canvas'),
  timeDisplay: document.getElementById('time-display'),
  progress:    document.getElementById('progress-bar'),
  lyricDisp:   document.getElementById('current-lyric-display'),
  blockList:   document.getElementById('block-list'),
  audio:       document.getElementById('audio-player'),
};
const ctx = el.canvas.getContext('2d');

/* ── パラメータ ── */
const P = {
  perspective: 240, rotateX: 52, originy: 21, width: 100,
  fontsize: 54, linegap: 48, fade: 50, startpos: 48,
  speed: 80, blockgap: 0.8,
};

/* スライダーバインド */
[
  ['p-perspective','perspective',''],['p-rotatex','rotateX',''],
  ['p-originy','originy',''],['p-width','width',''],
  ['p-fontsize','fontsize',''],['p-linegap','linegap',''],
  ['p-fade','fade',''],['p-startpos','startpos',''],
  ['p-speed','speed',''],['p-blockgap','blockgap',''],
].forEach(([id, key]) => {
  const sl = document.getElementById(id);
  const vl = document.getElementById('v-' + id.replace('p-',''));
  sl.addEventListener('input', () => {
    P[key] = parseFloat(sl.value);
    vl.textContent = sl.value;
    rebuildIfReady();
  });
});

/* 解像度変更 */
document.getElementById('p-resolution').addEventListener('change', function(){
  const [w,h] = this.value.split('x').map(Number);
  el.canvas.width = w; el.canvas.height = h;
  rebuildIfReady();
});

/* ── 状態 ── */
const state = {
  mp3Loaded: false, mp3URL: null,
  bgImage: null,
  rawData: [],   // [{time, text}] 読み込んだJSON
  blocks: [],    // [{time, lines:[]}]
  scrollY: 0,
  totalH: 0,
  blockMeta: [], // [{time, lines, y（canvas上の中心Y）}]
  finished: false,
  rafId: null,
  lastT: null,
  // 録画
  isRecording: false,
  audioCtx: null, audioSrc: null, audioDest: null,
  recorder: null, chunks: [],
};

/* ── ブロック化 ── */
function buildBlocks(data){
  const gap = P.blockgap;
  state.blocks = [];
  let cur = null;
  for(const item of data){
    if(!cur || (item.time - cur.endTime) >= gap){
      cur = { time: item.time, endTime: item.time, lines: [item.text] };
      state.blocks.push(cur);
    } else {
      cur.lines.push(item.text);
      cur.endTime = item.time;
    }
  }
}

/* ── blockMetaを計算 ── */
function calcMeta(){
  const H = el.canvas.height;
  const fs = P.fontsize;
  const lg = P.linegap;

  // start-pos: endrole_release と同じ解釈
  // padding-top = H * (startpos/100)
  // → 最初のブロックのcenterYはその分下から始まる
  const padTop = H * (P.startpos / 100);

  let y = padTop;
  state.blockMeta = state.blocks.map(b => {
    let blockH = 0;
    b.lines.forEach(line => {
      if(line === '★') blockH += fs * 2 * 1.4;
      else             blockH += fs * 1.8;
    });
    blockH = Math.max(blockH, fs * 1.8);
    blockH += lg;
    const centerY = y + blockH / 2;
    y += blockH;
    return { ...b, centerY, blockH };
  });
  state.totalH = y + H * 0.5;
  buildBlockList();
}

/* ── timeToScrollY ── */
function timeToScrollY(t){
  const meta = state.blockMeta;
  if(!meta.length) return 0;
  const H    = el.canvas.height;
  const half = H / 2;
  if(t <= meta[0].time) return Math.max(0, meta[0].centerY - half);
  const last = meta[meta.length-1];
  if(t >= last.time) return last.centerY - half;
  for(let i=0; i<meta.length-1; i++){
    const a=meta[i], b=meta[i+1];
    if(t >= a.time && t <= b.time){
      const r = (t - a.time)/(b.time - a.time);
      return (a.centerY - half) + (b.centerY - a.centerY)*r;
    }
  }
  return 0;
}

/* ── Canvas描画 ── */
function drawFrame(scrollY){
  const W = el.canvas.width;
  const H = el.canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 背景
  if(state.bgImage){
    const img = state.bgImage;
    const ir = img.width / img.height;
    const cr = W / H;
    let dw,dh,dx,dy;
    if(ir > cr){ dh=H; dw=dh*ir; dx=(W-dw)/2; dy=0; }
    else        { dw=W; dh=dw/ir; dx=0; dy=(H-dh)/2; }
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.fillStyle = 'rgba(3,8,24,0.55)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle = '#030818';
    ctx.fillRect(0,0,W,H);
  }

  // ── パース演出 ──
  // endrole_release.html の CSS と同じ座標系で再現:
  //   perspective-origin: 50% originy%
  //   transform-origin:   50% originy%
  //   rotateX(rotateX deg)
  //
  // 各ブロックの「スクロール後のY」を求め、
  // rotateX + perspective で射影してCanvas上の座標に変換する

  const fs      = P.fontsize;
  const focalLen = P.perspective;
  const rotRad  = P.rotateX * Math.PI / 180;
  const cosR    = Math.cos(rotRad);
  const sinR    = Math.sin(rotRad);

  // 回転軸・消失点のY（CSS: transform-origin 50% originy%）
  const originY = H * (P.originy / 100);

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  state.blockMeta.forEach(b => {
    b.lines.forEach((line, li) => {
      // 平面Y：ブロック中心 ± 行オフセット - scrollY
      const lineOffsetFlat = (li - (b.lines.length - 1) / 2) * fs * 1.8;
      const flatY = b.centerY + lineOffsetFlat - scrollY;

      // originY を基準にrotateX射影
      const dy   = flatY - originY;         // originYからの距離
      const y3   = dy * cosR;               // 回転後Y
      const z3   = dy * sinR;               // 回転後Z
      const denom = focalLen + z3;
      if(denom <= 1) return;                // 消失点の後ろ

      // 射影スケール（上限を設けて下端の文字が爆発しないよう制限）
      const scale   = Math.min(focalLen / denom, 2.5);
      const screenY = originY + y3 * (focalLen / denom);

      // 画面外スキップ
      if(screenY < -fs * 3 || screenY > H + fs * 3) return;

      // フォントサイズ・透明度
      const fsSc  = fs * scale;
      const alpha = Math.min(1, Math.max(0, scale * 1.2));

      if(line === '★'){
        ctx.font      = `${Math.round(fsSc * 2)}px 'Noto Sans JP', sans-serif`;
        ctx.fillStyle = `rgba(255,255,255,0.45)`;
      } else {
        const isEn = (line.match(/[\x20-\x7E]/g)||[]).length / line.length >= 0.7;
        ctx.font      = `${Math.round(fsSc)}px '${isEn ? 'Oswald' : 'Noto Sans JP'}', sans-serif`;
        ctx.fillStyle = '#ffffff';
      }

      ctx.globalAlpha = alpha;
      ctx.fillText(line, W / 2, screenY);
      ctx.globalAlpha = 1;
    });
  });

  // フェードマスク（上端）
  const fadeH = H * (P.fade / 100);
  const grad  = ctx.createLinearGradient(0, 0, 0, fadeH);
  grad.addColorStop(0,   'rgba(3,8,24,1.0)');
  grad.addColorStop(0.55,'rgba(3,8,24,0.85)');
  grad.addColorStop(1,   'rgba(3,8,24,0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, fadeH);

  // フェードマスク（下端）
  const gradB = ctx.createLinearGradient(0, H * 0.88, 0, H);
  gradB.addColorStop(0, 'rgba(3,8,24,0.0)');
  gradB.addColorStop(1, 'rgba(3,8,24,0.85)');
  ctx.fillStyle = gradB;
  ctx.fillRect(0, H * 0.88, W, H * 0.12);
}

/* ── メインループ ── */
function tick(now){
  const audio = el.audio;
  if(state.finished){ drawFrame(state.scrollY); return; }

  const dt = state.lastT ? Math.min((now - state.lastT)/1000, 0.05) : 0;
  state.lastT = now;

  const idealY = timeToScrollY(audio.currentTime);
  const lag    = idealY - state.scrollY;
  const boost  = lag > 0 ? Math.min(5.0, 1.0 + (lag/50)*3.0) : 1.0;

  if(lag > 0){
    state.scrollY = Math.min(state.scrollY + P.speed * boost * dt, idealY);
  } else {
    state.scrollY = Math.max(state.scrollY + P.speed * 0.3 * dt, idealY);
  }
  state.scrollY = Math.max(0, state.scrollY);

  drawFrame(state.scrollY);
  updateInfo();

  state.rafId = requestAnimationFrame(tick);
}

function updateInfo(){
  const t = el.audio.currentTime;
  const m = Math.floor(t/60);
  const s = Math.floor(t%60);
  const ms = Math.round((t%1)*1000);
  el.timeDisplay.textContent =
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms).padStart(3,'0');
  const dur = el.audio.duration;
  if(isFinite(dur) && dur > 0) el.progress.value = t/dur;

  // 現在のブロックを探してハイライト
  let cur = null;
  for(const b of state.blockMeta){
    if(b.time <= t) cur = b;
    else break;
  }
  el.lyricDisp.textContent = cur ? cur.lines.join(' / ') : '—';

  // ブロックリストハイライト
  document.querySelectorAll('.block-item').forEach((el,i) => {
    el.classList.toggle('active', state.blockMeta[i] === cur);
    if(state.blockMeta[i] === cur) el.scrollIntoView({block:'nearest'});
  });
}

/* ── ブロックリスト表示 ── */
function buildBlockList(){
  el.blockList.innerHTML = '';
  state.blockMeta.forEach(b => {
    const div = document.createElement('div');
    div.className = 'block-item';
    const t = b.time;
    const m=Math.floor(t/60), s=Math.floor(t%60), ms=Math.round((t%1)*1000);
    div.innerHTML =
      `<div class="block-time">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}</div>`+
      `<div class="block-text">${b.lines.join('\n')}</div>`;
    el.blockList.appendChild(div);
  });
}

/* ── rebuild ── */
function rebuildIfReady(){
  if(!state.rawData.length) return;
  buildBlocks(state.rawData);
  calcMeta();
  state.scrollY = 0;
  state.lastT   = null;
  drawFrame(0);
}

/* ── 再生・停止 ── */
function play(){
  if(!state.mp3Loaded) return;
  state.lastT = null;
  el.audio.play().then(() => {
    el.btnPlay.textContent = '⏸ 停止';
    if(!state.rafId) state.rafId = requestAnimationFrame(tick);
  }).catch(e => alert('再生エラー: '+e.message));
}
function stop(){
  el.audio.pause();
  el.audio.currentTime = 0;
  state.scrollY = 0;
  state.lastT   = null;
  state.finished = false;
  if(state.rafId){ cancelAnimationFrame(state.rafId); state.rafId=null; }
  el.btnPlay.textContent = '▶ 再生';
  drawFrame(0);
}

/* ── 録画 ── */
function initAudioCtx(){
  if(state.audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  state.audioCtx  = new AC();
  state.audioSrc  = state.audioCtx.createMediaElementSource(el.audio);
  state.audioDest = state.audioCtx.createMediaStreamDestination();
  state.audioSrc.connect(state.audioCtx.destination);
  state.audioSrc.connect(state.audioDest);
}

async function startRecord(){
  if(!state.mp3Loaded)       { alert('MP3を選択してください。'); return; }
  if(!state.rawData.length)  { alert('JSONを選択してください。'); return; }
  if(state.isRecording)      { alert('録画中です。'); return; }

  try { initAudioCtx(); } catch(e){ alert('AudioContextエラー: '+e.message); return; }
  if(state.audioCtx.state === 'suspended') await state.audioCtx.resume();
  await document.fonts.ready;

  const fps = parseInt(document.getElementById('p-fps').value);
  const canvasStream = el.canvas.captureStream(fps);
  const audioTracks  = state.audioDest.stream.getAudioTracks();
  if(audioTracks.length) canvasStream.addTrack(audioTracks[0]);

  const types = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  const mime   = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  let recorder;
  try {
    recorder = new MediaRecorder(canvasStream, mime ? {mimeType: mime} : {});
  } catch(e){ alert('MediaRecorderエラー: '+e.message); return; }

  state.chunks     = [];
  state.recorder   = recorder;
  state.isRecording = true;
  el.btnRecord.disabled = true;
  el.recStatus.textContent = '● REC 録画中...';

  recorder.ondataavailable = e => { if(e.data?.size>0) state.chunks.push(e.data); };
  recorder.onstop = finishRecord;

  // 先頭から再生
  stop();
  state.finished = false;
  state.scrollY  = 0;
  state.lastT    = null;
  el.audio.currentTime = 0;
  recorder.start(200);
  el.audio.play().catch(e => {
    state.isRecording = false;
    el.btnRecord.disabled = false;
    el.recStatus.textContent = '';
    if(recorder.state !== 'inactive') recorder.stop();
    alert('再生エラー: '+e.message);
  });
  if(!state.rafId) state.rafId = requestAnimationFrame(tick);
}

function finishRecord(){
  state.isRecording  = false;
  el.btnRecord.disabled = false;
  el.recStatus.textContent = '💾 保存中...';
  if(state.rafId){ cancelAnimationFrame(state.rafId); state.rafId=null; }

  try {
    const blob = new Blob(state.chunks, {type:'video/webm'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='endrole.webm';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    el.recStatus.textContent = '✅ endrole.webm として保存完了！';
  } catch(e){
    el.recStatus.textContent = '❌ 保存失敗';
    alert('保存エラー: '+e.message);
  }
  setTimeout(()=>{ el.recStatus.textContent=''; }, 6000);
}

/* ── 音楽終了 ── */
el.audio.addEventListener('ended', () => {
  if(state.isRecording && state.recorder?.state !== 'inactive'){
    state.recorder.stop();
  }
  if(state.rafId){ cancelAnimationFrame(state.rafId); state.rafId=null; }
  state.finished = true;
  el.btnPlay.textContent = '▶ 再生';
  drawFrame(state.scrollY);
});

/* ── ファイル読み込み ── */
el.mp3Input.addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  if(state.mp3URL) URL.revokeObjectURL(state.mp3URL);
  state.mp3URL = URL.createObjectURL(f);
  el.audio.src = state.mp3URL;
  el.audio.load();
  state.mp3Loaded = true;
  el.mp3Name.textContent = f.name;
});

el.jsonInput.addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  el.jsonName.textContent = f.name;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      state.rawData = JSON.parse(ev.target.result);
      rebuildIfReady();
    } catch(err){ alert('JSON読み込みエラー: '+err.message); }
  };
  reader.readAsText(f);
  e.target.value='';
});

el.bgInput.addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  el.bgName.textContent = f.name;
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => {
    if(state._bgURL) URL.revokeObjectURL(state._bgURL);
    state._bgURL = url;
    state.bgImage = img;
    drawFrame(state.scrollY);
  };
  img.src = url;
  e.target.value='';
});

/* ── ボタン ── */
el.btnPlay.addEventListener('click', () => {
  if(el.audio.paused){ play(); } else { el.audio.pause(); el.btnPlay.textContent='▶ 再生'; }
});
el.btnStop.addEventListener('click',   () => stop());
el.btnRecord.addEventListener('click', () => startRecord());

/* ── 初期描画 ── */
drawFrame(0);
</script>
</body>
</html>
