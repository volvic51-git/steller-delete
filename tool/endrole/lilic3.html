<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプル歌詞動画メーカー</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111122;
      color: #dde3f0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #app { display: flex; flex-direction: column; height: 100vh; min-width: 960px; }

    /* ---------- 上部コントロールバー ---------- */
    #top-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 7px 14px;
      background: #1a1a2e;
      border-bottom: 2px solid #27274a;
      flex-shrink: 0;
      min-height: 46px;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-right: 12px;
      border-right: 1px solid #27274a;
    }
    .ctrl-group:last-child { border-right: none; padding-right: 0; }

    .btn {
      display: inline-block;
      padding: 5px 11px;
      background: #1e2d60;
      color: #c5d5ff;
      border: 1px solid #3a50a0;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
      text-decoration: none;
      user-select: none;
      transition: background 0.14s, border-color 0.14s;
    }
    .btn:hover:not(:disabled) { background: #263d80; border-color: #5070c0; }
    .btn:active:not(:disabled) { background: #162050; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-accent { background: #3b1e6e; border-color: #6a3fb8; color: #d8c0ff; }
    .btn-accent:hover:not(:disabled) { background: #4e2990; border-color: #8a5fd8; }

    .btn-export { background: #5a1818; border-color: #a03030; color: #ffcccc; }
    .btn-export:hover:not(:disabled) { background: #782020; border-color: #cc4444; }

    select {
      background: #1e2d60;
      color: #c5d5ff;
      border: 1px solid #3a50a0;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .speed-label { color: #7888aa; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .file-label { font-size: 11px; color: #667799; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* 動画出力情報 */
    #export-info {
      font-size: 10px;
      color: #556688;
      line-height: 1.4;
    }

    #record-status { font-size: 12px; font-weight: bold; color: #ff6060; min-width: 130px; }

    /* ---------- メインレイアウト ---------- */
    #main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ---------- 左パネル ---------- */
    #left-panel {
      width: 215px;
      min-width: 160px;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      border-right: 2px solid #27274a;
      flex-shrink: 0;
    }

    .panel-header { padding: 8px 10px 5px; border-bottom: 1px solid #27274a; flex-shrink: 0; }
    .panel-header h3 { font-size: 12px; font-weight: bold; color: #7aaeff; letter-spacing: 0.05em; margin-bottom: 2px; }
    .hint { font-size: 10px; color: #445570; }

    /* 背景画像セクション */
    #bg-section {
      padding: 8px 10px;
      border-bottom: 1px solid #27274a;
      flex-shrink: 0;
    }
    #bg-section h3 { font-size: 12px; font-weight: bold; color: #7aaeff; letter-spacing: 0.05em; margin-bottom: 5px; }
    #bg-controls { display: flex; flex-direction: column; gap: 5px; }
    #bg-name { font-size: 10px; color: #667799; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #btn-clear-bg {
      padding: 3px 8px;
      background: #2a1a1a;
      color: #ff9090;
      border: 1px solid #5a2a2a;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
    }
    #btn-clear-bg:hover { background: #3a2020; }

    #lyrics-input {
      flex: 1;
      background: #13132a;
      color: #d8e0f0;
      border: none;
      padding: 10px;
      font-size: 13px;
      resize: none;
      line-height: 1.75;
      font-family: inherit;
      outline: none;
    }
    #lyrics-input::placeholder { color: #334466; }
    #lyrics-input:focus { background: #16163a; }

    /* ---------- 中央パネル ---------- */
    #center-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0b18;
      overflow: hidden;
      padding: 8px;
      gap: 7px;
    }

    #canvas-container {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #preview-canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
      border: 1px solid #27274a;
      background: #000;
    }

    /* ---------- 情報バー ---------- */
    #info-bar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 5px 14px;
      background: #1a1a2e;
      border-radius: 5px;
      width: 100%;
      max-width: 720px;
      flex-shrink: 0;
      overflow: hidden;
    }

    #time-display {
      font-family: 'Courier New', monospace;
      font-size: 16px;
      color: #3dd8a0;
      font-weight: bold;
      letter-spacing: 0.04em;
      min-width: 90px;
      flex-shrink: 0;
    }

    #next-lyric-info { font-size: 12px; color: #667799; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #next-lyric-text { color: #ffd050; font-weight: bold; }

    /* ---------- 右パネル ---------- */
    #right-panel {
      width: 310px;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      border-left: 2px solid #27274a;
      flex-shrink: 0;
    }

    #timing-list { flex: 1; overflow-y: auto; padding: 5px; min-height: 0; }
    #timing-list::-webkit-scrollbar { width: 5px; }
    #timing-list::-webkit-scrollbar-track { background: #0b0b18; }
    #timing-list::-webkit-scrollbar-thumb { background: #27274a; border-radius: 3px; }
    #timing-list::-webkit-scrollbar-thumb:hover { background: #3a3a6a; }

    /* ---------- タイミングアイテム ---------- */
    .timing-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      background: #13132a;
      border: 1px solid #222244;
      transition: background 0.14s, border-color 0.14s;
    }
    .timing-item.active { background: #1a2a60; border-color: #3a5ab8; }

    .timing-time {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #3dd8a0;
      min-width: 72px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .timing-time:hover { color: #60ffcc; text-decoration: underline; }

    /* タイミング編集入力 */
    .timing-time-input {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #3dd8a0;
      background: #0a0a22;
      border: 1px solid #3dd8a0;
      border-radius: 3px;
      width: 80px;
      padding: 1px 4px;
      outline: none;
      flex-shrink: 0;
    }

    .btn-confirm-time {
      background: #1a4a2a;
      color: #60ff90;
      border: 1px solid #2a7a40;
      border-radius: 3px;
      padding: 2px 5px;
      cursor: pointer;
      font-size: 9px;
      line-height: 1.4;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-confirm-time:hover { background: #225a30; }

    .btn-cancel-time {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 2px 5px;
      cursor: pointer;
      font-size: 9px;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .btn-cancel-time:hover { background: #222; }

    .timing-text {
      flex: 1;
      font-size: 11px;
      color: #c0cce8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-delete {
      background: transparent;
      color: #ff7070;
      border: 1px solid rgba(255, 112, 112, 0.25);
      border-radius: 3px;
      padding: 2px 5px;
      cursor: pointer;
      font-size: 10px;
      line-height: 1.4;
      flex-shrink: 0;
      transition: background 0.14s, border-color 0.14s;
    }
    .btn-delete:hover { background: rgba(255, 112, 112, 0.2); border-color: #ff7070; }

    /* ---------- ショートカットヒント ---------- */
    #shortcut-hint {
      padding: 3px 14px;
      background: #0b0b18;
      font-size: 10px;
      color: #334466;
      text-align: center;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ========== 上部コントロールバー ========== -->
  <div id="top-bar">

    <!-- MP3選択 -->
    <div class="ctrl-group">
      <label for="mp3-input" class="btn">📁 MP3選択</label>
      <input type="file" id="mp3-input" accept="audio/mp3,audio/mpeg,audio/*" hidden>
      <span id="mp3-name" class="file-label">ファイル未選択</span>
    </div>

    <!-- 再生コントロール -->
    <div class="ctrl-group">
      <button id="btn-play"       class="btn">▶ 再生</button>
      <button id="btn-stop"       class="btn">■ 停止</button>
      <button id="btn-next-lyric" class="btn btn-accent">次の歌詞 (Space)</button>
      <label class="speed-label">速度:
        <select id="speed-select">
          <option value="1"   >1.0x</option>
          <option value="0.75">0.75x</option>
          <option value="0.5" >0.5x</option>
          <option value="0.25">0.25x</option>
        </select>
      </label>
    </div>

    <!-- JSON・動画出力 -->
    <div class="ctrl-group">
      <button id="btn-save-json" class="btn">💾 JSON保存</button>
      <label for="json-input"    class="btn">📂 JSON読込</label>
      <input type="file" id="json-input" accept=".json" hidden>
    </div>

    <!-- 動画出力 -->
    <div class="ctrl-group">
      <button id="btn-export" class="btn btn-export">🎬 動画出力</button>
      <div id="export-info">
        出力先：ブラウザの<br>ダウンロードフォルダ<br>ファイル名：lyrics_video.webm
      </div>
      <span id="record-status"></span>
    </div>

  </div>

  <!-- ========== メインレイアウト ========== -->
  <div id="main-layout">

    <!-- 左パネル：背景画像 + 歌詞入力 -->
    <div id="left-panel">

      <!-- 背景画像 -->
      <div id="bg-section">
        <h3>🖼 背景画像</h3>
        <div id="bg-controls">
          <label for="bg-input" class="btn" style="font-size:11px; padding:4px 8px;">画像を選択</label>
          <input type="file" id="bg-input" accept="image/*" hidden>
          <span id="bg-name">未選択</span>
          <button id="btn-clear-bg">✕ 背景をクリア</button>
        </div>
      </div>

      <!-- 歌詞入力 -->
      <div class="panel-header">
        <h3>歌詞入力</h3>
        <p class="hint">1行につき1フレーズ</p>
      </div>
      <textarea
        id="lyrics-input"
        spellcheck="false"
        placeholder="不思議の国から迷い込んだアリス&#10;星屑の世界で出会った&#10;紫色したエイリアン"
      ></textarea>
    </div>

    <!-- 中央パネル：Canvasプレビュー -->
    <div id="center-panel">
      <div id="canvas-container">
        <canvas id="preview-canvas" width="1920" height="1080"></canvas>
      </div>
      <div id="info-bar">
        <span id="time-display">00:00.000</span>
        <span id="next-lyric-info">次の歌詞：<span id="next-lyric-text">—</span></span>
      </div>
    </div>

    <!-- 右パネル：タイミング一覧 -->
    <div id="right-panel">
      <div class="panel-header">
        <h3>タイミング一覧</h3>
        <p class="hint" style="color:#556688; font-size:10px; margin-top:2px;">時刻をクリックで編集</p>
        <p id="timing-count" class="hint">0件</p>
      </div>
      <div id="timing-list"></div>
    </div>

  </div>

  <!-- ========== ショートカットヒント ========== -->
  <div id="shortcut-hint">
    Space：次の歌詞登録　｜　Enter：再生 / 停止　｜　← →：5秒移動　｜　↑ ↓：再生速度変更
  </div>

</div>

<audio id="audio-player"></audio>

<script>
'use strict';

// ============================================================
// DOM 要素の参照
// ============================================================
const el = {
  mp3Input:      document.getElementById('mp3-input'),
  mp3Name:       document.getElementById('mp3-name'),
  btnPlay:       document.getElementById('btn-play'),
  btnStop:       document.getElementById('btn-stop'),
  btnNextLyric:  document.getElementById('btn-next-lyric'),
  speedSelect:   document.getElementById('speed-select'),
  btnSaveJson:   document.getElementById('btn-save-json'),
  jsonInput:     document.getElementById('json-input'),
  btnExport:     document.getElementById('btn-export'),
  recordStatus:  document.getElementById('record-status'),
  lyricsInput:   document.getElementById('lyrics-input'),
  canvas:        document.getElementById('preview-canvas'),
  timeDisplay:   document.getElementById('time-display'),
  nextLyricText: document.getElementById('next-lyric-text'),
  timingList:    document.getElementById('timing-list'),
  timingCount:   document.getElementById('timing-count'),
  audio:         document.getElementById('audio-player'),
  bgInput:       document.getElementById('bg-input'),
  bgName:        document.getElementById('bg-name'),
  btnClearBg:    document.getElementById('btn-clear-bg'),
};

const ctx = el.canvas.getContext('2d');

// ============================================================
// アプリ状態
// ============================================================
const state = {
  timings:         [],       // { time: number, text: string }[]
  nextLyricIndex:  0,
  mp3Loaded:       false,
  mp3ObjectURL:    null,
  animFrameId:     null,
  recordIntervalId: null,
  audioCtx:        null,
  audioSource:     null,
  audioDestination: null,
  isRecording:     false,
  mediaRecorder:   null,
  recordedChunks:  [],

  /** 背景画像（HTMLImageElement または null） */
  bgImage: null,

  /** タイミング編集中のインデックス（-1 = 編集なし） */
  editingIndex: -1,
};

// ============================================================
// ユーティリティ
// ============================================================

/**
 * 秒数を "MM:SS.mmm" 形式に変換する
 * @param {number} seconds
 * @returns {string}
 */
function formatTime(seconds) {
  if (!isFinite(seconds) || seconds < 0) return '00:00.000';
  const m  = Math.floor(seconds / 60);
  const s  = Math.floor(seconds % 60);
  const ms = Math.round((seconds % 1) * 1000);
  return (
    String(m).padStart(2, '0') + ':' +
    String(s).padStart(2, '0') + '.' +
    String(ms).padStart(3, '0')
  );
}

/**
 * "MM:SS.mmm" または "SS.mmm" 形式の文字列を秒数に変換する
 * @param {string} str
 * @returns {number|null}  パース失敗時は null
 */
function parseTimeStr(str) {
  str = str.trim();

  // MM:SS.mmm 形式
  const m1 = str.match(/^(\d+):(\d{1,2})\.(\d{1,3})$/);
  if (m1) {
    const mins = parseInt(m1[1], 10);
    const secs = parseInt(m1[2], 10);
    const ms   = parseInt(m1[3].padEnd(3, '0'), 10);
    if (secs >= 60) return null;
    return mins * 60 + secs + ms / 1000;
  }

  // MM:SS 形式（小数なし）
  const m2 = str.match(/^(\d+):(\d{1,2})$/);
  if (m2) {
    const mins = parseInt(m2[1], 10);
    const secs = parseInt(m2[2], 10);
    if (secs >= 60) return null;
    return mins * 60 + secs;
  }

  // 純粋な数値（秒）
  const n = parseFloat(str);
  return isFinite(n) && n >= 0 ? n : null;
}

/**
 * 歌詞テキストエリアから有効な行を配列で返す
 * @returns {string[]}
 */
function getLyricsLines() {
  return el.lyricsInput.value
    .split('\n')
    .map(line => line.trim())
    .filter(line => line.length > 0);
}

/**
 * 指定時刻に表示すべき歌詞テキストを返す
 * @param {number} currentTime
 * @returns {string|null}
 */
function getCurrentLyric(currentTime) {
  let result = null;
  for (const t of state.timings) {
    if (t.time <= currentTime) result = t.text;
    else break;
  }
  // ★ のみの行はブランク扱い（null を返すと Canvas に何も描画されない）
  if (result === '★') return null;
  return result;
}

/**
 * 現在のタイミングインデックスを返す（ハイライト用）
 * @param {number} currentTime
 * @returns {number}
 */
function getCurrentTimingIndex(currentTime) {
  let index = -1;
  for (let i = 0; i < state.timings.length; i++) {
    if (state.timings[i].time <= currentTime) index = i;
    else break;
  }
  return index;
}

// ============================================================
// Canvas 描画
// ============================================================

/**
 * テキストを maxWidth に収まるよう行に分割して返す（日本語対応）
 * @param {string} text
 * @param {number} maxWidth
 * @returns {string[]}
 */
function wrapText(text, maxWidth) {
  const lines = [];
  let current = '';
  for (let i = 0; i < text.length; i++) {
    const trial = current + text[i];
    if (ctx.measureText(trial).width > maxWidth && current.length > 0) {
      lines.push(current);
      current = text[i];
    } else {
      current = trial;
    }
  }
  if (current) lines.push(current);
  return lines;
}

/**
 * Canvas を描画する（毎フレーム呼ばれる）
 *
 * ◆ 変更点:
 *   - 背景画像をアスペクト比を維持して描画（cover風）
 *   - 歌詞を画面下寄り（YouTube サムネイル想定: Y=82%）に表示
 */
function drawCanvas() {
  const W = el.canvas.width;   // 1920
  const H = el.canvas.height;  // 1080

  // ── 背景 ──────────────────────────────────────
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  if (state.bgImage) {
    // 画像を canvas に cover（中央トリミング）で描画
    const img  = state.bgImage;
    const iw   = img.naturalWidth  || img.width;
    const ih   = img.naturalHeight || img.height;
    const scale = Math.max(W / iw, H / ih);
    const dw   = iw * scale;
    const dh   = ih * scale;
    const dx   = (W - dw) / 2;
    const dy   = (H - dh) / 2;
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  // ── 現在の歌詞を取得 ──────────────────────────
  const lyric = getCurrentLyric(el.audio.currentTime);
  if (!lyric) return;

  // ── フォント設定 ──────────────────────────────
  const FONT_SIZE   = 80;
  const LINE_HEIGHT = FONT_SIZE * 1.45;
  const MAX_WIDTH   = W * 0.80;

  ctx.font         = `700 ${FONT_SIZE}px 'Kaisei Decol', serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // ── テキスト折り返し ──────────────────────────
  const lines  = wrapText(lyric, MAX_WIDTH);
  const totalH = lines.length * LINE_HEIGHT;

  // ◆ 歌詞を画面下寄り（H の 82% 付近を中心）に表示
  //   YouTube の字幕・歌詞帯を意識した位置
  const LYRIC_CENTER_Y = H * 0.82;
  const startY = LYRIC_CENTER_Y - totalH / 2 + LINE_HEIGHT / 2;

  lines.forEach((line, i) => {
    const x = W / 2;
    const y = startY + i * LINE_HEIGHT;

    // 縁取り（黒）
    ctx.save();
    ctx.strokeStyle = '#000000';
    ctx.lineWidth   = 10;
    ctx.lineJoin    = 'round';
    ctx.strokeText(line, x, y);
    ctx.restore();

    // 本文（白）
    ctx.fillStyle = '#ffffff';
    ctx.fillText(line, x, y);
  });
}

// ============================================================
// アニメーションループ
// ============================================================

function startPreviewLoop() {
  if (state.animFrameId !== null) return;
  const loop = () => {
    drawCanvas();
    updateTimeDisplay();
    highlightCurrentTiming();
    state.animFrameId = requestAnimationFrame(loop);
  };
  state.animFrameId = requestAnimationFrame(loop);
}

function stopPreviewLoop() {
  if (state.animFrameId !== null) {
    cancelAnimationFrame(state.animFrameId);
    state.animFrameId = null;
  }
}

/** 録画用ループ（バックグラウンドタブでも 30fps を維持） */
function startRecordLoop() {
  if (state.recordIntervalId !== null) return;
  state.recordIntervalId = setInterval(() => {
    drawCanvas();
    updateTimeDisplay();
    highlightCurrentTiming();
  }, 1000 / 30);
}

function stopRecordLoop() {
  if (state.recordIntervalId !== null) {
    clearInterval(state.recordIntervalId);
    state.recordIntervalId = null;
  }
}

// ============================================================
// UI 更新
// ============================================================

function updateTimeDisplay() {
  el.timeDisplay.textContent = formatTime(el.audio.currentTime);
}

function updateNextLyricDisplay() {
  const lines = getLyricsLines();
  if (state.nextLyricIndex < lines.length) {
    el.nextLyricText.textContent = lines[state.nextLyricIndex];
  } else if (lines.length === 0) {
    el.nextLyricText.textContent = '—';
  } else {
    el.nextLyricText.textContent = '（すべて登録済み）';
  }
}

/**
 * タイミング一覧 UI を再描画する
 *
 * ◆ 変更点:
 *   - 時刻ラベルをクリックすると編集モードに入る
 *   - 編集中は input + 確定 / キャンセルボタンを表示
 */
function renderTimingList() {
  el.timingList.innerHTML = '';

  state.timings.forEach((t, index) => {
    const item = document.createElement('div');
    item.className     = 'timing-item';
    item.dataset.index = String(index);

    // ── 時刻表示 or 編集フィールド ──────────────
    if (state.editingIndex === index) {
      // 編集モード
      const input = document.createElement('input');
      input.type      = 'text';
      input.className = 'timing-time-input';
      input.value     = formatTime(t.time);
      input.title     = '形式: MM:SS.mmm または 秒数';

      const confirmBtn = document.createElement('button');
      confirmBtn.className   = 'btn-confirm-time';
      confirmBtn.textContent = '確定';
      confirmBtn.addEventListener('click', () => {
        confirmEditTiming(index, input.value);
      });

      const cancelBtn = document.createElement('button');
      cancelBtn.className   = 'btn-cancel-time';
      cancelBtn.textContent = '✕';
      cancelBtn.addEventListener('click', () => {
        state.editingIndex = -1;
        renderTimingList();
      });

      // Enter で確定、Escape でキャンセル
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') confirmEditTiming(index, input.value);
        if (e.key === 'Escape') { state.editingIndex = -1; renderTimingList(); }
        e.stopPropagation(); // ショートカットとの競合防止
      });

      item.appendChild(input);
      item.appendChild(confirmBtn);
      item.appendChild(cancelBtn);

      // 自動フォーカス（末尾にカーソル）
      setTimeout(() => { input.focus(); input.select(); }, 0);

    } else {
      // 通常表示：クリックで編集モードへ
      const timeSpan = document.createElement('span');
      timeSpan.className   = 'timing-time';
      timeSpan.textContent = formatTime(t.time);
      timeSpan.title       = 'クリックして時刻を編集';
      timeSpan.addEventListener('click', () => {
        state.editingIndex = index;
        renderTimingList();
      });
      item.appendChild(timeSpan);
    }

    // ── 歌詞テキスト ──────────────────────────
    const textSpan = document.createElement('span');
    textSpan.className   = 'timing-text';
    textSpan.textContent = t.text;
    textSpan.title       = t.text;
    item.appendChild(textSpan);

    // ── 削除ボタン ────────────────────────────
    const delBtn = document.createElement('button');
    delBtn.className   = 'btn-delete';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => deleteTiming(index));
    item.appendChild(delBtn);

    el.timingList.appendChild(item);
  });

  el.timingCount.textContent = `${state.timings.length}件`;
}

/**
 * タイミングの時刻を確定する
 * @param {number} index
 * @param {string} rawValue  入力された文字列
 */
function confirmEditTiming(index, rawValue) {
  const newTime = parseTimeStr(rawValue);
  if (newTime === null) {
    alert(
      '時刻の形式が正しくありません。\n' +
      '例: 01:23.456 （分:秒.ミリ秒）\n' +
      '    83.456     （秒数）'
    );
    return;
  }
  state.timings[index].time = newTime;
  state.timings.sort((a, b) => a.time - b.time);
  state.editingIndex = -1;
  renderTimingList();
  drawCanvas();
}

function highlightCurrentTiming() {
  const activeIdx = getCurrentTimingIndex(el.audio.currentTime);
  el.timingList.querySelectorAll('.timing-item').forEach((item, i) => {
    item.classList.toggle('active', i === activeIdx);
  });
}

function updatePlayButton() {
  el.btnPlay.textContent = el.audio.paused ? '▶ 再生' : '⏸ 一時停止';
}

// ============================================================
// 再生制御
// ============================================================

function playAudio() {
  if (!state.mp3Loaded) { alert('MP3ファイルを先に選択してください。'); return; }
  try { initAudioContext(); } catch (err) { console.warn('AudioContext スキップ:', err); }
  el.audio.play()
    .then(() => { startPreviewLoop(); updateNextLyricDisplay(); updatePlayButton(); })
    .catch(err => { console.error(err); alert('再生エラー:\n' + err.message); });
}

function pauseAudio() {
  el.audio.pause();
  stopPreviewLoop();
  drawCanvas();
  updatePlayButton();
}

function stopAudio() {
  pauseAudio();
  el.audio.currentTime = 0;
  updateTimeDisplay();
  drawCanvas();
}

function setPlaybackRate(rate) { el.audio.playbackRate = parseFloat(rate); }

function changeSpeedStep(direction) {
  const steps = ['0.25', '0.5', '0.75', '1'];
  const idx   = steps.indexOf(el.speedSelect.value);
  const next  = Math.max(0, Math.min(steps.length - 1, idx + direction));
  el.speedSelect.value = steps[next];
  setPlaybackRate(steps[next]);
}

// ============================================================
// 歌詞タイミング登録
// ============================================================

/**
 * 現在の再生位置を次の歌詞と関連付けて登録する
 * ★ audio.currentTime を使用するため再生速度に関係なく正確な時刻が記録される
 */
function registerNextLyric() {
  if (!state.mp3Loaded) { alert('MP3ファイルを先に選択してください。'); return; }
  if (el.audio.paused)  { alert('再生中に押してください。'); return; }
  const lines = getLyricsLines();
  if (state.nextLyricIndex >= lines.length) return;

  const time = el.audio.currentTime; // ★ 正確な時刻
  const text = lines[state.nextLyricIndex];

  state.timings.push({ time, text });
  state.timings.sort((a, b) => a.time - b.time);
  state.nextLyricIndex++;
  renderTimingList();
  updateNextLyricDisplay();
}

function deleteTiming(index) {
  state.timings.splice(index, 1);
  if (state.editingIndex === index) state.editingIndex = -1;
  renderTimingList();
}

// ============================================================
// JSON 保存・読込
// ============================================================

function saveJson() {
  if (state.timings.length === 0) { alert('保存するタイミングデータがありません。'); return; }
  const json = JSON.stringify(state.timings, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'lyrics_timing.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function loadJson(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('配列形式の JSON ではありません。');
      data.forEach((item, i) => {
        if (typeof item.time !== 'number') throw new Error(`[${i}] "time" が数値ではありません。`);
        if (typeof item.text !== 'string') throw new Error(`[${i}] "text" が文字列ではありません。`);
      });
      state.timings        = data.sort((a, b) => a.time - b.time);
      el.lyricsInput.value = state.timings.map(t => t.text).join('\n');
      state.nextLyricIndex = state.timings.length;
      state.editingIndex   = -1;
      renderTimingList();
      updateNextLyricDisplay();
      drawCanvas();
      alert(`${state.timings.length} 件のタイミングデータを読み込みました。`);
    } catch (err) {
      alert('JSON 読込エラー:\n' + err.message);
    }
  };
  reader.onerror = () => alert('ファイルの読み込みに失敗しました。');
  reader.readAsText(file, 'UTF-8');
}

// ============================================================
// 背景画像
// ============================================================

/**
 * 背景画像ファイルを読み込んで state.bgImage に格納する
 * @param {File} file
 */
function loadBgImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    // 以前の Object URL を解放
    if (state._bgObjectURL) URL.revokeObjectURL(state._bgObjectURL);
    state._bgObjectURL = url;
    state.bgImage      = img;
    el.bgName.textContent = file.name;
    drawCanvas();
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    alert('画像の読み込みに失敗しました。');
  };
  img.src = url;
}

/** 背景画像をクリアする */
function clearBgImage() {
  if (state._bgObjectURL) URL.revokeObjectURL(state._bgObjectURL);
  state._bgObjectURL = null;
  state.bgImage      = null;
  el.bgName.textContent = '未選択';
  el.bgInput.value  = '';
  drawCanvas();
}

// ============================================================
// AudioContext 初期化
// ============================================================

function initAudioContext() {
  if (state.audioCtx) return;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) throw new Error('AudioContext 非対応ブラウザです。');
  state.audioCtx         = new AudioCtx();
  state.audioSource      = state.audioCtx.createMediaElementSource(el.audio);
  state.audioDestination = state.audioCtx.createMediaStreamDestination();
  state.audioSource.connect(state.audioCtx.destination);
  state.audioSource.connect(state.audioDestination);
}

// ============================================================
// 動画出力
// ============================================================

function getSupportedMimeType() {
  const candidates = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
  for (const type of candidates) {
    if (MediaRecorder.isTypeSupported(type)) return type;
  }
  return '';
}

/**
 * 動画出力を開始する
 *
 * 出力先  : ブラウザのダウンロードフォルダ（通常 ~/Downloads）
 * ファイル名: lyrics_video.webm
 * 形式    : WebM（VP9+Opus または VP8+Opus）
 *
 * 曲を先頭から等速で再生し、曲終了後に自動的にダウンロードが始まります。
 */
async function startExport() {
  if (!state.mp3Loaded)          { alert('MP3ファイルを先に選択してください。'); return; }
  if (state.timings.length === 0){ alert('タイミングデータがありません。'); return; }
  if (state.isRecording)         { alert('すでに録画中です。'); return; }

  try { initAudioContext(); } catch (err) { alert('AudioContext エラー:\n' + err.message); return; }
  if (state.audioCtx.state === 'suspended') await state.audioCtx.resume();
  await document.fonts.ready;

  const canvasStream = el.canvas.captureStream(30);
  const audioTracks  = state.audioDestination.stream.getAudioTracks();
  if (audioTracks.length > 0) canvasStream.addTrack(audioTracks[0]);
  else console.warn('音声トラックなし。映像のみ録画。');

  const mimeType = getSupportedMimeType();
  let recorder;
  try {
    recorder = new MediaRecorder(canvasStream, mimeType ? { mimeType } : {});
  } catch (err) { alert('MediaRecorder エラー:\n' + err.message); return; }

  state.recordedChunks = [];
  state.mediaRecorder  = recorder;

  recorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) state.recordedChunks.push(e.data);
  };
  recorder.onstop = () => finishExport();

  state.isRecording     = true;
  el.btnExport.disabled = true;
  el.recordStatus.textContent = '● REC 録画中...';

  pauseAudio();
  el.audio.currentTime  = 0;
  el.audio.playbackRate = 1.0;
  el.speedSelect.value  = '1';

  startRecordLoop();
  recorder.start(200);

  el.audio.play()
    .then(() => { updatePlayButton(); })
    .catch(err => {
      state.isRecording     = false;
      el.btnExport.disabled = false;
      el.recordStatus.textContent = '';
      stopRecordLoop();
      if (recorder.state !== 'inactive') recorder.stop();
      alert('再生エラー:\n' + err.message);
    });
}

/**
 * 録画を終了して WebM ファイルを保存する
 *
 * ダウンロードは <a download> を使ってブラウザのダウンロードフォルダへ保存されます。
 */
function finishExport() {
  state.isRecording     = false;
  el.btnExport.disabled = false;
  el.recordStatus.textContent = '💾 保存中...';
  stopRecordLoop();

  try {
    const blob = new Blob(state.recordedChunks, { type: 'video/webm' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'lyrics_video.webm';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    el.recordStatus.textContent = '✅ ダウンロードフォルダへ保存完了！';
  } catch (err) {
    el.recordStatus.textContent = '❌ 保存失敗';
    alert('保存エラー:\n' + err.message);
  }

  setTimeout(() => { el.recordStatus.textContent = ''; }, 5000);
  updatePlayButton();
  drawCanvas();
}

// ============================================================
// オーディオイベント
// ============================================================

el.audio.addEventListener('ended', () => {
  if (state.isRecording && state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
    state.mediaRecorder.stop();
  }
  stopPreviewLoop();
  stopRecordLoop();
  updatePlayButton();
  drawCanvas();
});

el.audio.addEventListener('timeupdate', () => {
  if (el.audio.paused) {
    updateTimeDisplay();
    drawCanvas();
    highlightCurrentTiming();
  }
});

// ============================================================
// キーボードショートカット
// ============================================================

document.addEventListener('keydown', (e) => {
  const inTextarea = document.activeElement === el.lyricsInput;
  // タイミング編集中の input にフォーカスがある場合もショートカットを無効化
  const inInput = document.activeElement.tagName === 'INPUT';
  if (inInput) return;

  switch (e.code) {
    case 'Space':
      if (!inTextarea) { e.preventDefault(); registerNextLyric(); }
      break;
    case 'Enter':
      if (!inTextarea) { e.preventDefault(); el.audio.paused ? playAudio() : pauseAudio(); }
      break;
    case 'ArrowLeft':
      if (!inTextarea) { e.preventDefault(); el.audio.currentTime = Math.max(0, el.audio.currentTime - 5); }
      break;
    case 'ArrowRight':
      if (!inTextarea) {
        e.preventDefault();
        const dur = isFinite(el.audio.duration) ? el.audio.duration : 0;
        el.audio.currentTime = Math.min(dur, el.audio.currentTime + 5);
      }
      break;
    case 'ArrowUp':
      if (!inTextarea) { e.preventDefault(); changeSpeedStep(+1); }
      break;
    case 'ArrowDown':
      if (!inTextarea) { e.preventDefault(); changeSpeedStep(-1); }
      break;
  }
});

// ============================================================
// DOM イベントリスナー
// ============================================================

el.mp3Input.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (state.mp3ObjectURL) URL.revokeObjectURL(state.mp3ObjectURL);
  state.mp3ObjectURL     = URL.createObjectURL(file);
  el.audio.src           = state.mp3ObjectURL;
  el.audio.load();
  state.mp3Loaded        = true;
  el.mp3Name.textContent = file.name;
  stopPreviewLoop();
  drawCanvas();
  updatePlayButton();
});

el.btnPlay.addEventListener('click',      () => { el.audio.paused ? playAudio() : pauseAudio(); });
el.btnStop.addEventListener('click',      () => stopAudio());
el.btnNextLyric.addEventListener('click', () => registerNextLyric());
el.speedSelect.addEventListener('change', (e) => setPlaybackRate(e.target.value));
el.btnSaveJson.addEventListener('click',  () => saveJson());
el.jsonInput.addEventListener('change',   (e) => { const f = e.target.files[0]; if (f) { loadJson(f); e.target.value = ''; } });
el.btnExport.addEventListener('click',    () => startExport());

// ◆ 背景画像
el.bgInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) { loadBgImage(file); e.target.value = ''; }
});
el.btnClearBg.addEventListener('click', () => clearBgImage());

// ============================================================
// 初期化
// ============================================================

function init() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, el.canvas.width, el.canvas.height);
  updateNextLyricDisplay();
  console.log('シンプル歌詞動画メーカー — 起動完了');
}

init();
</script>
</body>
</html>
