<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Delete — manual.html エディタ</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#0b0e14;color:#e7eaf0;font-family:'Hiragino Kaku Gothic ProN',sans-serif;height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;}

/* ===== ツールバー ===== */
#toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:9px 14px;background:#11161f;border-bottom:1px solid #2a3344;flex-shrink:0;
}
#toolbar h1{font-size:13px;font-weight:700;margin:0 12px 0 0;white-space:nowrap;letter-spacing:.02em;}
#toolbar button,#toolbar label.fbtn{
  font-family:inherit;font-size:12px;padding:6px 12px;border-radius:7px;
  border:1px solid #2a3344;background:#151b27;color:#e7eaf0;cursor:pointer;white-space:nowrap;
}
#toolbar .accent{background:rgba(0,150,200,.25);border-color:#00c8ff;color:#aeefff;}
#toolbar input[type=file]{display:none;}
.spacer{flex:1;}
#status{font-size:11px;color:#8a93a6;min-width:120px;}

/* ===== メインレイアウト ===== */
#main{flex:1;display:flex;min-height:0;}

/* ===== キャンバスカラム ===== */
#canvas-col{
  flex:1;min-width:0;display:flex;flex-direction:column;
  background:#000;position:relative;
}
#canvas-wrap{
  flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:repeating-conic-gradient(#0c0f16 0% 25%,#0a0d13 0% 50%) 0/20px 20px;
  cursor:crosshair;
  user-select:none;-webkit-user-select:none;
}
#editor-img{display:none;pointer-events:none;max-width:100%;max-height:100%;width:auto;height:auto;}
#sel-canvas{position:absolute;top:0;left:0;pointer-events:none;}
#no-img-msg{color:#8a93a6;font-size:13px;text-align:center;padding:60px 20px;}

/* ===== 右サイドバー ===== */
#side{width:320px;flex-shrink:0;background:#11161f;border-left:1px solid #2a3344;display:flex;flex-direction:column;overflow:hidden;}

/* ステップリスト */
#step-panel{padding:12px;border-bottom:1px solid #2a3344;overflow-y:auto;max-height:40%;}
#step-panel h3{font-size:11px;color:#8a93a6;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;}
.srow{
  display:flex;align-items:center;gap:5px;padding:6px 8px;margin-bottom:5px;
  background:#151b27;border:1px solid #2a3344;border-radius:6px;cursor:pointer;font-size:12px;
}
.srow.selected{border-color:#00c8ff;background:rgba(0,150,200,.15);}
.srow .snum{color:#8a93a6;font-family:monospace;width:20px;flex-shrink:0;}
.srow .stitle{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.srow button{background:none;border:none;color:#8a93a6;cursor:pointer;font-size:13px;padding:1px 4px;line-height:1;}
.srow button:hover{color:#e7eaf0;}
#btn-add-step{
  width:100%;padding:8px;font-size:12px;border-radius:6px;border:1px dashed #2a3344;
  background:transparent;color:#8a93a6;cursor:pointer;margin-top:4px;
}
#btn-add-step:hover{color:#e7eaf0;border-color:#8a93a6;}

/* 編集フォーム */
#edit-panel{flex:1;overflow-y:auto;padding:14px;}
#edit-panel h3{font-size:11px;color:#8a93a6;text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px;}
#edit-panel label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:#8a93a6;margin-bottom:11px;}
#edit-panel input[type=text],#edit-panel textarea,#edit-panel select{
  font-family:inherit;font-size:13px;padding:7px 9px;border-radius:6px;
  border:1px solid #2a3344;background:#151b27;color:#e7eaf0;resize:vertical;
}
#edit-panel textarea{min-height:90px;line-height:1.65;}
.coord-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.coord-row label{margin-bottom:0;}
.hint{font-size:10px;color:#5a6880;margin-top:2px;}

/* ===== プレビュー ===== */
#preview-root{
  position:absolute;inset:0;background:#05060c;display:none;z-index:40;
  font-family:'Share Tech Mono',monospace;color:#e7f4ff;overflow:hidden;
}
#preview-root.on{display:block;}
#pv-wrap{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:#05060c;transform-origin:50% 50%;
  transition:transform 1.0s cubic-bezier(.4,0,.2,1);will-change:transform;
}
#pv-img{display:block;max-width:100%;max-height:100%;width:auto;height:auto;pointer-events:none;}
#pv-spot{
  position:absolute;top:0;left:0;width:0;height:0;border-radius:16px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.75);
  border:2px solid rgba(0,200,255,.9);outline:2px solid rgba(0,200,255,.2);outline-offset:6px;
  pointer-events:none;
  transition:top 1.0s cubic-bezier(.4,0,.2,1),left 1.0s cubic-bezier(.4,0,.2,1),
             width 1.0s cubic-bezier(.4,0,.2,1),height 1.0s cubic-bezier(.4,0,.2,1),border-radius .45s;
  animation:pp 1.8s ease-in-out infinite;
}
@keyframes pp{0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,.75);}50%{box-shadow:0 0 0 9999px rgba(0,0,0,.75),0 0 18px 4px rgba(0,200,255,.5);}}
#pv-panel{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  background:linear-gradient(180deg,rgba(5,8,20,0) 0%,rgba(5,8,22,.93) 18%,rgba(5,8,22,.98) 100%);
  padding:20px 20px 18px;border-top:1px solid rgba(0,200,255,.2);
}
#pv-panel h2{font-family:'Orbitron',sans-serif;font-size:19px;color:#00ccff;margin:0 0 8px;text-shadow:0 0 10px rgba(0,200,255,.5);}
#pv-panel p{font-size:13px;line-height:1.85;color:#cfe8ff;margin:0 0 14px;white-space:pre-line;min-height:3em;}
#pv-panel nav{display:flex;gap:10px;}
#pv-panel nav button{flex:1;font-family:'Share Tech Mono',monospace;font-size:12px;padding:10px 0;border-radius:4px;cursor:pointer;}
#pv-prev{background:rgba(0,20,40,.7);border:1px solid rgba(0,200,255,.3);color:#7fc8e8;}
#pv-prev:disabled{opacity:.3;}
#pv-next{background:rgba(0,90,160,.5);border:1px solid rgba(0,200,255,.8);color:#eaffff;}
#pv-exit{
  position:absolute;top:12px;right:12px;z-index:25;padding:7px 14px;
  border-radius:6px;background:rgba(0,10,25,.85);border:1px solid rgba(0,200,255,.5);
  color:#9fd8f5;cursor:pointer;font-size:12px;
}
[hidden]{display:none !important;}
</style>
</head>
<body>
<div id="toolbar">
  <h1>📘 manual.html エディタ</h1>
  <label class="fbtn">📷 画像読込<input type="file" id="fileImg" accept="image/*"></label>
  <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#8a93a6;white-space:nowrap;">画像パス<input type="text" id="imgPathInput" value="assets/images/img_manual.jpg" title="manual.htmlから見た画像の相対パス（書き出し時に使用）" style="font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #2a3344;background:#151b27;color:#8adcff;width:190px;"></label>
  <button id="btn-preview">▶ プレビュー</button>
  <div class="spacer"></div>
  <button id="btn-save">プロジェクト保存</button>
  <label class="fbtn">プロジェクト読込<input type="file" id="fileProj" accept=".json"></label>
  <button id="btn-export" class="accent">manual.html 書き出し</button>
  <span id="status"></span>
</div>

<div id="main">
  <!-- キャンバスカラム -->
  <div id="canvas-col">
    <div id="canvas-wrap">
      <div id="no-img-msg">「画像読込」からスクリーンショットを読み込んでください。<br>読み込んだ後、ドラッグでハイライト範囲を選択できます。</div>
      <img id="editor-img">
      <canvas id="sel-canvas"></canvas>
    </div>
    <!-- プレビュー -->
    <div id="preview-root">
      <button id="pv-exit" type="button">✕ 編集に戻る</button>
      <div id="pv-wrap"><img id="pv-img"></div>
      <div id="pv-spot"></div>
      <div id="pv-panel">
        <div style="font-size:11px;color:#5fa8d6;margin-bottom:6px;">STEP <span id="pv-snum">1</span> / <span id="pv-stotal">0</span></div>
        <h2 id="pv-title"></h2>
        <p id="pv-desc"></p>
        <nav>
          <button id="pv-prev" type="button">← 前へ</button>
          <button id="pv-next" type="button">次へ →</button>
        </nav>
      </div>
    </div>
  </div>

  <!-- サイドバー -->
  <div id="side">
    <div id="step-panel">
      <h3>ステップ一覧</h3>
      <div id="slist"></div>
      <button id="btn-add-step" type="button">+ ステップ追加</button>
    </div>
    <div id="edit-panel">
      <div id="edit-empty" style="color:#8a93a6;font-size:12px;">ステップを選択するか追加してください。<br><br>【操作方法】<br>画像上でドラッグ → ハイライト範囲を選択<br>選択後、このフォームでタイトル・説明文を入力</div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ==================================================
   状態
================================================== */
var steps = [];
// step: { x,y,w,h (自然サイズ%), shape:'round'|'circle', title:'', desc:'' }
var selIdx = -1;
var imgSrc  = '';   // base64 data URI（エディタ表示用）
var imgPath = 'assets/images/img_manual.jpg'; // 書き出し時に manual.html へ埋め込むパス
var imgNW  = 0;
var imgNH  = 0;

/* ==================================================
   DOM
================================================== */
var editorImg = document.getElementById('editor-img');
var selCanvas = document.getElementById('sel-canvas');
var canvasWrap= document.getElementById('canvas-wrap');
var noImgMsg  = document.getElementById('no-img-msg');
var statusEl  = document.getElementById('status');

function flash(msg){
  statusEl.textContent = msg;
  setTimeout(function(){if(statusEl.textContent===msg)statusEl.textContent='';},2200);
}

/* ==================================================
   画像読み込み
================================================== */
document.getElementById('fileImg').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    imgSrc=ev.target.result;
    loadEditorImg(imgSrc);
    flash('✓ 画像を読み込みました（プレビュー用）');
  };
  rd.readAsDataURL(f);
  e.target.value='';
});

document.getElementById('imgPathInput').addEventListener('input',function(e){
  imgPath=e.target.value.trim();
});

function loadEditorImg(src){
  editorImg.src=src;
  editorImg.style.display='block';
  noImgMsg.style.display='none';
  editorImg.onload=function(){
    imgNW=editorImg.naturalWidth;
    imgNH=editorImg.naturalHeight;
    syncCanvas();
    renderRegions();
  };
}

/* ==================================================
   キャンバスサイズ同期
================================================== */
function syncCanvas(){
  var ir=editorImg.getBoundingClientRect();
  var wr=canvasWrap.getBoundingClientRect();
  var ox=ir.left-wr.left, oy=ir.top-wr.top;
  var iw=Math.round(ir.width), ih=Math.round(ir.height);
  selCanvas.style.left=ox+'px'; selCanvas.style.top=oy+'px';
  selCanvas.style.width=iw+'px'; selCanvas.style.height=ih+'px';
  selCanvas.width=iw; selCanvas.height=ih;
}

function getImgDisplayRect(){
  // selCanvasはimgに正確に重ねてあるのでx,y=0。canvas幅＝画像表示幅。
  return {x:0,y:0,w:selCanvas.width,h:selCanvas.height,scale:1};
}

window.addEventListener('resize',function(){
  if(imgNW){ syncCanvas(); renderRegions(); }
});

/* ==================================================
   ドラッグ選択（キャンバス上）
================================================== */
var dragging=false, dragStartX=0, dragStartY=0, dragCurX=0, dragCurY=0;

canvasWrap.addEventListener('pointerdown',function(e){
  if(!imgNW) return;
  e.preventDefault();
  var r=getCanvasRelativePos(e);
  dragging=true; dragStartX=r.x; dragStartY=r.y; dragCurX=r.x; dragCurY=r.y;
  canvasWrap.setPointerCapture(e.pointerId);
});
canvasWrap.addEventListener('pointermove',function(e){
  if(!dragging) return;
  e.preventDefault();
  var r=getCanvasRelativePos(e);
  dragCurX=r.x; dragCurY=r.y;
  renderRegions(true);
});
canvasWrap.addEventListener('pointerup',function(e){
  if(!dragging) return;
  dragging=false;
  var r=getCanvasRelativePos(e);
  dragCurX=r.x; dragCurY=r.y;
  finalizeDragSelection();
});

function getCanvasRelativePos(e){
  var wr=canvasWrap.getBoundingClientRect();
  var cr=selCanvas.getBoundingClientRect();
  return { x:e.clientX-cr.left, y:e.clientY-cr.top };
}

function finalizeDragSelection(){
  var cw=selCanvas.width, ch=selCanvas.height;
  var x1=Math.max(0,Math.min(dragStartX,dragCurX));
  var y1=Math.max(0,Math.min(dragStartY,dragCurY));
  var x2=Math.max(0,Math.min(Math.max(dragStartX,dragCurX),cw));
  var y2=Math.max(0,Math.min(Math.max(dragStartY,dragCurY),ch));
  var pw=x2-x1, ph=y2-y1;
  if(pw<4||ph<4){ renderRegions(); return; }
  // canvas座標（表示ピクセル）→ 自然サイズ%
  var pctX=(x1/cw*100), pctY=(y1/ch*100);
  var pctW=(pw/cw*100), pctH=(ph/ch*100);
  if(selIdx>=0 && steps[selIdx]){
    // 選択中ステップの範囲を上書き
    steps[selIdx].x=+pctX.toFixed(2); steps[selIdx].y=+pctY.toFixed(2);
    steps[selIdx].w=+pctW.toFixed(2); steps[selIdx].h=+pctH.toFixed(2);
    renderAll();
    flash('✓ ステップ'+(selIdx+1)+'の範囲を更新しました');
  } else {
    // 新規ステップとして追加
    steps.push({x:+pctX.toFixed(2),y:+pctY.toFixed(2),w:+pctW.toFixed(2),h:+pctH.toFixed(2),shape:'round',title:'',desc:''});
    selIdx=steps.length-1;
    renderAll();
    flash('✓ ステップを追加しました（右パネルでタイトル・説明文を入力）');
  }
}

/* ==================================================
   領域描画
================================================== */
function renderRegions(withDrag){
  if(!selCanvas.width) return;
  var ctx=selCanvas.getContext('2d');
  var cw=selCanvas.width, ch=selCanvas.height;
  ctx.clearRect(0,0,cw,ch);
  var r=getImgDisplayRect();

  steps.forEach(function(s,i){
    var sx=s.x/100*cw, sy=s.y/100*ch, sw=s.w/100*cw, sh=s.h/100*ch;
    ctx.save();
    ctx.strokeStyle = (i===selIdx) ? '#ffcc00' : 'rgba(0,200,255,0.75)';
    ctx.lineWidth   = (i===selIdx) ? 2 : 1.5;
    ctx.fillStyle   = (i===selIdx) ? 'rgba(255,204,0,0.12)' : 'rgba(0,200,255,0.10)';
    if(s.shape==='circle'){
      var cx2=sx+sw/2, cy2=sy+sh/2, rx=sw/2, ry=sh/2;
      ctx.beginPath(); ctx.ellipse(cx2,cy2,rx,ry,0,0,Math.PI*2);
    } else {
      roundRect(ctx,sx,sy,sw,sh,8);
    }
    ctx.fill(); ctx.stroke();
    // ラベル
    ctx.fillStyle   = (i===selIdx) ? 'rgba(120,90,0,.8)' : 'rgba(0,0,0,.7)';
    ctx.fillRect(sx, Math.max(0,sy-20), Math.min(200,cw-sx), 20);
    ctx.fillStyle='#ffe';
    ctx.font='11px monospace';
    ctx.fillText((i+1)+'. '+(s.title||'(無題)'), sx+4, Math.max(0,sy-5));
    ctx.restore();
  });

  // ドラッグ中のプレビュー
  if(withDrag&&dragging){
    var x1=Math.min(dragStartX,dragCurX), y1=Math.min(dragStartY,dragCurY);
    var pw=Math.abs(dragCurX-dragStartX), ph=Math.abs(dragCurY-dragStartY);
    ctx.save();
    ctx.strokeStyle='rgba(255,255,100,0.9)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.fillStyle='rgba(255,255,100,0.08)';
    roundRect(ctx,x1,y1,pw,ph,4);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

/* ==================================================
   ステップ一覧
================================================== */
function renderStepList(){
  var el=document.getElementById('slist');
  el.innerHTML='';
  steps.forEach(function(s,i){
    var row=document.createElement('div');
    row.className='srow'+(i===selIdx?' selected':'');
    row.innerHTML='<span class="snum">'+(i+1)+'</span><span class="stitle"></span>'
      +'<button data-act="up" title="上へ">▲</button>'
      +'<button data-act="down" title="下へ">▼</button>'
      +'<button data-act="del" title="削除">✕</button>';
    row.querySelector('.stitle').textContent=s.title||'(無題)';
    row.addEventListener('click',function(e){ if(e.target.tagName==='BUTTON')return; selectStep(i); });
    row.querySelector('[data-act=up]').addEventListener('click',function(e){e.stopPropagation();moveStep(i,-1);});
    row.querySelector('[data-act=down]').addEventListener('click',function(e){e.stopPropagation();moveStep(i,1);});
    row.querySelector('[data-act=del]').addEventListener('click',function(e){e.stopPropagation();deleteStep(i);});
    el.appendChild(row);
  });
}

function selectStep(i){ selIdx=i; renderAll(); }

function moveStep(i,d){
  var j=i+d; if(j<0||j>=steps.length) return;
  var tmp=steps[i]; steps[i]=steps[j]; steps[j]=tmp;
  if(selIdx===i) selIdx=j; else if(selIdx===j) selIdx=i;
  renderAll();
}

function deleteStep(i){
  steps.splice(i,1);
  if(selIdx===i) selIdx=-1; else if(selIdx>i) selIdx--;
  renderAll();
}

document.getElementById('btn-add-step').addEventListener('click',function(){
  steps.push({x:20,y:20,w:30,h:20,shape:'round',title:'',desc:''});
  selIdx=steps.length-1;
  renderAll();
  flash('ステップを追加しました。画像上でドラッグして範囲を設定してください。');
});

/* ==================================================
   編集フォーム
================================================== */
function renderEditForm(){
  var ep=document.getElementById('edit-panel');
  if(selIdx<0||!steps[selIdx]){
    ep.innerHTML='<div id="edit-empty" style="color:#8a93a6;font-size:12px;">ステップを選択するか追加してください。<br><br>【操作方法】<br>画像上でドラッグ → ハイライト範囲を選択<br>選択後、このフォームでタイトル・説明文を入力</div>';
    return;
  }
  var s=steps[selIdx];
  ep.innerHTML=
    '<h3>ステップ '+(selIdx+1)+' を編集</h3>'
    +'<label>タイトル<input type="text" id="f-title" value="'+escH(s.title||'')+'"></label>'
    +'<label>説明文<textarea id="f-desc">'+escH(s.desc||'')+'</textarea></label>'
    +'<label>スポットの形<select id="f-shape">'
      +'<option value="round"'+(s.shape==='round'?' selected':'')+'>角丸四角</option>'
      +'<option value="circle"'+(s.shape==='circle'?' selected':'')+'>円</option>'
    +'</select></label>'
    +'<h3 style="margin-top:14px;">ハイライト範囲（%）</h3>'
    +'<div class="coord-row">'
      +'<label>左端 X<input type="number" id="f-x" step="0.1" value="'+s.x.toFixed(1)+'"></label>'
      +'<label>上端 Y<input type="number" id="f-y" step="0.1" value="'+s.y.toFixed(1)+'"></label>'
      +'<label>幅 W<input type="number" id="f-w" step="0.1" value="'+s.w.toFixed(1)+'"></label>'
      +'<label>高さ H<input type="number" id="f-h" step="0.1" value="'+s.h.toFixed(1)+'"></label>'
    +'</div>'
    +'<p class="hint">値は元画像の自然サイズに対する%。画像上でドラッグすると自動入力されます。</p>';

  document.getElementById('f-title').addEventListener('input',function(e){ s.title=e.target.value; renderStepList(); });
  document.getElementById('f-desc').addEventListener('input',function(e){ s.desc=e.target.value; });
  document.getElementById('f-shape').addEventListener('change',function(e){ s.shape=e.target.value; renderRegions(); });
  ['x','y','w','h'].forEach(function(k){
    document.getElementById('f-'+k).addEventListener('input',function(e){
      var v=parseFloat(e.target.value); if(!isNaN(v)) s[k]=v;
      renderRegions();
    });
  });
}

function escH(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

/* ==================================================
   まとめてレンダリング
================================================== */
function renderAll(){ renderStepList(); renderEditForm(); renderRegions(); }

/* ==================================================
   プレビューモード
================================================== */
var pvIdx=0;
var pvImg=document.getElementById('pv-img');
var pvWrap=document.getElementById('pv-wrap');
var pvSpot=document.getElementById('pv-spot');

function pvGetRect(){
  // clientWidth/Heightはtransformの影響を受けないので常に正確なレイアウト値
  var cw=pvWrap.clientWidth, ch=pvWrap.clientHeight;
  var iw=pvImg.naturalWidth, ih=pvImg.naturalHeight;
  if(!iw||!ih) return {x:0,y:0,w:cw,h:ch};
  var sc=Math.min(cw/iw,ch/ih);
  var dw=iw*sc, dh=ih*sc;
  return {x:(cw-dw)/2, y:(ch-dh)/2, w:dw, h:dh};
}

function pvRender(){
  if(!steps.length) return;
  var s=steps[pvIdx];
  var r=pvGetRect();
  // スポットの未スケール座標
  var sx=r.x+(s.x/100)*r.w, sy=r.y+(s.y/100)*r.h;
  var sw=(s.w/100)*r.w,      sh=(s.h/100)*r.h;
  var cx=sx+sw/2, cy=sy+sh/2;  // スポット中心

  // ズーム：transform-originをスポット中心に合わせる
  var ww=pvWrap.clientWidth, wh=pvWrap.clientHeight;
  var oxPct=(cx/ww*100).toFixed(2);
  var oyPct=(cy/wh*100).toFixed(2);
  var sc=Math.min((ww*.6)/sw,(wh*.6)/sh,2.8); sc=Math.max(sc,1);
  pvWrap.style.transformOrigin=oxPct+'% '+oyPct+'%';
  pvWrap.style.transform='scale('+sc.toFixed(4)+')';

  // transform-originをスポット中心に設定したので、
  // ズーム後もスポット中心は同じ位置 (cx,cy) に留まる。
  // スポット自体はscale倍になるので、視覚的な位置を逆算して配置。
  var sw_v=sw*sc, sh_v=sh*sc;
  pvSpot.style.left  =(cx-sw_v/2)+'px'; pvSpot.style.top   =(cy-sh_v/2)+'px';
  pvSpot.style.width =sw_v+'px';        pvSpot.style.height=sh_v+'px';
  pvSpot.style.borderRadius=(s.shape==='circle')?'50%':'14px';

  document.getElementById('pv-title').textContent=s.title||'';
  document.getElementById('pv-desc').textContent=s.desc||'';
  document.getElementById('pv-snum').textContent=pvIdx+1;
  document.getElementById('pv-stotal').textContent=steps.length;
  document.getElementById('pv-prev').disabled=(pvIdx===0);
  document.getElementById('pv-next').textContent=(pvIdx===steps.length-1)?'完了 →':'次へ →';
}

document.getElementById('btn-preview').addEventListener('click',function(){
  if(!steps.length){flash('ステップがありません');return;}
  var previewSrc = imgSrc || (imgPath ? '../'+imgPath : '');
  if(!previewSrc){flash('先に画像を読み込むか、画像パスを設定してください');return;}
  pvIdx=0; pvImg.src=previewSrc;
  document.getElementById('preview-root').classList.add('on');
  if(pvImg.complete&&pvImg.naturalWidth) pvRender();
  else pvImg.onload=pvRender;
});
document.getElementById('pv-exit').addEventListener('click',function(){
  document.getElementById('preview-root').classList.remove('on');
  pvWrap.style.transform='scale(1)';
});
document.getElementById('pv-prev').addEventListener('click',function(){if(pvIdx>0){pvIdx--;pvRender();}});
document.getElementById('pv-next').addEventListener('click',function(){
  if(pvIdx<steps.length-1){pvIdx++;pvRender();}
  else { flash('（完了画面はエクスポート後のmanual.htmlでご確認ください）'); }
});
window.addEventListener('resize',function(){
  if(document.getElementById('preview-root').classList.contains('on')) pvRender();
});

================================================== */
document.getElementById('btn-save').addEventListener('click',function(){
  var data=JSON.stringify({version:3,imgPath:imgPath,imgSrc:imgSrc,steps:steps},null,2);
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));

});

document.getElementById('fileProj').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      steps=Array.isArray(d.steps)?d.steps:[];
      selIdx=steps.length?0:-1;
      // imgPath（書き出しパス）を復元
      if(d.imgPath){ imgPath=d.imgPath; }
      document.getElementById('imgPathInput').value=imgPath;
      // ステップ一覧・編集フォームは先に描画
      renderStepList();
      renderEditForm();
      // imgSrc（base64）があればエディタ表示に使用、なければパスから試みる
      imgSrc = (d.imgSrc && d.imgSrc.startsWith('data:')) ? d.imgSrc : '';
      if(imgSrc){ loadEditorImg(imgSrc); }
      else if(imgPath){ loadEditorImg('../'+imgPath); }
      else { renderRegions(); }
      flash('✓ プロジェクトを読み込みました');
    }catch(err){ flash('✕ 読み込み失敗: '+err.message); }
  };
  rd.readAsText(f);
  e.target.value='';
});

================================================== */
document.getElementById('btn-export').addEventListener('click',function(){
  if(!steps.length){flash('ステップがありません');return;}
  if(!imgPath){flash('画像パスを入力してください');return;}
  var html=buildManualHtml();
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a.download='manual.html'; document.body.appendChild(a); a.click(); a.remove();

});

function buildManualHtml(){
  // imgPathを外部パスとして埋め込む（base64非埋め込み）
  var dataJson = JSON.stringify({steps:steps, imgSrc:imgPath});
  return MANUAL_TEMPLATE.replace(
    '{"steps":[],"imgSrc":""}',
    dataJson
  );
}

/* ==================================================
   MANUAL_TEMPLATE
================================================== */

var MANUAL_TEMPLATE = `<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
  *,*::before,*::after{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

<body>

<!-- ===== データ領域（ブラウザは実行しない、書き出し時にエディタが置換） ===== -->
<script type="application/json" id="manual-data">{"steps":[],"imgSrc":""}<\/script>

<div id="manual-root">
  <div id="screenshot-wrap">
    <img id="manualScreenshot" alt="プレイ画面">
  </div>
  <div id="spotlight"></div>
  <button id="btn-close" type="button">✕</button>
  <div id="panel">
    <div id="step-indicator">
      <span>STEP <span id="step-num">1</span> / <span id="step-total">0</span></span>
      <div id="step-dots"></div>
    </div>
    <h2 id="panel-title"></h2>
    <p id="panel-desc"></p>
    <div id="panel-nav">
      <button id="btn-prev" type="button">← 前へ</button>
      <button id="btn-next" type="button">次へ →</button>
    </div>
  </div>
</div>
<div id="complete-screen" hidden>
  <h1>チュートリアル完了</h1>
  <p>それでは、星々の救出へ向かいましょう。</p>
  <button id="btn-start-game" type="button">TITLE</button>
</div>
<div id="empty-msg" hidden>
  manual-editor.html から「manual.html 書き出し」ボタンで<br>書き出したファイルを開いてください。
</div>

<script>
(function(){
'use strict';

/* データ読み込み（type=application/jsonなので自動実行されない・404も出ない） */
var _data = {};
try{ _data = JSON.parse(document.getElementById('manual-data').textContent); }
catch(e){}
var STEPS   = Array.isArray(_data.steps) ? _data.steps : [];
var IMG_SRC = _data.imgSrc || '';

/* ステップが無い場合（テンプレートを直接開いた） */
if(!STEPS.length){
  document.getElementById('empty-msg').hidden = false;
  document.getElementById('manual-root').hidden = true;
  return;
}

var img         = document.getElementById('manualScreenshot');
var wrap        = document.getElementById('screenshot-wrap');
var spotlight   = document.getElementById('spotlight');
var panel       = document.getElementById('panel');
var panelTitle  = document.getElementById('panel-title');
var panelDesc   = document.getElementById('panel-desc');
var stepNumEl   = document.getElementById('step-num');
var stepTotalEl = document.getElementById('step-total');
var stepDotsEl  = document.getElementById('step-dots');
var btnPrev     = document.getElementById('btn-prev');
var btnNext     = document.getElementById('btn-next');
var completeSc  = document.getElementById('complete-screen');

if(IMG_SRC) img.src = IMG_SRC;

/* BGM（ブラウザの自動再生制限のため、最初のタップで開始） */
var _bgm = new Audio('../assets/audio/SND_02_play.mp3');
_bgm.loop = true; _bgm.volume = 0.55;
document.addEventListener('click', function _startBgm(){
  _bgm.play().catch(function(){});
  document.removeEventListener('click', _startBgm);
}, { once: true });

stepTotalEl.textContent = STEPS.length;
STEPS.forEach(function(_,i){
  var d = document.createElement('span');
  stepDotsEl.appendChild(d);
});

function getImgRect(){
  var cw=wrap.clientWidth, ch=wrap.clientHeight;
  var iw=img.naturalWidth, ih=img.naturalHeight;
  if(!iw||!ih) return {x:0,y:0,w:cw,h:ch};
  var sc=Math.min(cw/iw,ch/ih);
  var dw=iw*sc, dh=ih*sc;
  return {x:(cw-dw)/2, y:(ch-dh)/2, w:dw, h:dh};
}

var currentScale = 1;
function applyZoom(step, cx, cy){
  var r=getImgRect();
  var sw=(step.w/100)*r.w, sh=(step.h/100)*r.h;
  var panelH = panel.offsetHeight;
  var visH = wrap.clientHeight - panelH;
  var sc=Math.min((wrap.clientWidth*.6)/sw,(visH*.6)/sh,2.8);
  sc=Math.max(sc,1); currentScale=sc;
  var targetX = wrap.clientWidth / 2;
  var targetY = visH / 2;
  var ox = sc===1 ? cx : (targetX - cx*sc)/(1-sc);
  var oy = sc===1 ? cy : (targetY - cy*sc)/(1-sc);
  var oxPct=(ox/wrap.clientWidth*100).toFixed(3);
  var oyPct=(oy/wrap.clientHeight*100).toFixed(3);
  wrap.style.transformOrigin=oxPct+'% '+oyPct+'%';
  wrap.style.transform='scale('+sc.toFixed(4)+')';
  return { screenX: sc===1 ? cx : targetX, screenY: sc===1 ? cy : targetY };
}

var idx=0;
function render(){
  var step=STEPS[idx];
  panelTitle.textContent=step.title||''; panelDesc.textContent=step.desc||'';
  stepNumEl.textContent=idx+1;
  Array.prototype.forEach.call(stepDotsEl.children,function(d,i){ d.classList.toggle('active',i===idx); });
  btnPrev.disabled=(idx===0);
  btnNext.textContent=(idx===STEPS.length-1)?'完了 →':'次へ →';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    var r=getImgRect();
    var sx=r.x+(step.x/100)*r.w, sy=r.y+(step.y/100)*r.h;
    var sw=(step.w/100)*r.w,      sh=(step.h/100)*r.h;
    var cx=sx+sw/2, cy=sy+sh/2;
    var zoomed=applyZoom(step,cx,cy);
    var sc=currentScale;
    var sw_v=sw*sc, sh_v=sh*sc;
    spotlight.style.left  =(zoomed.screenX-sw_v/2)+'px'; spotlight.style.top=(zoomed.screenY-sh_v/2)+'px';
    spotlight.style.width =sw_v+'px'; spotlight.style.height=sh_v+'px';
    spotlight.style.borderRadius=(step.shape==='circle')?'50%':'14px';
  }); });
}

function next(){ if(idx<STEPS.length-1){idx++;render();}else{wrap.style.transform='scale(1)';completeSc.hidden=false;} }
function prev(){ if(idx>0){idx--;render();} }
function closeManual(){ _bgm.pause(); _bgm.currentTime=0; window.location.href='index.html'; }

btnPrev.addEventListener('click',prev);
btnNext.addEventListener('click',next);
document.getElementById('btn-close').addEventListener('click',closeManual);
document.getElementById('btn-start-game').addEventListener('click',closeManual);

var tx=0,ty=0,ta=false;
document.getElementById('manual-root').addEventListener('touchstart',function(e){
  if(e.touches.length!==1)return; tx=e.touches[0].clientX; ty=e.touches[0].clientY; ta=true;
},{passive:true});
document.getElementById('manual-root').addEventListener('touchend',function(e){
  if(!ta)return; ta=false;
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy))return;
  if(dx<0) next(); else prev();
},{passive:true});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev(); if(e.key==='Escape')closeManual();
});
var rt=null;
window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(render,80); });

if(img.complete&&img.naturalWidth){ render(); }
else{ img.addEventListener('load',render); img.addEventListener('error',render); }
})();
<\/script>
</body>
</html>
`;

})();
</script>
